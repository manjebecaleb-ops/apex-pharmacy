<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX | Enterprise System</title>
    <!-- System Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900 text-white font-sans overflow-hidden">
    <!-- Visual Bootloader -->
    <div id="apex-root">
        <div id="boot-screen" style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
            <h1 style="font-size: 3rem; font-weight: 900; color: #10b981; font-style: italic;">APEX</h1>
            <div id="status-msg" style="margin-top: 20px; font-weight: bold; color: #94a3b8;">SYSTEM INITIALIZING...</div>
            <div id="error-msg" style="margin-top: 20px; color: #ef4444; max-width: 80%; font-family: monospace; font-size: 12px;"></div>
        </div>
    </div>

    <!-- 1. DATABASE ENGINE (FIREBASE) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAAazqZ1XnzpQ6A_cCHyQEsgXxq5jVVLXE",
  authDomain: "apex-pharmacy-a69b5.firebaseapp.com",
  projectId: "apex-pharmacy-a69b5",
  storageBucket: "apex-pharmacy-a69b5.firebasestorage.app",
  messagingSenderId: "28559683699",
  appId: "1:28559683699:web:1cc3f16a98a32463657a06",
  measurementId: "G-SVDCM1Y693"
};

        try {
            const app = initializeApp(firebaseConfig);
            window.db = getFirestore(app);
            window.api = { collection, onSnapshot, addDoc, updateDoc, doc, deleteDoc, query, orderBy };
            document.getElementById('status-msg').innerText = "DATABASE CONNECTED ✅";
        } catch (err) {
            document.getElementById('error-msg').innerText = "FIREBASE ERROR: " + err.message;
        }
    </script>

    <!-- 2. APEX INTERFACE LOGIC -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('DASHBOARD');
            const [inventory, setInventory] = useState([]);
            const [cart, setCart] = useState([]);

            // Sync Inventory
            useEffect(() => {
                if (!window.db) return;
                const q = window.api.query(window.api.collection(window.db, "inventory"), window.api.orderBy("brandName", "asc"));
                const unsub = window.api.onSnapshot(q, (snap) => {
                    setInventory(snap.docs.map(d => ({id: d.id, ...d.data()})));
                }, (err) => {
                    alert("Sync Error: Check Firebase Permissions");
                });
                return () => unsub();
            }, []);

            // MULTI-TAP CART LOGIC
            const addToCart = (p) => {
                setCart(prev => {
                    const ex = prev.find(i => i.id === p.id);
                    if (ex) return prev.map(i => i.id === p.id ? {...i, qty: i.qty + 1} : i);
                    return [...prev, {...p, qty: 1}];
                });
            };

            const NavBtn = ({id, label, icon: Icon}) => (
                <button onClick={() => setView(id)} className={`w-full flex items-center gap-3 p-4 rounded-2xl font-bold transition-all ${view === id ? 'bg-emerald-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}>
                    <Icon size={20} /> <span>{label}</span>
                </button>
            );

            return (
                <div className="flex h-screen bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-white">
                    {/* SIDEBAR */}
                    <aside className="w-64 border-r dark:border-slate-800 p-6 flex flex-col shrink-0 bg-white dark:bg-slate-900">
                        <h2 className="text-2xl font-black mb-10 text-emerald-500 italic">APEX PRO</h2>
                        <nav className="flex-1 space-y-1">
                            <NavBtn id="DASHBOARD" label="Dashboard" icon={lucide.LayoutDashboard} />
                            <NavBtn id="POS" label="Point of Sale" icon={lucide.ShoppingCart} />
                            <NavBtn id="STOO" label="Inventory" icon={lucide.Package} />
                        </nav>
                        <button onClick={() => window.location.reload()} className="text-rose-500 font-bold text-xs uppercase p-4">Logout</button>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 p-10 overflow-auto">
                        {view === 'DASHBOARD' && (
                            <div className="animate-in fade-in duration-500">
                                <h2 className="text-3xl font-black mb-8">Executive Overview</h2>
                                <div className="grid grid-cols-2 gap-6">
                                    <div className="bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800">
                                        <p className="text-slate-400 text-xs font-bold uppercase tracking-widest">Active Inventory</p>
                                        <h3 className="text-4xl font-black">{inventory.length} <span className="text-sm opacity-30">Items</span></h3>
                                    </div>
                                    <div className="bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800">
                                        <p className="text-slate-400 text-xs font-bold uppercase tracking-widest">Cloud Status</p>
                                        <h3 className="text-4xl font-black text-emerald-500 uppercase tracking-tighter italic">ONLINE</h3>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'POS' && (
                            <div className="flex gap-8">
                                <div className="flex-1 grid grid-cols-2 gap-4">
                                    {inventory.map(p => (
                                        <div key={p.id} onClick={() => addToCart(p)} className="bg-white dark:bg-slate-900 p-6 rounded-3xl border-2 hover:border-emerald-500 cursor-pointer shadow-sm active:scale-95 transition-all">
                                            <p className="font-black text-lg">{p.brandName}</p>
                                            <p className="font-black text-emerald-500">{Number(p.price).toLocaleString()} TZS</p>
                                            <p className="text-[10px] opacity-40">STOCK: {p.stock}</p>
                                        </div>
                                    ))}
                                </div>
                                <div className="w-96 bg-white dark:bg-slate-900 p-8 rounded-[3rem] shadow-2xl h-fit border-t-8 border-emerald-600">
                                    <h3 className="font-black text-xl mb-6">Mkokoteni (Cart)</h3>
                                    {cart.map(i => (
                                        <div key={i.id} className="flex justify-between py-2 border-b dark:border-slate-800 text-sm">
                                            <span>{i.brandName} x{i.qty}</span>
                                            <span className="font-bold">{(i.price * i.qty).toLocaleString()}</span>
                                        </div>
                                    ))}
                                    <div className="mt-8 flex justify-between font-black text-2xl text-emerald-600">
                                        <span>Total:</span>
                                        <span>{cart.reduce((s,i)=>s+(i.price*i.qty),0).toLocaleString()}</span>
                                    </div>
                                    <button onClick={() => {alert("Sale Successful!"); setCart([]);}} className="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black mt-8 shadow-lg active:scale-95 transition-all">FINALIZE SALE</button>
                                </div>
                            </div>
                        )}

                        {view === 'STOO' && (
                            <div className="bg-white dark:bg-slate-900 p-10 rounded-[3rem] shadow-sm border dark:border-slate-800">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-3xl font-black">Stock Manager</h2>
                                    <button onClick={async () => {
                                        const n = prompt("Brand:"); const p = prompt("Price:"); const s = prompt("Stock:");
                                        if(n) await window.api.addDoc(window.api.collection(window.db, "inventory"), { brandName: n, price: Number(p), stock: Number(s) });
                                    }} className="bg-emerald-600 text-white px-8 py-3 rounded-2xl font-black">+ Add Med</button>
                                </div>
                                <table className="w-full text-left">
                                    <thead>
                                        <tr className="text-slate-400 text-xs font-bold uppercase border-b dark:border-slate-800"><th className="pb-4">Name</th><th className="pb-4">Stock</th><th className="pb-4">Price</th></tr>
                                    </thead>
                                    <tbody>
                                        {inventory.map(p => (
                                            <tr key={p.id} className="border-b dark:border-slate-800">
                                                <td className="py-4 font-bold">{p.brandName}</td>
                                                <td>{p.stock}</td>
                                                <td className="font-black text-emerald-500">{p.price}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        // Stable Render Trigger
        const loader = setInterval(() => {
            if (window.db && window.api) {
                const root = ReactDOM.createRoot(document.getElementById('apex-root'));
                root.render(<App />);
                clearInterval(loader);
            }
        }, 500);
    </script>
</body>
</html>
