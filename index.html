<body>
    <div id="apex-root">
        <div style="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#020617;">
            <h1 style="font-size:4rem;font-weight:900;color:#10b981;font-style:italic;">APEX</h1>

        </div>

    <script>
        window.offlineDB = {
            init: async function() {
                return new Promise((resolve) => {
                    const request = indexedDB.open('ApexPharmacy', 3);
                    request.onsuccess = () => { this.db = request.result; resolve(this.db); };
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        ['inventory','sales','patients','users','expenses','medicalHistory','syncQueue'].forEach(store => {
                            if (!db.objectStoreNames.contains(store)) {
                                db.createObjectStore(store, { keyPath: 'id', autoIncrement: store === 'syncQueue' });
                            }
                        });
                    };
                });
            },
            get: async (store, key) => new Promise((resolve) => {
                if (!window.offlineDB.db) return resolve(null);
                const tx = window.offlineDB.db.transaction(store);
                tx.objectStore(store).get(key).onsuccess = (e) => resolve(e.target.result);
            }),
            getAll: async (store) => new Promise((resolve) => {
                if (!window.offlineDB.db) return resolve([]);
                const tx = window.offlineDB.db.transaction(store);
                tx.objectStore(store).getAll().onsuccess = (e) => resolve(e.target.result);
            }),
            put: async (store, data) => new Promise((resolve) => {
                if (!window.offlineDB.db) return resolve(null);
                const tx = window.offlineDB.db.transaction(store, 'readwrite');
                tx.objectStore(store).put(data).onsuccess = (e) => resolve(e.target.result);
            }),
            delete: async (store, key) => new Promise((resolve) => {
                if (!window.offlineDB.db) return resolve();
                const tx = window.offlineDB.db.transaction(store, 'readwrite');
                tx.objectStore(store).delete(key).onsuccess = () => resolve();
            })
        };
        window.offlineDB.init();
    </script>

    <script>
        try {
            firebase.initializeApp({
                apiKey: "AIzaSyDOFibCiMfYeVP4A6p6En9Jlml10eATGio",

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [view, setView] = useState('LOGIN');
            const [viewHistory, setViewHistory] = useState([]);
            const [user, setUser] = useState(null);
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
            const [data, setData] = useState({ inventory: [], sales: [], patients: [], users: [], expenses: [], medicalHistory: [] });
            const [cart, setCart] = useState([]);
            const [search, setSearch] = useState("");
            const [isOnline, setIsOnline] = useState(navigator.onLine);
            
            const [editing, setEditing] = useState(null); 
            const [checkoutModal, setCheckoutModal] = useState(false);
            const [amountTendered, setAmountTendered] = useState(0);
            const [checkoutPatient, setCheckoutPatient] = useState('');
            const [medicalHistoryModal, setMedicalHistoryModal] = useState(null);

            // Report States
            const [reportPeriod, setReportPeriod] = useState('DAILY');
            const [reportTab, setReportTab] = useState('SALES');
            const [reportSearch, setReportSearch] = useState('');

            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => {
                const handleOnline = () => setIsOnline(true);
                const handleOffline = () => setIsOnline(false);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            useEffect(() => {
                if (!window.db) { loadFromOfflineDB(); return; }
                const collections = ["inventory", "sales", "patients", "users", "expenses", "medicalHistory"];
                const unsubscribers = collections.map(col => 
                    window.db.collection(col).onSnapshot(
                        s => {
                            const docs = s.docs.map(d=>({id:d.id, ...d.data()}));
                            setData(p => ({...p, [col]: docs}));
                            docs.forEach(item => window.offlineDB.put(col, item));
                        },
                        err => loadFromOfflineDB()
                    )
                );
                return () => unsubscribers.forEach(u => u());
            }, []);

            const loadFromOfflineDB = async () => {
                const data_obj = {};
                for (const store of ["inventory","sales","patients","users","expenses","medicalHistory"]) {
                    data_obj[store] = await window.offlineDB.getAll(store);
                }
                setData(data_obj);
            };

            useEffect(() => {
                const init = async () => {
                    if (!window.db) return;
                    const snap = await window.db.collection("users").where("username", "==", "admin").get();
                    if (snap.empty) {
                        await window.db.collection("users").add({ username: "admin", pin: "1234", role: "MANAGER", status: "ACTIVE" });
                    }
                };
                init();
            }, []);

            const hasAccess = (level) => {
                const roles = { 'MANAGER': 4, 'PHARMACIST': 3, 'TECHNICIAN': 2, 'ASSISTANT': 1, 'DISPENSER': 0 };
                return roles[user?.role] >= roles[level];
            };

            const handleSetView = (newView) => {
                if (view !== newView) {
                    setViewHistory(prev => [...prev, view]);
                    setView(newView);
                    setSearch("");
                }
            };

            const handleGoBack = () => {
                if (viewHistory.length > 0) {
                    const prev = [...viewHistory];
                    const lastView = prev.pop();
                    setViewHistory(prev);
                    setView(lastView);
                    setSearch("");
                }
            };

            const handleLogin = async () => {
                const u = document.getElementById('u_box')?.value?.toLowerCase()?.trim();
                const p = document.getElementById('p_box')?.value?.trim();
                if (!u || !p || p.length !== 4 || isNaN(p)) return alert("Invalid credentials format");
                try {
                    if (window.db && isOnline) {
                        const snap = await window.db.collection("users").where("username", "==", u).where("pin", "==", String(p)).get();
                        if (!snap.empty) { 
                            const uData = { id: snap.docs[0].id, ...snap.docs[0].data() };
                            if (uData.status !== 'ACTIVE') return alert("Account INACTIVE");
                            setUser(uData); setView('DASHBOARD');
                        } else alert("Invalid Credentials");
                    } else {
                        const users = await window.offlineDB.getAll('users');
                        const found = users.find(usr => usr.username === u && String(usr.pin) === String(p) && usr.status === 'ACTIVE');
                        if (found) { setUser(found); setView('DASHBOARD'); }
                        else alert("Invalid Credentials");
                    }
                } catch (err) { alert("Auth Error: " + err.message); }
            };

            const handleLogout = () => {
                if (confirm("Logout?")) { setUser(null); setViewHistory([]); setView('LOGIN'); window.location.reload(); }
            };

            const handleDeletePersonnel = async (userItem) => {
                if (!hasAccess('MANAGER')) return alert("Access Denied: Admins only.");
                if (userItem.username.toLowerCase() === 'admin') return alert("Cannot delete the master admin account.");
                if(!confirm("⚠️ WARNING: Are you sure you want to completely permanently delete this personnel? This action cannot be undone.")) return;
                
                setEditing(null); // INSTANT UI CLOSE
                try {
                    if (window.db && isOnline) {
                        await window.db.collection('users').doc(userItem.id).delete();
                    } else {
                        await window.offlineDB.delete('users', userItem.id);
                        await loadFromOfflineDB();
                    }
                } catch (err) { alert("Error deleting personnel: " + err.message); }
            };

            const handleDeleteProduct = async (id) => {
                if (!hasAccess('MANAGER')) return alert("Access Denied: Admins only.");
                if(!confirm("⚠️ WARNING: Are you sure you want to completely delete this item and its details? This action cannot be undone.")) return;
                
                setEditing(null); // INSTANT UI CLOSE
                try {
                    if (window.db && isOnline) {
                        await window.db.collection('inventory').doc(id).delete();
                    } else {
                        await window.offlineDB.delete('inventory', id);
                        await loadFromOfflineDB();
                    }
                } catch (err) { alert("Error deleting item: " + err.message); }
            };

            const handleDeleteAllFinance = async () => {
                if (!hasAccess('MANAGER')) return alert("Access Denied: Admins only.");
                if(!confirm("⚠️ EXTREME WARNING: Are you sure you want to permanently delete ALL sales and expenses records? This CANNOT be undone!")) return;
                try {
                    if (window.db && isOnline) {
                        const salesDocs = await window.db.collection('sales').get();
                        for(let doc of salesDocs.docs) { await doc.ref.delete(); }
                        const expDocs = await window.db.collection('expenses').get();
                        for(let doc of expDocs.docs) { await doc.ref.delete(); }
                    } else {
                        const sales = await window.offlineDB.getAll('sales');
                        for(let s of sales) await window.offlineDB.delete('sales', s.id);
                        const exps = await window.offlineDB.getAll('expenses');
                        for(let e of exps) await window.offlineDB.delete('expenses', e.id);
                        await loadFromOfflineDB();
                    }
                } catch(err) { alert("Error deleting finance records: " + err.message); }
            };

            const addToCart = (p) => {
                if (p.stock <= 0) return alert("Item out of stock!");
                if (p.expiryDate && new Date(p.expiryDate) < new Date()) return alert("⚠️ Error: Cannot sell an expired item!");
                
                setCart(prev => {
                    const ex = prev.find(i => i.id === p.id);
                    if (ex) return prev.map(i => i.id === p.id ? {...i, qty: i.qty + 1} : i);
                    return [...prev, {...p, qty: 1, currentPrice: p.price}];
                });
            };

            const updateCartItem = (id, field, val) => {
                setCart(prev => prev.map(i => i.id === id ? {...i, [field]: Number(val) || 0} : i));
            };

            const openCheckoutModal = () => {
                if(cart.length === 0) return alert("Cart is empty");
                setAmountTendered('');
                setCheckoutPatient('');
                setCheckoutModal(true);
            };

            const finalizeSale = async (method) => {
                if (method === 'DEBT' && !checkoutPatient) return alert("Please select a client to issue on credit!");

                const total = cart.reduce((s,i)=>s+(i.currentPrice*i.qty), 0);
                const totalCost = cart.reduce((s,i)=>s+(i.costPrice*i.qty), 0);
                const changeAmount = (method === 'CASH' && amountTendered > total) ? (amountTendered - total) : 0;
                
                const saleData = { 
                    total, 
                    profit: total - totalCost, 
                    amountTendered: method === 'CASH' ? amountTendered : total,
                    changeGiven: changeAmount,
                    timestamp: new Date().toISOString(), 
                    soldBy: user.username, 
                    method, 
                    items: cart, 
                    patientId: checkoutPatient || null 
                };
                
                const currentCart = [...cart];
                setCart([]); 
                setCheckoutModal(false); // INSTANT UI CLOSE

                try {
                    if (window.db && isOnline) {
                        await window.db.collection("sales").add(saleData);
                        if (method === 'DEBT' && checkoutPatient) {
                            const pt = data.patients.find(p => p.id === checkoutPatient);
                            if(pt) await window.db.collection("patients").doc(checkoutPatient).update({ creditBalance: (Number(pt.creditBalance) || 0) + total });
                        }
                        for(const i of currentCart) {
                            await window.db.collection("inventory").doc(i.id).update({ stock: i.stock - i.qty });
                        }
                    } else {
                        await window.offlineDB.put('syncQueue', { type: 'sale', data: saleData });
                        await window.offlineDB.put('sales', { id: `offline_${Date.now()}`, ...saleData });
                        if (method === 'DEBT' && checkoutPatient) {
                            const pt = data.patients.find(p => p.id === checkoutPatient);
                            if(pt) await window.offlineDB.put('patients', { ...pt, creditBalance: (Number(pt.creditBalance) || 0) + total });
                        }
                        for(const i of currentCart) {
                            await window.offlineDB.put('inventory', { ...i, stock: i.stock - i.qty });
                        }
                        await loadFromOfflineDB();
                    }
                } catch(e) { 
                    alert("Error completing sale: " + e.message); 
                    setCart(currentCart); // Revert UI if it fails
                }
            };

            const addMedicalHistory = async (patientId, record) => {
                if (!hasAccess('MANAGER')) return alert("Access Denied: Admins only.");
                const historyRecord = {
                    patientId,
                    date: new Date().toISOString(),
                    diagnosis: record.diagnosis,
                    treatment: record.treatment,
                    drugs: record.drugs,
                    allergies: record.allergies,
                    notes: record.notes
                };

                if (window.db && isOnline) {
                    await window.db.collection("medicalHistory").add(historyRecord);
                } else {
                    await window.offlineDB.put('medicalHistory', { id: `hist_${Date.now()}`, ...historyRecord });
                    await loadFromOfflineDB();
                }
            };

            const exportToExcel = (exportData, filename) => {
                if(exportData.length === 0) return alert("No data to export");
                const ws = XLSX.utils.json_to_sheet(exportData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Data");
                XLSX.writeFile(wb, `${filename}_${new Date().toLocaleDateString().replace(/\//g, '-')}.xlsx`);
            };

            // Global Metrics for Finance View
            const getFinanceMetrics = useMemo(() => {
                const monthlyData = {};
                const weeklyData = {};
                const staffSales = {};

                data.sales.forEach(s => {
                    const d = new Date(s.timestamp);
                    const monthKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2, '0')}`;
                    
                    const firstDayOfYear = new Date(d.getFullYear(), 0, 1);
                    const pastDaysOfYear = (d - firstDayOfYear) / 86400000;
                    const weekNum = Math.ceil((pastDaysOfYear + firstDayOfYear.getDay() + 1) / 7);
                    const weekKey = `${d.getFullYear()} Week ${weekNum}`;

                    if(!monthlyData[monthKey]) monthlyData[monthKey] = { revenue: 0, profit: 0, loss: 0 };
                    monthlyData[monthKey].revenue += s.total;
                    monthlyData[monthKey].profit += s.profit;

                    if(!weeklyData[weekKey]) weeklyData[weekKey] = 0;
                    weeklyData[weekKey] += s.total;

                    if(!staffSales[s.soldBy]) staffSales[s.soldBy] = 0;
                    staffSales[s.soldBy] += s.total;
                });

                data.expenses.forEach(e => {
                    const d = new Date(e.timestamp || e.date || Date.now());
                    const monthKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2, '0')}`;
                    if(!monthlyData[monthKey]) monthlyData[monthKey] = { revenue: 0, profit: 0, loss: 0 };
                    monthlyData[monthKey].loss += Number(e.amount);
                });

                let bestMonth = { label: 'None', revenue: 0 };
                Object.keys(monthlyData).forEach(k => {
                    if (monthlyData[k].revenue > bestMonth.revenue) bestMonth = { label: k, revenue: monthlyData[k].revenue };
                });

                let bestWeek = { label: 'None', revenue: 0 };
                Object.keys(weeklyData).forEach(k => {
                    if (weeklyData[k] > bestWeek.revenue) bestWeek = { label: k, revenue: weeklyData[k] };
                });

                let bestStaff = { name: 'None', revenue: 0 };
                Object.keys(staffSales).forEach(k => {
                    if (staffSales[k] > bestStaff.revenue) bestStaff = { name: k, revenue: staffSales[k] };
                });

                return { monthlyData, bestMonth, bestWeek, bestStaff };
            }, [data.sales, data.expenses]);

            // Filtered Metrics exclusively for the Reports Dashboard
            const filteredReportData = useMemo(() => {
                const now = new Date();
                let startDate = new Date();
                
                if (reportPeriod === 'DAILY') {
                    startDate.setHours(0,0,0,0);
                } else if (reportPeriod === 'WEEKLY') {
                    startDate.setDate(startDate.getDate() - 7);
                    startDate.setHours(0,0,0,0);
                } else if (reportPeriod === 'MONTHLY') {
                    startDate = new Date(now.getFullYear(), now.getMonth(), 1);
                }

                const sLower = reportSearch.toLowerCase();

                const rSales = data.sales.filter(s => {
                    if (new Date(s.timestamp) < startDate) return false;
                    if (!sLower) return true;
                    return (s.soldBy || '').toLowerCase().includes(sLower) ||
                           (s.method || '').toLowerCase().includes(sLower) ||
                           (s.items || []).some(i => (i.brandName || '').toLowerCase().includes(sLower));
                });

                const rExpenses = data.expenses.filter(e => {
                    if (new Date(e.timestamp || Date.now()) < startDate) return false;
                    if (!sLower) return true;
                    return (e.description || '').toLowerCase().includes(sLower);
                });

                const rExpired = data.inventory.filter(i => {
                    if (!i.expiryDate) return false;
                    if (new Date(i.expiryDate) >= now) return false;
                    if (!sLower) return true;
                    return (i.brandName || '').toLowerCase().includes(sLower) ||
                           (i.genericName || '').toLowerCase().includes(sLower) ||
                           (i.category || '').toLowerCase().includes(sLower);
                });

                return {
                    sales: rSales,
                    expenses: rExpenses,
                    expired: rExpired,
                    totalSales: rSales.reduce((a, b) => a + b.total, 0),
                    totalProfit: rSales.reduce((a, b) => a + b.profit, 0),
                    totalLosses: rExpenses.reduce((a, b) => a + Number(b.amount), 0),
                    expiredCost: rExpired.reduce((a, b) => a + (Number(b.costPrice) * Number(b.stock)), 0)
                };
            }, [data, reportPeriod, reportSearch]);

            const getItemProfitability = () => {
                const itemStats = {};
                data.sales.forEach(sale => {
                    (sale.items || []).forEach(item => {
                        if (!itemStats[item.id]) {
                            itemStats[item.id] = { name: item.brandName, qty: 0, revenue: 0, cost: 0, profit: 0 };
                        }
                        itemStats[item.id].qty += Number(item.qty);
                        itemStats[item.id].revenue += (Number(item.currentPrice) * Number(item.qty));
                        itemStats[item.id].cost += (Number(item.costPrice) * Number(item.qty));
                        itemStats[item.id].profit += ((Number(item.currentPrice) - Number(item.costPrice)) * Number(item.qty));
                    });
                });
                return Object.values(itemStats).sort((a,b) => b.profit - a.profit);
            };

            const inventoryTotalCost = data.inventory.reduce((a,b)=>a+(Number(b.costPrice)*Number(b.stock)), 0);
            const inventoryTotalValue = data.inventory.reduce((a,b)=>a+(Number(b.price)*Number(b.stock)), 0);
            const inventoryTotalProfit = inventoryTotalValue - inventoryTotalCost;
            
            const totalNetProfit = data.sales.reduce((a,b)=>a+Number(b.profit),0) - data.expenses.reduce((a,b)=>a+Number(b.amount),0);

            useEffect(() => {
                if (view !== 'FINANCE') return;
                const last7Days = [...Array(7)].map((_, i) => {
                    const d = new Date(); d.setDate(d.getDate() - i);
                    return d.toLocaleDateString();
                }).reverse();

                const revenueByDay = last7Days.map(date => data.sales.filter(s => new Date(s.timestamp).toLocaleDateString() === date).reduce((sum, s) => sum + s.total, 0));
                const profitByDay = last7Days.map(date => data.sales.filter(s => new Date(s.timestamp).toLocaleDateString() === date).reduce((sum, s) => sum + s.profit, 0));

                const ctx = document.getElementById('financeChart');
                if (!ctx) return;
                if (window.financeChartInstance) window.financeChartInstance.destroy();

                window.financeChartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: last7Days,
                        datasets: [
                            { label: 'Revenue (TZS)', data: revenueByDay, backgroundColor: '#10b981', borderRadius: 4 },
                            { label: 'Profit (TZS)', data: profitByDay, backgroundColor: '#3b82f6', borderRadius: 4 }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        scales: {
                            y: { beginAtZero: true, grid: { color: '#1e293b' }, ticks: { color: '#64748b' } },
                            x: { grid: { display: false }, ticks: { color: '#64748b' } }
                        },
                        plugins: { legend: { labels: { color: '#cbd5e1', font: { family: 'Plus Jakarta Sans' } } } }
                    }
                });

                return () => { if (window.financeChartInstance) window.financeChartInstance.destroy(); };
            }, [view, data.sales]);

            if (!user) {
                return (

                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
                                <div className="bg-slate-900 border border-slate-800 w-full max-w-2xl p-6 md:p-10 rounded-[4rem] shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                                    <h3 className="text-2xl md:text-3xl font-black text-emerald-500 uppercase mb-4 shrink-0">Medical History: {medicalHistoryModal.name}</h3>
                                    
                                    {hasAccess('MANAGER') && (
                                        <form onSubmit={(e) => {
                                            e.preventDefault();
                                            if (!hasAccess('MANAGER')) return alert("Access Denied: Admins only.");
                                            const fd = new FormData(e.target);
                                            
                                            const currentPatientId = medicalHistoryModal.id;
                                            setMedicalHistoryModal(null); // INSTANT UI CLOSE
                                            
                                            addMedicalHistory(currentPatientId, {
                                                diagnosis: fd.get('diagnosis'), treatment: fd.get('treatment'),
                                                drugs: fd.get('drugs'), allergies: fd.get('allergies'), notes: fd.get('notes')
                                            });
                                        }} className="space-y-4 mb-6 shrink-0 bg-black p-4 rounded-3xl border border-slate-800">
                                            <p className="font-black text-slate-500 text-xs uppercase mb-2">New Entry</p>
                                            <input name="diagnosis" placeholder="Diagnosis / Condition" required className="w-full p-3 bg-slate-900 rounded-xl outline-none border border-slate-700 text-white font-bold text-sm" />
                                            <div className="grid grid-cols-2 gap-3">
                                                <input name="treatment" placeholder="Treatment Given" className="w-full p-3 bg-slate-900 rounded-xl outline-none border border-slate-700 text-white font-bold text-sm" />
                                                <input name="drugs" placeholder="Drugs Prescribed" className="w-full p-3 bg-slate-900 rounded-xl outline-none border border-slate-700 text-white font-bold text-sm" />
                                            </div>
                                            <textarea name="notes" placeholder="Additional Notes / Allergies" rows="2" className="w-full p-3 bg-slate-900 rounded-xl outline-none border border-slate-700 text-white font-bold text-sm" />
                                            <button type="submit" className="w-full bg-emerald-600 text-white py-3 rounded-xl font-black shadow-lg hover:bg-emerald-500 transition-all text-sm">ADD RECORD</button>
                                        </form>
                                    )}

                                    <div className="flex-1 overflow-y-auto no-scrollbar space-y-4 pr-2">
                                        <p className="font-black text-slate-500 text-xs uppercase sticky top-0 bg-slate-900 z-10 py-2">Patient Timeline</p>
                                        {data.medicalHistory.filter(h => h.patientId === medicalHistoryModal.id).sort((a,b)=>new Date(b.date)-new Date(a.date)).map(h => (
                                            <div key={h.id} className="bg-black p-4 md:p-5 rounded-[2rem] border-l-4 border-emerald-500 flex flex-col gap-1 shadow-lg">
                                                <div className="flex justify-between items-start mb-2">
                                                    <p className="font-black text-emerald-400 text-sm md:text-base uppercase">{h.diagnosis}</p>
                                                    <p className="text-[9px] md:text-[10px] text-slate-500 font-bold bg-slate-900 px-2 py-1 rounded-lg">{new Date(h.date).toLocaleDateString()}</p>
                                                </div>
                                                {h.treatment && <p className="text-xs md:text-sm text-slate-300"><span className="text-slate-500 font-bold">Treatment:</span> {h.treatment}</p>}
                                                {h.drugs && <p className="text-xs md:text-sm text-slate-300"><span className="text-slate-500 font-bold">Drugs:</span> {h.drugs}</p>}
                                                {h.allergies && <p className="text-xs md:text-sm text-slate-300"><span className="text-rose-500 font-bold">Allergies:</span> {h.allergies}</p>}
                                                {h.notes && <p className="text-[10px] md:text-xs text-slate-400 italic mt-2 bg-slate-900 p-2 rounded-lg">"{h.notes}"</p>}
                                            </div>
                                        ))}
                                        {data.medicalHistory.filter(h => h.patientId === medicalHistoryModal.id).length === 0 && (
                                            <p className="text-slate-500 font-bold text-xs text-center py-6">No previous records found.</p>
                                        )}
                                    </div>

                                    <button onClick={()=>setMedicalHistoryModal(null)} className="w-full mt-4 shrink-0 bg-slate-800 text-slate-300 py-4 rounded-3xl font-black text-xs uppercase tracking-widest hover:bg-slate-700 transition">CLOSE TIMELINE</button>
                                </div>
                            </div>
                        )}

                        {/* CHECKOUT MODAL */}
                        {checkoutModal && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
                                <div className="bg-slate-900 border border-slate-800 w-full max-w-md p-6 md:p-10 rounded-[4rem] shadow-2xl flex flex-col">
                                    <h3 className="text-2xl md:text-3xl font-black text-emerald-500 italic mb-4 text-center">Finalize Bill</h3>
                                    
                                    <div className="mb-6 bg-black p-5 rounded-[2rem] border border-slate-800 text-center shadow-inner">
                                        <p className="text-slate-500 font-black text-[10px] uppercase mb-1 tracking-widest">Total Amount Due</p>
                                        <p className="text-3xl md:text-4xl font-black text-emerald-400">{cart.reduce((s,i)=>s+(i.currentPrice*i.qty), 0).toLocaleString()} <span className="text-lg text-emerald-700">TZS</span></p>
                                    </div>
                                    
                                    <div className="mb-6 space-y-3">
                                        <input type="number" value={amountTendered || ''} onChange={(e)=>setAmountTendered(Number(e.target.value))} placeholder="Amount Tendered (CASH)" className="w-full p-4 bg-black rounded-2xl border border-slate-700 text-white font-bold text-center text-lg outline-none focus:border-emerald-500" />
                                        <div className="bg-slate-800 p-4 rounded-2xl flex justify-between items-center shadow-inner">
                                            <span className="text-slate-400 font-black uppercase text-[10px] tracking-widest">Change / Return</span>
                                            <span className={`text-xl font-black ${(amountTendered - cart.reduce((s,i)=>s+(i.currentPrice*i.qty), 0)) >= 0 ? 'text-blue-400' : 'text-rose-400'}`}>
                                                {amountTendered ? (amountTendered - cart.reduce((s,i)=>s+(i.currentPrice*i.qty), 0)).toLocaleString() : 0} TZS
                                            </span>
                                        </div>
                                    </div>

                                    <div className="mb-6 border-t border-slate-800 pt-6">
                                        <p className="text-slate-500 font-black text-[10px] uppercase mb-3 tracking-widest text-center">Client Credit Issue (Optional)</p>
                                        <select value={checkoutPatient} onChange={(e) => setCheckoutPatient(e.target.value)} className="w-full p-4 bg-black rounded-2xl border border-slate-700 text-white font-bold text-sm outline-none">
                                            <option value="">-- Select Client --</option>
                                            {data.patients.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                                        </select>
                                    </div>

                                    <div className="space-y-3 mb-6">
                                        <button onClick={()=>finalizeSale('CASH')} className="w-full py-4 bg-emerald-600 text-white rounded-[2rem] font-black shadow-xl hover:bg-emerald-500 transition-all text-sm md:text-base">💵 CASH</button>
                                        <div className="flex gap-3">
                                            <button onClick={()=>finalizeSale('MOBILE')} className="flex-1 py-4 bg-blue-600 text-white rounded-[2rem] font-black shadow-xl hover:bg-blue-500 transition-all text-sm">📱 MOBILE/CARD</button>
                                            <button onClick={()=>finalizeSale('DEBT')} className="flex-1 py-4 bg-rose-600 text-white rounded-[2rem] font-black shadow-xl hover:bg-rose-500 transition-all text-sm">📝 CREDIT</button>
                                        </div>
                                    </div>

                                    <button onClick={()=>setCheckoutModal(false)} className="text-slate-500 font-bold text-[10px] uppercase tracking-widest hover:text-white text-center w-full py-2">CANCEL</button>
                                </div>
                            </div>
                        )}
                        
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('apex-root'));
        root.render(<App />);
    </script>
</body>
</html>
