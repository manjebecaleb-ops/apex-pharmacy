<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX | Sovereign Enterprise</title>
    <!-- PRODUCTION LIBRARIES -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: white; margin: 0; }
        .active-tab { background: #10b981 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="apex-root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #020617; color: #10b981;">
            <h1 style="font-size: 3rem; font-weight: 900; font-style: italic;">APEX</h1>
            <p style="color: #64748b; margin-top: 10px;">BOOTING SECURE CORE...</p>
        </div>
    </div>

    <!-- 1. CLOUD ENGINE (FIREBASE) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, query, where, getDocs, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAAazqZ1XnzpQ6A_cCHyQEsgXxq5jVVLXE",
            authDomain: "apex-pharmacy-a69b5.firebaseapp.com",
            projectId: "apex-pharmacy-a69b5",
            storageBucket: "apex-pharmacy-a69b5.firebasestorage.app",
            messagingSenderId: "28559683699",
            appId: "1:28559683699:web:1cc3f16a98a32463657a06",
            measurementId: "G-SVDCM1Y693"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.api = { collection, onSnapshot, addDoc, updateDoc, doc, query, where, getDocs, deleteDoc, orderBy };
    </script>

    <!-- 2. APEX INTERFACE LOGIC -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('LOGIN');
            const [user, setUser] = useState(null);
            const [inventory, setInventory] = useState([]);
            const [sales, setSales] = useState([]);
            const [patients, setPatients] = useState([]);
            const [users, setUsers] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [cart, setCart] = useState([]);
            const [search, setSearch] = useState("");

            // --- CLOUD SYNC ---
            useEffect(() => {
                if (!window.db) return;
                const unsubInv = window.api.onSnapshot(window.api.collection(window.db, "inventory"), (s) => setInventory(s.docs.map(d=>({id:d.id, ...d.data()}))));
                const unsubSales = window.api.onSnapshot(window.api.collection(window.db, "sales"), (s) => setSales(s.docs.map(d=>({id:d.id, ...d.data()}))));
                const unsubPatients = window.api.onSnapshot(window.api.collection(window.db, "patients"), (s) => setPatients(s.docs.map(d=>({id:d.id, ...d.data()}))));
                const unsubUsers = window.api.onSnapshot(window.api.collection(window.db, "users"), (s) => setUsers(s.docs.map(d=>({id:d.id, ...d.data()}))));
                const unsubExp = window.api.onSnapshot(window.api.collection(window.db, "expenses"), (s) => setExpenses(s.docs.map(d=>({id:d.id, ...d.data()}))));
                return () => { unsubInv(); unsubSales(); unsubPatients(); unsubUsers(); unsubExp(); };
            }, []);

            // --- LOGIN LOGIC ---
            const handleLogin = async () => {
                const u = document.getElementById('u_box').value.toLowerCase().trim();
                const p = document.getElementById('p_box').value.trim();
                const q = window.api.query(window.api.collection(window.db, "users"), window.api.where("username", "==", u), window.api.where("pin", "==", p));
                const snap = await window.api.getDocs(q);
                if (!snap.empty) { 
                    setUser(snap.docs[0].data()); 
                    setView('DASHBOARD'); 
                } else alert("Invalid PIN or Username");
            };

            // --- POS LOGIC ---
            const addToCart = (p) => {
                setCart(prev => {
                    const ex = prev.find(i => i.id === p.id);
                    if (ex) return prev.map(i => i.id === p.id ? {...i, qty: i.qty + 1} : i);
                    return [...prev, {...p, qty: 1}];
                });
            };

            const updateCartQty = (id, val) => {
                setCart(prev => prev.map(i => i.id === id ? {...i, qty: parseInt(val) || 0} : i));
            };

            const finalizeSale = async () => {
                const total = cart.reduce((s,i)=>s+(i.price*i.qty),0);
                await window.api.addDoc(window.api.collection(window.db, "sales"), { total, timestamp: new Date().toISOString(), soldBy: user.username, items: cart });
                for(const i of cart) await window.api.updateDoc(window.api.doc(window.db, "inventory", i.id), { stock: i.stock - i.qty });
                setCart([]); alert("Transaction Authorized");
            };

            // --- UI RENDER: LOGIN ---
            if (view === 'LOGIN') {
                return (
                    <div className="h-screen flex items-center justify-center bg-black">
                        <div className="bg-slate-900 p-12 rounded-[3.5rem] shadow-2xl w-full max-w-sm text-center border border-slate-800">
                            <h1 className="text-5xl font-black text-emerald-500 mb-2 italic tracking-tighter">APEX</h1>
                            <p className="text-slate-500 text-[10px] font-bold uppercase mb-10 tracking-[0.3em]">Cloud ERP</p>
                            <input id="u_box" placeholder="Username" className="w-full p-4 mb-3 bg-slate-800 rounded-2xl outline-none border border-slate-700" />
                            <input id="p_box" type="password" placeholder="PIN" className="w-full p-4 mb-8 bg-slate-800 rounded-2xl outline-none border border-slate-700 text-center font-bold tracking-[1em]" />
                            <button onClick={handleLogin} className="w-full bg-emerald-600 text-white py-5 rounded-[2rem] font-black shadow-lg">ENTER VAULT</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden bg-slate-950">
                    {/* SIDEBAR */}
                    <aside className="w-72 bg-black border-r border-slate-800 p-8 flex flex-col shrink-0">
                        <h2 className="text-2xl font-black text-emerald-500 italic mb-10">APEX PRO</h2>
                        <nav className="flex-1 space-y-1">
                            {['DASHBOARD', 'POS', 'INVENTORY', 'PATIENTS', 'REPORTS', 'FINANCE', 'USERS'].map(v => (
                                <button key={v} onClick={()=>setView(v)} className={`w-full text-left p-4 rounded-2xl font-black text-[10px] tracking-widest transition-all ${view===v?'active-tab':'text-slate-500 hover:bg-slate-900'}`}>{v}</button>
                            ))}
                        </nav>
                        <button onClick={()=>window.location.reload()} className="text-rose-500 font-bold text-[10px] uppercase tracking-widest">Logout</button>
                    </aside>

                    {/* MAIN */}
                    <main className="flex-1 p-10 overflow-auto no-scrollbar">
                        
                        {view === 'DASHBOARD' && (
                            <div className="animate-in fade-in duration-700">
                                <h2 className="text-3xl font-black mb-8 tracking-tighter">Operations Command</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-slate-900 p-10 rounded-[3rem] border border-slate-800 shadow-xl border-l-8 border-emerald-500">
                                        <p className="text-slate-500 text-xs font-bold uppercase mb-2">Daily Revenue</p>
                                        <h3 className="text-3xl font-black text-emerald-400">{(sales || []).reduce((a,b)=>a+(b.total||0),0).toLocaleString()} TZS</h3>
                                    </div>
                                    <div className="bg-slate-900 p-10 rounded-[3rem] border border-slate-800 shadow-xl border-l-8 border-blue-500">
                                        <p className="text-slate-500 text-xs font-bold uppercase mb-2">Inventory Stock</p>
                                        <h3 className="text-3xl font-black text-blue-400">{(inventory || []).length} Items</h3>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'POS' && (
                            <div className="flex gap-8 h-full animate-in slide-in-from-bottom duration-500">
                                <div className="flex-1 space-y-6 overflow-y-auto no-scrollbar px-1">
                                    <input placeholder="Search brand, generic or symptoms..." className="w-full p-6 bg-slate-900 border border-slate-800 rounded-[2rem] text-xl font-bold outline-none focus:ring-2 ring-emerald-500" onChange={(e)=>setSearch(e.target.value.toLowerCase())} />
                                    <div className="grid grid-cols-2 gap-4">
                                        {inventory.filter(p => p.brandName.toLowerCase().includes(search)).map(p => (
                                            <div key={p.id} onClick={()=>addToCart(p)} className="bg-slate-900 border border-slate-800 p-6 rounded-[2.5rem] hover:border-emerald-500 cursor-pointer shadow-xl active:scale-95 transition-all">
                                                <p className="font-black text-xl mb-1 tracking-tight">{p.brandName}</p>
                                                <p className="text-[10px] text-slate-500 font-bold uppercase mb-4">{p.genericName} • {p.strength}</p>
                                                <div className="flex justify-between items-center">
                                                    <span className="text-2xl font-black text-emerald-400">{Number(p.price).toLocaleString()}</span>
                                                    <span className="text-[10px] font-black text-slate-600">STK: {p.stock}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="w-96 bg-white text-slate-900 p-8 rounded-[3rem] shadow-2xl h-fit border-t-8 border-emerald-600 sticky top-0 flex flex-col">
                                    <h3 className="font-black text-2xl mb-8 tracking-tighter uppercase underline decoration-emerald-500">Cart</h3>
                                    <div className="space-y-4 mb-8 overflow-auto max-h-64 px-1">
                                        {cart.map(i => (
                                            <div key={i.id} className="flex justify-between items-center border-b pb-4">
                                                <div className="flex-1"><p className="text-sm font-bold uppercase">{i.brandName}</p><p className="text-[10px] opacity-40">{i.price} / unit</p></div>
                                                <input type="number" value={i.qty} onChange={(e)=>updateCartQty(i.id, e.target.value)} className="w-16 p-2 bg-slate-50 rounded-xl text-center font-black text-emerald-600 outline-none" />
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex justify-between font-black text-4xl mb-10 tracking-tighter text-emerald-600"><span>Total</span><span>{cart.reduce((s,i)=>s+(i.price*i.qty),0).toLocaleString()}</span></div>
                                    <button onClick={finalizeSale} className="w-full bg-emerald-600 text-white py-6 rounded-[2rem] font-black shadow-lg">FINALIZE SALE</button>
                                </div>
                            </div>
                        )}

                        {view === 'INVENTORY' && (
                            <div className="bg-slate-900 p-10 rounded-[3.5rem] border border-slate-800 shadow-sm">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-3xl font-black text-emerald-500 uppercase">Inventory Vault</h2>
                                    <button onClick={async ()=>{
                                        const n = prompt("Brand:"); const p = prompt("Price:"); const s = prompt("Stock:");
                                        if(n) await window.api.addDoc(window.api.collection(window.db, "inventory"), { brandName: n.toUpperCase(), price: Number(p), stock: Number(s) });
                                    }} className="bg-emerald-600 text-white px-8 py-3 rounded-2xl font-black">+ Add Stock</button>
                                </div>
                                <table className="w-full text-left">
                                    <thead><tr className="text-slate-500 text-[10px] font-bold uppercase border-b border-slate-800 pb-4"><th>Name</th><th>Stock</th><th className="text-right">Price</th></tr></thead>
                                    <tbody className="font-bold">{inventory.map(p => (
                                        <tr key={p.id} className="border-b border-slate-800/50"><td className="py-4 font-black">{p.brandName}</td><td>{p.stock}</td><td className="text-right text-emerald-400">{Number(p.price).toLocaleString()}</td></tr>
                                    ))}</tbody>
                                </table>
                            </div>
                        )}

                        {view === 'PATIENTS' && (
                            <div className="bg-slate-900 p-10 rounded-[3.5rem] border border-slate-800">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-3xl font-black text-emerald-500 uppercase">Patient Registry</h2>
                                    <button onClick={async ()=>{
                                        const n = prompt("Name:"), c = prompt("Card ID:");
                                        if(n) await window.api.addDoc(window.api.collection(window.db, "patients"), { name:n.toUpperCase(), cardId:c });
                                    }} className="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg">+ New Registry</button>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    {patients.map(pt => (
                                        <div key={pt.id} className="p-8 bg-black rounded-[3rem] border border-slate-800 flex justify-between items-center">
                                            <div><h4 className="font-black text-xl text-white uppercase">{pt.name}</h4><p className="text-xs text-slate-500 font-bold mt-1 tracking-widest">ID: {pt.cardId}</p></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const bootSequence = setInterval(() => {
            if (window.db) {
                const root = ReactDOM.createRoot(document.getElementById('apex-root'));
                root.render(<App />);
                clearInterval(bootSequence);
            }
        }, 500);
    </script>
</body>
</html>
