<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX | Sovereign Enterprise ERP</title>
    <!-- PRODUCTION LIBRARIES -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; background-color: #020617; color: white; }
        .active-tab { background: #10b981 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-modal { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="apex-root"></div>

    <!-- 1. CLOUD ENGINE (FIREBASE) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, query, where, getDocs, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAAazqZ1XnzpQ6A_cCHyQEsgXxq5jVVLXE",
            authDomain: "apex-pharmacy-a69b5.firebaseapp.com",
            projectId: "apex-pharmacy-a69b5",
            storageBucket: "apex-pharmacy-a69b5.firebasestorage.app",
            messagingSenderId: "28559683699",
            appId: "1:28559683699:web:1cc3f16a98a32463657a06",
            measurementId: "G-SVDCM1Y693"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.api = { collection, onSnapshot, addDoc, updateDoc, doc, query, where, getDocs, deleteDoc, orderBy };
    </script>

    <!-- 2. APEX INTELLIGENCE LOGIC -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('DASHBOARD');
            const [user, setUser] = useState(null);
            const [data, setData] = useState({ inventory: [], sales: [], users: [] });
            const [cart, setCart] = useState([]);
            const [editItem, setEditItem] = useState(null); // Track item being modified

            useEffect(() => {
                if (!window.db) return;
                const unsubInv = window.api.onSnapshot(window.api.collection(window.db, "inventory"), (s) => setData(p => ({...p, inventory: s.docs.map(d=>({id:d.id, ...d.data()}))})));
                const unsubSales = window.api.onSnapshot(window.api.collection(window.db, "sales"), (s) => setData(p => ({...p, sales: s.docs.map(d=>({id:d.id, ...d.data()}))})));
                const unsubUsers = window.api.onSnapshot(window.api.collection(window.db, "users"), (s) => setData(p => ({...p, users: s.docs.map(d=>({id:d.id, ...d.data()}))})));
                return () => { unsubInv(); unsubSales(); unsubUsers(); };
            }, []);

            // LOGIN
            const handleLogin = async () => {
                const u = document.getElementById('u_box').value.toLowerCase().trim();
                const p = document.getElementById('p_box').value.trim();
                const q = window.api.query(window.api.collection(window.db, "users"), window.api.where("username", "==", u), window.api.where("pin", "==", p));
                const snap = await window.api.getDocs(q);
                if (!snap.empty) { setUser(snap.docs[0].data()); setView('DASHBOARD'); }
                else alert("Denied");
            };

            // INVENTORY ACTIONS
            const deleteItem = async (id) => {
                if(confirm("Permanently remove this item from the vault?")) {
                    await window.api.deleteDoc(window.api.doc(window.db, "inventory", id));
                    setEditItem(null);
                }
            };

            const updateItem = async (e) => {
                e.preventDefault();
                const d = new FormData(e.target);
                const updated = {
                    brandName: d.get('brand').toUpperCase(),
                    genericName: d.get('generic'),
                    price: Number(d.get('price')),
                    costPrice: Number(d.get('cost')),
                    stock: Number(d.get('stock')),
                    strength: d.get('strength'),
                    category: d.get('category')
                };
                await window.api.updateDoc(window.api.doc(window.db, "inventory", editItem.id), updated);
                setEditItem(null);
                alert("Vault Updated");
            };

            if (!user) {
                return (
                    <div className="h-screen flex items-center justify-center bg-black">
                        <div className="bg-slate-900 p-12 rounded-[4rem] shadow-2xl w-full max-w-sm text-center border border-slate-800">
                            <h1 className="text-5xl font-black text-emerald-500 mb-2 italic tracking-tighter">APEX</h1>
                            <input id="u_box" placeholder="Username" className="w-full p-4 mb-3 bg-slate-800 rounded-2xl outline-none border border-slate-700 text-center font-bold" />
                            <input id="p_box" type="password" placeholder="PIN" className="w-full p-4 mb-8 bg-slate-800 rounded-2xl outline-none border border-slate-700 text-center font-bold" />
                            <button onClick={handleLogin} className="w-full bg-emerald-600 text-white py-5 rounded-[2rem] font-black text-xl shadow-lg">LOGIN</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen bg-slate-950 text-white overflow-hidden">
                    {/* SIDEBAR */}
                    <aside className="w-64 bg-black border-r border-slate-800 p-6 flex flex-col shrink-0">
                        <h2 className="text-xl font-black text-emerald-500 mb-10 italic">APEX PRO</h2>
                        <nav className="flex-1 space-y-2">
                            {['DASHBOARD', 'POS', 'STOO'].map(v => (
                                <button key={v} onClick={()=>setView(v)} className={`w-full text-left p-4 rounded-xl font-bold text-xs uppercase tracking-widest ${view===v?'active-tab':'text-slate-500'}`}>{v}</button>
                            ))}
                        </nav>
                        <button onClick={()=>window.location.reload()} className="text-rose-500 font-bold text-[10px] uppercase">Logout</button>
                    </aside>

                    {/* MAIN */}
                    <main className="flex-1 p-10 overflow-auto no-scrollbar relative">
                        {view === 'DASHBOARD' && (
                            <div className="grid grid-cols-2 gap-6">
                                <div className="bg-slate-900 p-8 rounded-3xl border border-slate-800 border-l-8 border-emerald-500">
                                    <p className="text-slate-500 text-xs font-bold uppercase">Total Revenue</p>
                                    <h3 className="text-3xl font-black">{data.sales.reduce((a,b)=>a+b.total,0).toLocaleString()} TZS</h3>
                                </div>
                                <div className="bg-slate-900 p-8 rounded-3xl border border-slate-800 border-l-8 border-blue-500">
                                    <p className="text-slate-500 text-xs font-bold uppercase">Inventory Items</p>
                                    <h3 className="text-3xl font-black">{data.inventory.length} Items</h3>
                                </div>
                            </div>
                        )}

                        {view === 'STOO' && (
                            <div className="animate-in fade-in duration-500">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-2xl font-black uppercase">Stock Management</h2>
                                    <button onClick={async ()=>{
                                        const n = prompt("Brand:"); const p = prompt("Price:"); const s = prompt("Stock:");
                                        if(n) await window.api.addDoc(window.api.collection(window.db, "inventory"), { brandName: n.toUpperCase(), price: Number(p), costPrice: 0, stock: Number(s), strength: '500mg', category: 'Medicine' });
                                    }} className="bg-emerald-600 px-8 py-3 rounded-2xl font-black">+ Add New</button>
                                </div>
                                <div className="bg-slate-900 rounded-[2.5rem] border border-slate-800 overflow-hidden">
                                    <table className="w-full text-left">
                                        <thead className="bg-black text-slate-500 text-[10px] font-bold uppercase">
                                            <tr><th className="p-6">Medicine</th><th>Stock</th><th>Price</th><th className="text-right">Action</th></tr>
                                        </thead>
                                        <tbody className="font-bold">
                                            {data.inventory.map(p => (
                                                <tr key={p.id} className="border-b border-slate-800/50 hover:bg-white/5 transition-all">
                                                    <td className="p-6">
                                                        <p className="font-black text-white uppercase">{p.brandName}</p>
                                                        <p className="text-[10px] text-slate-500">{p.strength} • {p.category}</p>
                                                    </td>
                                                    <td className={p.stock < 10 ? 'text-rose-500' : 'text-emerald-500'}>{p.stock}</td>
                                                    <td className="text-emerald-400 font-black">{Number(p.price).toLocaleString()}</td>
                                                    <td className="p-6 text-right">
                                                        <button onClick={()=>setEditItem(p)} className="text-blue-400 text-xs font-black uppercase underline">Adjust</button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* EDIT MODAL */}
                        {editItem && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/60">
                                <div className="glass-modal w-full max-w-lg p-10 rounded-[3rem] shadow-2xl animate-in zoom-in duration-300">
                                    <h3 className="text-2xl font-black mb-8 text-emerald-500 uppercase tracking-tighter">Modify: {editItem.brandName}</h3>
                                    <form onSubmit={updateItem} className="space-y-4">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><label className="text-[10px] text-slate-500 font-bold uppercase">Brand Name</label>
                                            <input name="brand" defaultValue={editItem.brandName} className="w-full p-3 bg-slate-800 rounded-xl outline-none" /></div>
                                            <div><label className="text-[10px] text-slate-500 font-bold uppercase">Strength</label>
                                            <input name="strength" defaultValue={editItem.strength} className="w-full p-3 bg-slate-800 rounded-xl outline-none" /></div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><label className="text-[10px] text-slate-500 font-bold uppercase">Stock Quantity</label>
                                            <input name="stock" type="number" defaultValue={editItem.stock} className="w-full p-3 bg-slate-800 rounded-xl outline-none font-bold text-emerald-400" /></div>
                                            <div><label className="text-[10px] text-slate-500 font-bold uppercase">Category</label>
                                            <input name="category" defaultValue={editItem.category} className="w-full p-3 bg-slate-800 rounded-xl outline-none" /></div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><label className="text-[10px] text-slate-500 font-bold uppercase">Selling Price</label>
                                            <input name="price" type="number" defaultValue={editItem.price} className="w-full p-3 bg-slate-800 rounded-xl outline-none font-bold" /></div>
                                            <div><label className="text-[10px] text-slate-500 font-bold uppercase">Cost Price</label>
                                            <input name="cost" type="number" defaultValue={editItem.costPrice} className="w-full p-3 bg-slate-800 rounded-xl outline-none opacity-50" /></div>
                                        </div>
                                        
                                        <div className="flex gap-4 pt-6">
                                            <button type="submit" className="flex-1 bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-lg">SAVE CHANGES</button>
                                            <button type="button" onClick={()=>deleteItem(editItem.id)} className="p-4 bg-rose-900/30 text-rose-500 rounded-2xl"><lucide.Trash2/></button>
                                            <button type="button" onClick={()=>setEditItem(null)} className="p-4 bg-slate-800 text-white rounded-2xl font-bold">CLOSE</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const boot = setInterval(() => {
            if (window.db) {
                const root = ReactDOM.createRoot(document.getElementById('apex-root'));
                root.render(<App />);
                clearInterval(boot);
            }
        }, 500);
    </script>
</body>
</html>
