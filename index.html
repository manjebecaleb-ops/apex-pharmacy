<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>APEX | Full Enterprise Suite</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans overflow-hidden">
    <div id="apex-root"></div>

    <!-- 1. CLOUD ENGINE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAAazqZ1XnzpQ6A_cCHyQEsgXxq5jVVLXE",
  authDomain: "apex-pharmacy-a69b5.firebaseapp.com",
  projectId: "apex-pharmacy-a69b5",
  storageBucket: "apex-pharmacy-a69b5.firebasestorage.app",
  messagingSenderId: "28559683699",
  appId: "1:28559683699:web:1cc3f16a98a32463657a06",
  measurementId: "G-SVDCM1Y693"
};

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.api = { collection, onSnapshot, addDoc, updateDoc, doc, deleteDoc, query, orderBy };
    </script>

    <!-- 2. APEX INTERFACE -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('DASHBOARD');
            const [user, setUser] = useState({username: 'admin', role: 'MANAGER'});
            const [inventory, setInventory] = useState([]);
            const [sales, setSales] = useState([]);
            const [patients, setPatients] = useState([]);
            const [cart, setCart] = useState([]);

            // Sync all modules in Real-time
            useEffect(() => {
                if (!window.db) return;
                const unsubInv = window.api.onSnapshot(window.api.collection(window.db, "inventory"), (snap) => {
                    setInventory(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });
                const unsubSales = window.api.onSnapshot(window.api.collection(window.db, "sales"), (snap) => {
                    setSales(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });
                const unsubPatients = window.api.onSnapshot(window.api.collection(window.db, "patients"), (snap) => {
                    setPatients(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });
                return () => { unsubInv(); unsubSales(); unsubPatients(); };
            }, []);

            const addToCart = (p) => {
                setCart(prev => {
                    const ex = prev.find(i => i.id === p.id);
                    if (ex) return prev.map(i => i.id === p.id ? {...i, qty: i.qty + 1} : i);
                    return [...prev, {...p, qty: 1}];
                });
            };

            const finalizeSale = async () => {
                const total = cart.reduce((s,i) => s + (i.price * i.qty), 0);
                await window.api.addDoc(window.api.collection(window.db, "sales"), {
                    total, timestamp: new Date().toISOString(), items: cart, soldBy: user.username
                });
                for(const i of cart) {
                    await window.api.updateDoc(window.api.doc(window.db, "inventory", i.id), { stock: i.stock - i.qty });
                }
                setCart([]); alert("Sale Recorded in Cloud!");
            };

            const NavBtn = ({id, label}) => (
                <button onClick={() => setView(id)} className={`w-full text-left p-4 rounded-2xl font-bold transition-all ${view === id ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800'}`}>
                    {label}
                </button>
            );

            return (
                <div className="flex h-screen bg-slate-50 text-slate-900 overflow-hidden">
                    {/* SIDEBAR */}
                    <aside className="w-64 bg-slate-900 text-white p-6 flex flex-col shrink-0">
                        <h2 className="text-2xl font-black text-emerald-500 italic mb-10 tracking-tighter">APEX ENTERPRISE</h2>
                        <nav className="flex-1 space-y-1">
                            <NavBtn id="DASHBOARD" label="🏠 Dashboard" />
                            <NavBtn id="POS" label="🛒 Sales POS" />
                            <NavBtn id="STOO" label="📦 Inventory" />
                            <NavBtn id="PATIENTS" label="👥 Patients" />
                            <NavBtn id="REPORTS" label="📊 Reports" />
                        </nav>
                        <button onClick={()=>window.location.reload()} className="text-rose-500 text-xs font-bold uppercase mt-10">Logout</button>
                    </aside>

                    {/* CONTENT */}
                    <main className="flex-1 p-10 overflow-auto no-scrollbar">
                        {view === 'DASHBOARD' && (
                            <div>
                                <h2 className="text-3xl font-black mb-8 text-slate-800">Business Pulse</h2>
                                <div className="grid grid-cols-2 gap-6">
                                    <div className="bg-white p-10 rounded-3xl shadow-xl border-l-8 border-emerald-500">
                                        <p className="text-slate-400 text-xs font-bold uppercase">Cloud Revenue</p>
                                        <h3 className="text-4xl font-black text-slate-800">{sales.reduce((a,b)=>a+b.total,0).toLocaleString()} <span className="text-sm">TZS</span></h3>
                                    </div>
                                    <div className="bg-white p-10 rounded-3xl shadow-xl border-l-8 border-blue-500">
                                        <p className="text-slate-400 text-xs font-bold uppercase">Stock Assets</p>
                                        <h3 className="text-4xl font-black text-slate-800">{inventory.length} Items</h3>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'POS' && (
                            <div className="flex gap-8">
                                <div className="flex-1 grid grid-cols-2 gap-4">
                                    {inventory.map(p => (
                                        <div key={p.id} onClick={()=>addToCart(p)} className="bg-white p-6 rounded-3xl border-2 hover:border-emerald-500 cursor-pointer shadow-sm active:scale-95 transition-all">
                                            <p className="font-black text-lg">{p.brandName}</p>
                                            <p className="font-black text-emerald-600">{p.price.toLocaleString()} TZS</p>
                                            <p className="text-[10px] opacity-40 font-bold uppercase">Qty: {p.stock}</p>
                                        </div>
                                    ))}
                                </div>
                                <div className="w-96 bg-white p-8 rounded-[3rem] shadow-2xl h-fit border-t-8 border-emerald-600">
                                    <h3 className="font-black text-xl mb-6">Mkokoteni</h3>
                                    {cart.map(i => (
                                        <div key={i.id} className="flex justify-between py-2 border-b text-sm">
                                            <span>{i.brandName} x{i.qty}</span>
                                            <span className="font-bold">{(i.price * i.qty).toLocaleString()}</span>
                                        </div>
                                    ))}
                                    <div className="mt-8 flex justify-between font-black text-2xl text-emerald-600">
                                        <span>Total:</span>
                                        <span>{cart.reduce((s,i)=>s+(i.price*i.qty),0).toLocaleString()}</span>
                                    </div>
                                    <button onClick={finalizeSale} className="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black text-lg shadow-lg hover:bg-emerald-700 transition-all">FINALIZE SALE</button>
                                </div>
                            </div>
                        )}

                        {view === 'STOO' && (
                            <div className="bg-white p-10 rounded-[3rem] shadow-sm border">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-2xl font-black uppercase tracking-widest text-slate-800">Stock Control</h2>
                                    <button onClick={async () => {
                                        const n = prompt("Item Name:"); const p = prompt("Price:"); const s = prompt("Stock:");
                                        if(n) await window.api.addDoc(window.api.collection(window.db, "inventory"), { 
                                            brandName: n.toUpperCase(), price: Number(p), stock: Number(s), createdAt: new Date().toISOString() 
                                        });
                                    }} className="bg-emerald-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg">+ Add Stock</button>
                                </div>
                                <table className="w-full text-left">
                                    <thead><tr className="text-slate-400 text-xs font-bold border-b"><th>Name</th><th>Stock</th><th className="text-right">Price</th></tr></thead>
                                    <tbody className="divide-y">{inventory.map(p => (
                                        <tr key={p.id} className="hover:bg-slate-50 transition-colors"><td className="py-4 font-black">{p.brandName}</td><td>{p.stock}</td><td className="text-right font-bold text-emerald-600">{p.price.toLocaleString()}</td></tr>
                                    ))}</tbody>
                                </table>
                            </div>
                        )}

                        {view === 'PATIENTS' && (
                            <div className="bg-white p-10 rounded-[3rem] shadow-sm border">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-2xl font-black">Patient Registry</h2>
                                    <button onClick={async () => {
                                        const n = prompt("Full Name:"); const c = prompt("ID Card #:");
                                        if(n) await window.api.addDoc(window.api.collection(window.db, "patients"), { name: n, cardId: c });
                                    }} className="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg">+ New Registry</button>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    {patients.map(pt => (
                                        <div key={pt.id} className="p-6 bg-slate-50 rounded-2xl border flex justify-between">
                                            <div><p className="font-black text-lg">{pt.name}</p><p className="text-xs text-slate-400">ID: {pt.cardId}</p></div>
                                            <button className="text-blue-600 text-xs font-bold underline uppercase">View History</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('apex-root'));
        root.render(<App />);
    </script>
</body>
</html>
