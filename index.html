<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX | Sovereign ERP</title>
    <!-- PRODUCTION LIBRARIES -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background-color: #020617; color: white; overflow: hidden; }
        .active-tab { background: #10b981 !important; color: white !important; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-panel { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="apex-root">
        <!-- FAIL-SAFE LOADING SCREEN -->
        <div id="boot-loader" style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #020617; color: #10b981;">
            <h1 style="font-size: 3rem; font-weight: 900; font-style: italic;">APEX</h1>
            <p style="color: #64748b; margin-top: 10px; font-weight: bold; letter-spacing: 2px;" id="boot-status">INITIALIZING SYSTEM CORE...</p>
        </div>
    </div>

    <!-- 1. DATABASE CONFIGURATION -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, query, where, getDocs, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAAazqZ1XnzpQ6A_cCHyQEsgXxq5jVVLXE",
            authDomain: "apex-pharmacy-a69b5.firebaseapp.com",
            projectId: "apex-pharmacy-a69b5",
            storageBucket: "apex-pharmacy-a69b5.firebasestorage.app",
            messagingSenderId: "28559683699",
            appId: "1:28559683699:web:1cc3f16a98a32463657a06",
            measurementId: "G-SVDCM1Y693"
        };

        try {
            const app = initializeApp(firebaseConfig);
            window.db = getFirestore(app);
            window.api = { collection, onSnapshot, addDoc, updateDoc, doc, query, where, getDocs, deleteDoc, orderBy };
            console.log("Database Connected");
        } catch (e) {
            console.error("Database connection failed");
        }
    </script>

    <!-- 2. SYSTEM LOGIC -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('DASHBOARD');
            const [user, setUser] = useState(null);
            const [data, setData] = useState({ inventory: [], sales: [], patients: [], users: [], expenses: [] });
            const [cart, setCart] = useState([]);
            const [search, setSearch] = useState("");
            const [editItem, setEditItem] = useState(null);

            // DATA SYNC LOGIC
            useEffect(() => {
                if (!window.db) return;
                const unsubInv = window.api.onSnapshot(window.api.collection(window.db, "inventory"), (s) => setData(p => ({...p, inventory: s.docs.map(d=>({id:d.id, ...d.data()}))})));
                const unsubSales = window.api.onSnapshot(window.api.collection(window.db, "sales"), (s) => setData(p => ({...p, sales: s.docs.map(d=>({id:d.id, ...d.data()}))})));
                const unsubPatients = window.api.onSnapshot(window.api.collection(window.db, "patients"), (s) => setData(p => ({...p, patients: s.docs.map(d=>({id:d.id, ...d.data()}))})));
                const unsubUsers = window.api.onSnapshot(window.api.collection(window.db, "users"), (s) => setData(p => ({...p, users: s.docs.map(d=>({id:d.id, ...d.data()}))})));
                const unsubExp = window.api.onSnapshot(window.api.collection(window.db, "expenses"), (s) => setData(p => ({...p, expenses: s.docs.map(d=>({id:d.id, ...d.data()}))})));
                return () => { unsubInv(); unsubSales(); unsubPatients(); unsubUsers(); unsubExp(); };
            }, []);

            // PERMISSIONS
            const isManager = user?.role === 'MANAGER';

            const handleLogin = async () => {
                const u = document.getElementById('u_box').value.toLowerCase().trim();
                const p = document.getElementById('p_box').value.trim();
                const q = window.api.query(window.api.collection(window.db, "users"), window.api.where("username", "==", u), window.api.where("pin", "==", p));
                const snap = await window.api.getDocs(q);
                if (!snap.empty) { setUser({ id: snap.docs[0].id, ...snap.docs[0].data() }); setView('DASHBOARD'); }
                else alert("Login Denied");
            };

            const finalizeSale = async () => {
                const total = cart.reduce((s,i)=>s+(i.price*i.qty),0);
                await window.api.addDoc(window.api.collection(window.db, "sales"), { total, timestamp: new Date().toISOString(), soldBy: user.username, items: cart });
                for(const i of cart) await window.api.updateDoc(window.api.doc(window.db, "inventory", i.id), { stock: i.stock - i.qty });
                setCart([]); alert("Transaction Recorded");
            };

            // --- VIEW: LOGIN ---
            if (!user) {
                return (
                    <div className="h-screen flex items-center justify-center bg-black">
                        <div className="bg-slate-900 p-12 rounded-[3.5rem] shadow-2xl w-full max-w-sm text-center border border-slate-800">
                            <h1 className="text-5xl font-black text-emerald-500 mb-2 italic tracking-tighter underline underline-offset-8">APEX</h1>
                            <p className="text-slate-500 text-[10px] font-bold uppercase mb-10 tracking-[0.3em]">Pharmacy Vault</p>
                            <input id="u_box" placeholder="Username" className="w-full p-4 mb-3 bg-slate-800 rounded-2xl outline-none border border-slate-700 text-center font-bold" />
                            <input id="p_box" type="password" placeholder="PIN" className="w-full p-4 mb-10 bg-slate-800 rounded-2xl outline-none border border-slate-700 text-center font-bold tracking-[1em]" />
                            <button onClick={handleLogin} className="w-full bg-emerald-600 text-white py-5 rounded-[2rem] font-black text-xl shadow-lg hover:bg-emerald-500 transition-all">ACCESS SYSTEM</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen bg-slate-950 text-white overflow-hidden">
                    {/* SIDEBAR */}
                    <aside className="w-72 bg-black border-r border-slate-800 p-8 flex flex-col shrink-0">
                        <h2 className="text-xl font-black text-emerald-500 mb-10 italic">APEX PRO</h2>
                        <nav className="flex-1 space-y-1 overflow-y-auto no-scrollbar">
                            <button onClick={()=>setView('DASHBOARD')} className={`w-full text-left p-4 rounded-xl font-bold text-xs uppercase tracking-widest ${view==='DASHBOARD'?'active-tab':'text-slate-500'}`}>Dashboard</button>
                            <button onClick={()=>setView('POS')} className={`w-full text-left p-4 rounded-xl font-bold text-xs uppercase tracking-widest ${view==='POS'?'active-tab':'text-slate-500'}`}>Point of Sale</button>
                            <button onClick={()=>setView('STOO')} className={`w-full text-left p-4 rounded-xl font-bold text-xs uppercase tracking-widest ${view==='STOO'?'active-tab':'text-slate-500'}`}>Inventory</button>
                            <button onClick={()=>setView('PATIENTS')} className={`w-full text-left p-4 rounded-xl font-bold text-xs uppercase tracking-widest ${view==='PATIENTS'?'active-tab':'text-slate-500'}`}>Patients</button>
                            {isManager && <button onClick={()=>setView('USERS')} className={`w-full text-left p-4 rounded-xl font-bold text-xs uppercase tracking-widest ${view==='USERS'?'active-tab':'text-slate-500'}`}>Personnel</button>}
                            {isManager && <button onClick={()=>setView('FINANCE')} className={`w-full text-left p-4 rounded-xl font-bold text-xs uppercase tracking-widest ${view==='FINANCE'?'active-tab':'text-slate-500'}`}>Financials</button>}
                        </nav>
                        <button onClick={()=>window.location.reload()} className="text-rose-500 font-bold text-[10px] uppercase tracking-widest mt-10">Logout</button>
                    </aside>

                    {/* MAIN CONTENT AREA */}
                    <main className="flex-1 p-10 overflow-auto no-scrollbar">
                        {view === 'DASHBOARD' && (
                            <div className="animate-in fade-in duration-700">
                                <h2 className="text-3xl font-black mb-8">Business Summary</h2>
                                <div className="grid grid-cols-2 gap-6">
                                    <div className="bg-slate-900 p-10 rounded-[2.5rem] border border-slate-800 border-l-8 border-emerald-500 shadow-sm">
                                        <p className="text-slate-500 text-xs font-bold uppercase mb-2">Total Revenue</p>
                                        <h3 className="text-4xl font-black text-emerald-400">{(data.sales || []).reduce((a,b)=>a+(b.total||0),0).toLocaleString()} TZS</h3>
                                    </div>
                                    <div className="bg-slate-900 p-10 rounded-[2.5rem] border border-slate-800 border-l-8 border-blue-500 shadow-sm">
                                        <p className="text-slate-500 text-xs font-bold uppercase">Inventory Items</p>
                                        <h3 className="text-4xl font-black text-blue-400">{(data.inventory || []).length}</h3>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'POS' && (
                            <div className="flex gap-8 h-full animate-in slide-in-from-bottom duration-500">
                                <div className="flex-1 space-y-6 overflow-y-auto no-scrollbar">
                                    <input placeholder="Search products or symptoms..." className="w-full p-6 bg-slate-900 border border-slate-800 rounded-[2rem] text-xl font-bold outline-none focus:ring-2 ring-emerald-500 shadow-xl" onChange={(e)=>setSearch(e.target.value.toLowerCase())} />
                                    <div className="grid grid-cols-2 gap-4">
                                        {data.inventory.filter(p => p.brandName?.toLowerCase().includes(search)).map(p => (
                                            <div key={p.id} onClick={()=>{
                                                const ex = cart.find(i=>i.id===p.id);
                                                if(p.stock <= (ex?.qty||0)) return alert("Stock Empty!");
                                                setCart(prev => ex ? prev.map(i=>i.id===p.id?{...i, qty:i.qty+1}:i) : [...prev, {...p, qty:1}]);
                                            }} className="bg-slate-900 border border-slate-800 p-6 rounded-[2.5rem] hover:border-emerald-500 cursor-pointer active:scale-95 transition-all shadow-xl">
                                                <p className="font-black text-xl mb-1 uppercase">{p.brandName}</p>
                                                <p className="text-[10px] text-slate-500 font-bold uppercase mb-4">{p.strength} • {p.genericName}</p>
                                                <p className="text-2xl font-black text-emerald-400">{Number(p.price).toLocaleString()} <span className="text-xs">TZS</span></p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="w-96 bg-white text-slate-900 p-8 rounded-[3.5rem] shadow-2xl h-fit border-t-8 border-emerald-600 sticky top-0 flex flex-col shrink-0">
                                    <h3 className="font-black text-2xl mb-8 tracking-tighter uppercase underline decoration-emerald-500 decoration-4 underline-offset-8">Cart</h3>
                                    <div className="space-y-4 mb-8 overflow-auto max-h-64 no-scrollbar px-1 font-bold text-sm">
                                        {cart.map(i => (
                                            <div key={i.id} className="flex justify-between items-center border-b border-slate-100 pb-4">
                                                <div className="flex-1 uppercase">{i.brandName}</div>
                                                <input type="number" value={i.qty} onChange={(e)=>{
                                                    const val = parseInt(e.target.value) || 0;
                                                    setCart(cart.map(x => x.id === i.id ? {...x, qty: val} : x));
                                                }} className="w-16 p-2 bg-slate-50 rounded-xl text-center font-black text-emerald-600 outline-none" />
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex justify-between font-black text-4xl mb-10 tracking-tighter text-emerald-600"><span>Total</span><span>{cart.reduce((s,i)=>s+(i.price*i.qty),0).toLocaleString()}</span></div>
                                    <button onClick={finalizeSale} className="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black text-xl shadow-xl active:scale-95 transition-all">FINALIZE SALE</button>
                                </div>
                            </div>
                        )}

                        {view === 'STOO' && (
                            <div className="bg-slate-900 p-10 rounded-[3.5rem] border border-slate-800 shadow-sm animate-in fade-in duration-500 h-full overflow-y-auto no-scrollbar">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-3xl font-black text-emerald-500 uppercase">Inventory Vault</h2>
                                    <button onClick={async ()=>{
                                        const n = prompt("Brand:"); const g = prompt("Generic:"); const st = prompt("Strength:"); const c = prompt("Cost:"); const p = prompt("Price:"); const q = prompt("Qty:"); const cat = prompt("Category (Medicine/Supplies/Cosmetic):"); const e = prompt("Expiry (YYYY-MM-DD):");
                                        if(n) await window.api.addDoc(window.api.collection(window.db, "inventory"), { brandName:n.toUpperCase(), genericName:g, strength:st, costPrice:Number(c), price:Number(p), stock:Number(q), category:cat, expiryDate:e });
                                    }} className="bg-emerald-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg hover:scale-105 transition-all uppercase text-[10px] tracking-widest">+ Add New Entry</button>
                                </div>
                                <table className="w-full text-left">
                                    <thead><tr className="text-slate-500 text-[10px] font-bold uppercase border-b border-slate-800 pb-4"><th>Product Family</th><th>Category</th><th>Stock</th><th>Margin</th><th className="text-right">Manage</th></tr></thead>
                                    <tbody className="font-bold">{data.inventory.map(p => (
                                        <tr key={p.id} className="border-b border-slate-800/50 hover:bg-black/50 transition-all group">
                                            <td className="py-6"><p className="font-black text-white">{p.brandName}</p><p className="text-[9px] text-slate-500 uppercase">{p.genericName} • {p.strength}</p></td>
                                            <td><span className="text-[9px] bg-slate-800 px-2 py-1 rounded text-slate-400 uppercase font-black tracking-widest">{p.category}</span></td>
                                            <td className={p.stock < 10 ? 'text-rose-500 underline' : 'text-slate-300'}>{p.stock}</td>
                                            <td className="text-emerald-500">{(((p.price-p.costPrice)/p.price)*100).toFixed(0)}%</td>
                                            <td className="text-right">
                                                <button onClick={()=>setEditItem(p)} className="text-blue-500 text-[10px] font-black underline uppercase">Modify</button>
                                            </td>
                                        </tr>
                                    ))}</tbody>
                                </table>
                            </div>
                        )}

                        {/* EDIT MODAL PANEL */}
                        {editItem && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90">
                                <div className="glass-panel w-full max-w-xl p-10 rounded-[4rem] shadow-2xl overflow-y-auto max-h-[90vh] no-scrollbar">
                                    <h3 className="text-2xl font-black mb-8 text-emerald-500 uppercase tracking-tighter">Modify Entry: {editItem.brandName}</h3>
                                    <form onSubmit={async (e)=>{
                                        e.preventDefault();
                                        const d = new FormData(e.target);
                                        await window.api.updateDoc(window.api.doc(window.db, "inventory", editItem.id), {
                                            brandName: d.get('brand').toUpperCase(),
                                            price: Number(d.get('price')),
                                            stock: Number(d.get('stock')),
                                            category: d.get('category')
                                        });
                                        setEditItem(null); alert("Updated");
                                    }} className="space-y-6">
                                        <div className="grid grid-cols-1 gap-4">
                                            <div><label className="text-[10px] text-slate-500 font-bold uppercase ml-2">Brand Name</label>
                                            <input name="brand" defaultValue={editItem.brandName} className="w-full p-4 bg-slate-800 rounded-3xl outline-none" /></div>
                                            
                                            <div className="grid grid-cols-2 gap-4">
                                                <div><label className="text-[10px] text-slate-500 font-bold uppercase ml-2">Stock Level</label>
                                                <input name="stock" type="number" defaultValue={editItem.stock} className="w-full p-4 bg-slate-800 rounded-3xl outline-none font-black text-emerald-400" /></div>
                                                <div><label className="text-[10px] text-slate-500 font-bold uppercase ml-2">Sale Price (TZS)</label>
                                                <input name="price" type="number" defaultValue={editItem.price} className="w-full p-4 bg-slate-800 rounded-3xl outline-none font-black" /></div>
                                            </div>

                                            <div><label className="text-[10px] text-slate-500 font-bold uppercase ml-2">Category</label>
                                            <select name="category" defaultValue={editItem.category} className="w-full p-4 bg-slate-800 rounded-3xl outline-none">
                                                <option>Medicine</option><option>Supplies</option><option>Cosmetic</option>
                                            </select></div>
                                        </div>
                                        
                                        <div className="flex gap-4 pt-6">
                                            <button type="submit" className="flex-1 bg-emerald-600 text-white py-5 rounded-[2rem] font-black shadow-lg">SAVE UPDATES</button>
                                            <button type="button" onClick={async()=>{ if(confirm("Remove?")) { await window.api.deleteDoc(window.api.doc(window.db, "inventory", editItem.id)); setEditItem(null); }}} className="bg-rose-900/50 text-rose-500 p-5 rounded-[2rem]"><lucide.Trash size={24}/></button>
                                            <button type="button" onClick={()=>setEditItem(null)} className="p-5 bg-slate-800 rounded-[2rem] font-bold uppercase text-[10px]">Close</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        // RENDER TRIGGER
        const boot = setInterval(() => {
            if (window.db) {
                const root = ReactDOM.createRoot(document.getElementById('apex-root'));
                root.render(<App />);
                clearInterval(boot);
            }
        }, 500);
    </script>
</body>
</html>
