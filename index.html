<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>APEX | Stable Cloud ERP</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans overflow-hidden">
    <div id="apex-root">
        <div class="h-screen flex items-center justify-center">
            <h1 class="text-2xl font-bold animate-pulse">APEX BOOTING...</h1>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAAazqZ1XnzpQ6A_cCHyQEsgXxq5jVVLXE",
  authDomain: "apex-pharmacy-a69b5.firebaseapp.com",
  projectId: "apex-pharmacy-a69b5",
  storageBucket: "apex-pharmacy-a69b5.firebasestorage.app",
  messagingSenderId: "28559683699",
  appId: "1:28559683699:web:1cc3f16a98a32463657a06",
  measurementId: "G-SVDCM1Y693"
};

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.api = { collection, onSnapshot, addDoc, query, orderBy };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('DASHBOARD');
            const [inventory, setInventory] = useState([]);
            const [sales, setSales] = useState([]);
            const [cart, setCart] = useState([]);

            // Sync Data
            useEffect(() => {
                if (!window.db) return;
                const unsubInv = window.api.onSnapshot(window.api.collection(window.db, "inventory"), (snap) => {
                    setInventory(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });
                const unsubSales = window.api.onSnapshot(window.api.collection(window.db, "sales"), (snap) => {
                    setSales(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });
                return () => { unsubInv(); unsubSales(); };
            }, []);

            const addToCart = (p) => {
                setCart(prev => {
                    const ex = prev.find(i => i.id === p.id);
                    if (ex) return prev.map(i => i.id === p.id ? {...i, qty: i.qty + 1} : i);
                    return [...prev, {...p, qty: 1}];
                });
            };

            const finalizeSale = async () => {
                const total = cart.reduce((s,i) => s + (i.price * i.qty), 0);
                await window.api.addDoc(window.api.collection(window.db, "sales"), {
                    total, timestamp: new Date().toISOString(), items: cart
                });
                setCart([]); alert("Transaction Sync Successful!");
            };

            return (
                <div className="flex h-screen bg-slate-50 text-slate-900 overflow-hidden">
                    {/* SIDEBAR */}
                    <aside className="w-64 bg-slate-900 text-white p-6 flex flex-col shrink-0">
                        <h2 className="text-2xl font-black text-emerald-500 italic mb-10">APEX PRO</h2>
                        <nav className="flex-1 space-y-2">
                            <button onClick={() => setView('DASHBOARD')} className={`w-full text-left p-4 rounded-xl font-bold ${view==='DASHBOARD'?'bg-emerald-600':''}`}>🏠 Dashboard</button>
                            <button onClick={() => setView('POS')} className={`w-full text-left p-4 rounded-xl font-bold ${view==='POS'?'bg-emerald-600':''}`}>🛒 Sales (POS)</button>
                            <button onClick={() => setView('STOO')} className={`w-full text-left p-4 rounded-xl font-bold ${view==='STOO'?'bg-emerald-600':''}`}>📦 Inventory</button>
                        </nav>
                    </aside>

                    {/* MAIN */}
                    <main className="flex-1 p-10 overflow-auto">
                        {view === 'DASHBOARD' && (
                            <div>
                                <h2 className="text-3xl font-black mb-8 uppercase tracking-tighter">Business Overview</h2>
                                <div className="grid grid-cols-2 gap-6">
                                    <div className="bg-white p-10 rounded-[2.5rem] shadow-xl border border-slate-100 border-l-8 border-emerald-500">
                                        <p className="text-slate-400 text-xs font-bold uppercase tracking-widest">Total Cloud Revenue</p>
                                        <h3 className="text-4xl font-black mt-2">{sales.reduce((a,b)=>a+b.total,0).toLocaleString()} TZS</h3>
                                    </div>
                                    <div className="bg-white p-10 rounded-[2.5rem] shadow-xl border border-slate-100 border-l-8 border-blue-500">
                                        <p className="text-slate-400 text-xs font-bold uppercase tracking-widest">Inventory Assets</p>
                                        <h3 className="text-4xl font-black mt-2">{inventory.length} Items</h3>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'POS' && (
                            <div className="flex gap-8">
                                <div className="flex-1 grid grid-cols-2 gap-4">
                                    {inventory.map(p => (
                                        <div key={p.id} onClick={() => addToCart(p)} className="bg-white p-6 rounded-3xl border-2 hover:border-emerald-500 cursor-pointer shadow-sm active:scale-95 transition-all">
                                            <p className="font-black text-lg">{p.brandName}</p>
                                            <p className="font-black text-emerald-600 text-xl">{Number(p.price).toLocaleString()} TZS</p>
                                            <p className="text-xs text-slate-300 font-bold">STK: {p.stock}</p>
                                        </div>
                                    ))}
                                </div>
                                <div className="w-96 bg-white p-8 rounded-[3rem] shadow-2xl h-fit border-t-8 border-emerald-600">
                                    <h3 className="font-black text-xl mb-6 tracking-tight">Active Bill</h3>
                                    {cart.map(i => (
                                        <div key={i.id} className="flex justify-between py-2 border-b text-sm">
                                            <span>{i.brandName} x{i.qty}</span>
                                            <span className="font-bold">{(i.price * i.qty).toLocaleString()}</span>
                                        </div>
                                    ))}
                                    <div className="mt-8 flex justify-between font-black text-3xl text-emerald-600 tracking-tighter">
                                        <span>Total:</span>
                                        <span>{cart.reduce((s,i)=>s+(i.price*i.qty),0).toLocaleString()}</span>
                                    </div>
                                    <button onClick={finalizeSale} className="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black mt-10 shadow-lg active:scale-95">CONFIRM SALE</button>
                                </div>
                            </div>
                        )}

                        {view === 'STOO' && (
                            <div className="bg-white p-10 rounded-[3rem] shadow-sm border">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-2xl font-black uppercase">Stock Manager</h2>
                                    <button onClick={async () => {
                                        const n = prompt("Brand:"); const p = prompt("Price:"); const s = prompt("Stock:");
                                        if(n) await window.api.addDoc(window.api.collection(window.db, "inventory"), { brandName: n, price: Number(p), stock: Number(s) });
                                    }} className="bg-emerald-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg">+ Add Item</button>
                                </div>
                                <table className="w-full text-left">
                                    <thead>
                                        <tr className="text-slate-400 text-xs font-bold uppercase border-b"><th className="pb-4">Name</th><th className="pb-4">Stock</th><th className="pb-4">Price</th></tr>
                                    </thead>
                                    <tbody>
                                        {inventory.map(p => (
                                            <tr key={p.id} className="border-b">
                                                <td className="py-4 font-bold">{p.brandName}</td>
                                                <td>{p.stock}</td>
                                                <td className="font-black text-emerald-600">{p.price}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        // Render Trigger
        const root = ReactDOM.createRoot(document.getElementById('apex-root'));
        root.render(<App />);
    </script>
</body>
</html>
