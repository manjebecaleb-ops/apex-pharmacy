    <!-- INDEXED DB FOR OFFLINE STORAGE -->
    <script>
        window.offlineDB = {
            init: async function() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open('ApexPharmacy', 1);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => { this.db = request.result; resolve(this.db); };
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('inventory')) db.createObjectStore('inventory', { keyPath: 'id' });
                        if (!db.objectStoreNames.contains('sales')) db.createObjectStore('sales', { keyPath: 'id' });
                        if (!db.objectStoreNames.contains('patients')) db.createObjectStore('patients', { keyPath: 'id' });
                        if (!db.objectStoreNames.contains('users')) db.createObjectStore('users', { keyPath: 'id' });
                        if (!db.objectStoreNames.contains('expenses')) db.createObjectStore('expenses', { keyPath: 'id' });
                        if (!db.objectStoreNames.contains('syncQueue')) db.createObjectStore('syncQueue', { keyPath: 'id', autoIncrement: true });
                    };
                });
            },
            get: async function(store, key) {
                return new Promise((resolve) => {
                    if (!this.db) return resolve(null);
                    const tx = this.db.transaction(store);
                    const req = tx.objectStore(store).get(key);
                    req.onsuccess = () => resolve(req.result);
                });
            },
            getAll: async function(store) {
                return new Promise((resolve) => {
                    if (!this.db) return resolve([]);
                    const tx = this.db.transaction(store);
                    const req = tx.objectStore(store).getAll();
                    req.onsuccess = () => resolve(req.result);
                });
            },
            put: async function(store, data) {
                return new Promise((resolve) => {
                    if (!this.db) return resolve(null);
                    const tx = this.db.transaction(store, 'readwrite');
                    const req = tx.objectStore(store).put(data);
                    req.onsuccess = () => resolve(req.result);
                });
            },
            delete: async function(store, key) {
                return new Promise((resolve) => {
                    if (!this.db) return resolve(null);
                    const tx = this.db.transaction(store, 'readwrite');
                    const req = tx.objectStore(store).delete(key);
                    req.onsuccess = () => resolve(req.result);
                });
            }
        };
        window.offlineDB.init();
    </script>

                                                    </div>
                                                    <input name="phone" defaultValue={editing.item.phone || ''} placeholder="Phone" className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-700 text-white font-bold" />
                                                    <input name="address" defaultValue={editing.item.address || ''} placeholder="Address" className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-700 text-white font-bold" />
                                                </div>
                                            )}

                                            {editing.type === 'USER' && (
                                                <div className="space-y-4">
                                                    <input name="username" defaultValue={editing.item.username || ''} placeholder="Username" required className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-700 text-white font-bold" />
                                                    <input name="pin" defaultValue={editing.item.pin || ''} placeholder="4-Digit PIN" required className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-700 text-white font-bold" maxLength="4" />
                                                    <select name="role" defaultValue={editing.item.role || 'DISPENSER'} className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-700 text-white font-bold">
                                                        <option>MANAGER</option><option>PHARMACIST</option><option>TECHNICIAN</option><option>ASSISTANT</option><option>DISPENSER</option>
                                                    </select>
                                                </div>
                                            )}

                                            {editing.type === 'EXPENSE' && (
                                                <div className="space-y-4">
                                                    <select name="category" className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-700 font-bold text-rose-500">
                                                        <option>LUKU (Electricity)</option><option>Meal Allowance</option><option>Internet</option><option>Rent</option><option>Other</option>
                                                    </select>
                                                    <input name="amount" type="number" placeholder="Amount (TZS)" required className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-700 text-white font-bold" />
                                                    <input name="description" placeholder="Description" className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-700 text-white font-bold" />
                                                </div>
                                            )}

                                            <div className="flex gap-4 pt-8">
                                                <button type="submit" className="flex-1 bg-emerald-600 text-white py-5 rounded-[2rem] font-black shadow-lg hover:bg-emerald-500 transition-all active:scale-95">SAVE</button>
                                                <button type="button" onClick={()=>{setEditing(null);}} className="p-5 bg-black border border-slate-800 rounded-[2rem] font-bold hover:border-slate-600 transition">CANCEL</button>
                                            </div>
                                        </form>
                                    ) : (
                                        <form onSubmit={async (e) => {
                                            e.preventDefault();
                                            const amount = Number(new FormData(e.target).get('amount'));
                                            const client = data.patients.find(c => c.id === editing.item.id);
                                            await window.offlineDB.put('patients', { ...client, creditBalance: (client.creditBalance || 0) - amount });
                                            setEditing(null); alert("Debt Cleared!");
                                        }}>
                                            <h3 className="text-2xl font-black mb-6 text-emerald-500 uppercase tracking-tighter">Clear Debt: {editing.item.name}</h3>
                                            <input name="amount" type="number" placeholder="Amount Paid (TZS)" required className="w-full p-4 mb-6 bg-black rounded-2xl outline-none border border-slate-700 text-white font-bold" />
                                            <button type="submit" className="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-emerald-500 transition-all">CONFIRM</button>
                                        </form>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* CHECKOUT MODAL */}
                        {checkoutModal && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay animate-in zoom-in duration-200">
                                <div className="bg-slate-900 border border-slate-800 w-full max-w-md p-10 rounded-[3.5rem] shadow-2xl text-center">
                                    <h3 className="text-3xl font-black mb-2 text-emerald-500 italic tracking-tighter">Finalize Bill</h3>
                                    <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-10">{isOnline ? '🔵 Online Payment' : '🔴 Offline Queue'}</p>
                                    <div className="space-y-4 mb-10">
                                        <button onClick={(e)=>{e.preventDefault(); finalizeSale('CASH')}} className="w-full py-5 bg-emerald-600 text-white rounded-3xl font-black shadow-xl hover:bg-emerald-500 transition-all active:scale-95">💵 CASH</button>
                                        <button onClick={(e)=>{e.preventDefault(); finalizeSale('MOBILE')}} className="w-full py-5 bg-blue-600 text-white rounded-3xl font-black shadow-xl hover:bg-blue-500 transition-all active:scale-95">📱 MOBILE MONEY</button>
                                        <button onClick={(e)=>{e.preventDefault(); const pid = prompt("Patient ID:"); const pt = data.patients.find(p => p.cardId === pid || p.name.toLowerCase() === pid?.toLowerCase()); if(pt) finalizeSale('DEBT', pt.id); else alert("Patient not found!");}} className="w-full py-5 bg-rose-600 text-white rounded-3xl font-black shadow-xl hover:bg-rose-500 transition-all active:scale-95">📋 ON CREDIT</button>
                                    </div>
                                    <button onClick={(e)=>{e.preventDefault(); setCheckoutModal(false)}} className="text-slate-500 font-bold text-xs uppercase tracking-widest hover:text-white transition">CANCEL</button>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('apex-root'));
        root.render(<App />);
    </script>
</body>
</html>
