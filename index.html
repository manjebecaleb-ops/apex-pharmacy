<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>APEX | Enterprise Recovery</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white font-sans">
    <div id="apex-root">
        <div class="h-screen flex flex-col items-center justify-center">
            <h1 class="text-4xl font-black text-emerald-500 animate-pulse italic">APEX</h1>
            <p id="boot-status" class="mt-4 text-slate-500 uppercase tracking-widest">Checking Cloud Connection...</p>
            <div id="debug-error" class="mt-10 bg-white text-rose-600 p-4 rounded-xl text-xs font-mono hidden"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // !!! PASTE YOUR KEYS HERE !!!
        const firebaseConfig = {
            apiKey: "AIzaSyAAazqZ1XnzpQ6A_cCHyQEsgXxq5jVVLXE",
            authDomain: "apex-pharmacy-a69b5.firebaseapp.com",
            projectId: "apex-pharmacy-a69b5",
            storageBucket: "apex-pharmacy-a69b5.firebasestorage.app",
            messagingSenderId: "28559683699",
            appId: "1:28559683699:web:1cc3f16a98a32463657a06",
            measurementId: "G-SVDCM1Y693"
        };

        try {
            const app = initializeApp(firebaseConfig);
            window.db = getFirestore(app);
            window.api = { collection, getDocs, addDoc, query, where };
            document.getElementById('boot-status').innerText = "CLoud Connected. Ready.";
        } catch (e) {
            document.getElementById('debug-error').style.display = "block";
            document.getElementById('debug-error').innerText = "CONFIG ERROR: " + e.message;
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('LOGIN');
            const [user, setUser] = useState(null);

            // AUTO-CREATE ADMIN
            useEffect(() => {
                const setup = async () => {
                    try {
                        const q = window.api.query(window.api.collection(window.db, "users"), window.api.where("username", "==", "admin"));
                        const snap = await window.api.getDocs(q);
                        if (snap.empty) {
                            await window.api.addDoc(window.api.collection(window.db, "users"), {
                                username: "admin", pin: "1234", role: "MANAGER"
                            });
                        }
                    } catch (err) {
                        console.error("Setup Error", err);
                    }
                };
                if(window.db) setup();
            }, []);

            const handleLogin = async () => {
                const u = document.getElementById('u_field').value.toLowerCase().trim();
                const p = document.getElementById('p_field').value.trim();
                
                try {
                    const q = window.api.query(window.api.collection(window.db, "users"), 
                        window.api.where("username", "==", u), 
                        window.api.where("pin", "==", p)
                    );
                    const snap = await window.api.getDocs(q);
                    
                    if (!snap.empty) {
                        setUser(snap.docs[0].data());
                        setView('DASHBOARD');
                    } else {
                        alert("Wrong Username or PIN");
                    }
                } catch (err) {
                    alert("DATABASE ERROR: " + err.message);
                }
            };

            if (view === 'LOGIN') {
                return (
                    <div className="h-screen flex items-center justify-center bg-slate-950">
                        <div className="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-sm text-center">
                            <h1 className="text-4xl font-black text-emerald-600 mb-8 italic">APEX</h1>
                            <input id="u_field" placeholder="Username" className="w-full p-4 mb-3 bg-slate-100 rounded-2xl outline-none text-black" />
                            <input id="p_field" type="password" placeholder="PIN" className="w-full p-4 mb-10 bg-slate-100 rounded-2xl outline-none text-black" />
                            <button onClick={handleLogin} className="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black shadow-lg">LOGIN</button>
                        </div>
                    </div>
                );
            }

            if (view === 'DASHBOARD') {
                return (
                    <div className="p-10 text-center">
                        <h1 className="text-5xl font-black text-emerald-500 italic">SYSTEM UNLOCKED</h1>
                        <p className="mt-4 text-slate-400">Welcome Director, the Cloud Vault is open.</p>
                        <button onClick={() => window.location.reload()} className="mt-20 bg-rose-600 px-10 py-4 rounded-2xl font-black">LOGOUT</button>
                    </div>
                );
            }
        };

        // Delay to ensure Firebase is ready
        setTimeout(() => {
            const root = ReactDOM.createRoot(document.getElementById('apex-root'));
            root.render(<App />);
        }, 1000);
    </script>
</body>
</html>
