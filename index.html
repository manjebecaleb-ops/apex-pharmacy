<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX | Sovereign Enterprise ERP</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; background-color: #020617; color: white; }
        .active-tab { background: #10b981 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="apex-root"></div>

    <!-- 1. CLOUD ENGINE (FIREBASE) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, query, where, getDocs, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // !!! YOUR CONFIG !!!
        const firebaseConfig = {
            apiKey: "AIzaSyAAazqZ1XnzpQ6A_cCHyQEsgXxq5jVVLXE",
            authDomain: "apex-pharmacy-a69b5.firebaseapp.com",
            projectId: "apex-pharmacy-a69b5",
            storageBucket: "apex-pharmacy-a69b5.firebasestorage.app",
            messagingSenderId: "28559683699",
            appId: "1:28559683699:web:1cc3f16a98a32463657a06",
            measurementId: "G-SVDCM1Y693"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.api = { collection, onSnapshot, addDoc, updateDoc, doc, query, where, getDocs, deleteDoc, orderBy };
    </script>

    <!-- 2. APEX INTERFACE LOGIC -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('DASHBOARD');
            const [user, setUser] = useState({username: 'admin', role: 'MANAGER'});
            const [data, setData] = useState({ inventory: [], sales: [], users: [], patients: [] });
            const [cart, setCart] = useState([]);
            const [search, setSearch] = useState("");

            // REAL-TIME CLOUD SYNC
            useEffect(() => {
                if (!window.db) return;
                const unsubInv = window.api.onSnapshot(window.api.collection(window.db, "inventory"), (s) => setData(p => ({...p, inventory: s.docs.map(d=>({id:d.id, ...d.data()}))})));
                const unsubSales = window.api.onSnapshot(window.api.collection(window.db, "sales"), (s) => setData(p => ({...p, sales: s.docs.map(d=>({id:d.id, ...d.data()}))})));
                const unsubPatients = window.api.onSnapshot(window.api.collection(window.db, "patients"), (s) => setData(p => ({...p, patients: s.docs.map(d=>({id:d.id, ...d.data()}))})));
                return () => { unsubInv(); unsubSales(); unsubPatients(); };
            }, []);

            // FUNCTIONS
            const addToCart = (p) => {
                setCart(prev => {
                    const ex = prev.find(i => i.id === p.id);
                    if (ex) return prev.map(i => i.id === p.id ? {...i, qty: i.qty + 1} : i);
                    return [...prev, {...p, qty: 1}];
                });
            };

            const finalizeSale = async () => {
                const total = cart.reduce((s,i)=>s+(i.price*i.qty),0);
                await window.api.addDoc(window.api.collection(window.db, "sales"), { total, timestamp: new Date().toISOString(), soldBy: user.username, items: cart });
                for(const i of cart) await window.api.updateDoc(window.api.doc(window.db, "inventory", i.id), { stock: i.stock - i.qty });
                setCart([]); alert("Sale Completed!");
            };

            const STG_DATA = [
                { disease: "Malaria", treatment: "AL (Mseto) for 3 days", dose: "Weight based: 15-24kg = 2 tabs x2" },
                { disease: "Pneumonia", treatment: "Amoxicillin or Ceftriaxone", dose: "Pediatric: 25mg/kg x2" },
                { disease: "UTI", treatment: "Nitrofurantoin or Cipro", dose: "Adult: 100mg x2 for 5 days" }
            ];

            return (
                <div className="flex h-screen overflow-hidden bg-slate-950">
                    {/* SIDEBAR */}
                    <aside className="w-72 bg-black border-r border-slate-800 p-8 flex flex-col shrink-0">
                        <h2 className="text-2xl font-black text-emerald-500 mb-10 italic">APEX PRO</h2>
                        <nav className="flex-1 space-y-1">
                            {['DASHBOARD', 'POS', 'STOO', 'PATIENTS', 'REPORTS', 'STG'].map(v => (
                                <button key={v} onClick={()=>setView(v)} className={`w-full text-left p-4 rounded-2xl font-black text-[10px] tracking-widest transition-all ${view===v?'active-tab':'text-slate-500 hover:bg-slate-900'}`}>{v}</button>
                            ))}
                        </nav>
                        <button onClick={()=>window.location.reload()} className="text-rose-500 font-bold text-xs uppercase mt-10">Logout</button>
                    </aside>

                    {/* MAIN */}
                    <main className="flex-1 p-10 overflow-auto no-scrollbar bg-slate-950">
                        
                        {view === 'DASHBOARD' && (
                            <div>
                                <h2 className="text-3xl font-black mb-8">Business Health</h2>
                                <div className="grid grid-cols-2 gap-6">
                                    <div className="bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-xl border-l-8 border-emerald-500">
                                        <p className="text-slate-500 text-xs font-bold uppercase">Total Revenue</p>
                                        <h3 className="text-4xl font-black text-emerald-400">{data.sales.reduce((a,b)=>a+b.total,0).toLocaleString()} <span className="text-sm">TZS</span></h3>
                                    </div>
                                    <div className="bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-xl border-l-8 border-blue-500">
                                        <p className="text-slate-500 text-xs font-bold uppercase">Patients in Vault</p>
                                        <h3 className="text-4xl font-black text-blue-400">{data.patients.length}</h3>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'POS' && (
                            <div className="flex gap-8 h-full">
                                <div className="flex-1 space-y-6">
                                    <input placeholder="Search brand or generic..." className="w-full p-5 bg-slate-900 border border-slate-800 rounded-[2rem] text-xl font-bold outline-none focus:border-emerald-500" onChange={(e)=>setSearch(e.target.value.toLowerCase())} />
                                    <div className="grid grid-cols-2 gap-4">
                                        {data.inventory.filter(p => p.brandName.toLowerCase().includes(search)).map(p => (
                                            <div key={p.id} onClick={()=>addToCart(p)} className="bg-slate-900 border border-slate-800 p-6 rounded-[2.5rem] hover:border-emerald-500 cursor-pointer shadow-xl active:scale-95 transition-all">
                                                <p className="font-black text-xl mb-1">{p.brandName}</p>
                                                <p className="text-2xl font-black text-emerald-400">{p.price.toLocaleString()} TZS</p>
                                                <p className="text-[10px] opacity-30">STOCK: {p.stock}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="w-96 bg-white text-slate-900 p-8 rounded-[3rem] shadow-2xl h-fit border-t-8 border-emerald-600">
                                    <h3 className="font-black text-xl mb-6">Patient Bill</h3>
                                    {cart.map(i => (
                                        <div key={i.id} className="flex justify-between border-b pb-2 text-sm font-bold">
                                            <span>{i.brandName} x{i.qty}</span>
                                            <span>{(i.price * i.qty).toLocaleString()}</span>
                                        </div>
                                    ))}
                                    <div className="flex justify-between font-black text-3xl mb-8 mt-4">
                                        <span>Total:</span>
                                        <span className="text-emerald-600">{cart.reduce((s,i)=>s+(i.price*i.qty),0).toLocaleString()}</span>
                                    </div>
                                    <button onClick={finalizeSale} className="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black shadow-lg">FINALIZE</button>
                                </div>
                            </div>
                        )}

                        {view === 'STOO' && (
                            <div className="p-10 bg-slate-900 border border-slate-800 rounded-[3rem] shadow-sm">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-2xl font-black text-emerald-500">Inventory Engine</h2>
                                    <button onClick={async ()=>{
                                        const n = prompt("Brand:"); const p = prompt("Price:"); const s = prompt("Stock:");
                                        if(n) await window.api.addDoc(window.api.collection(window.db, "inventory"), { brandName: n.toUpperCase(), price: Number(p), stock: Number(s) });
                                    }} className="bg-emerald-600 text-white px-8 py-3 rounded-2xl font-black">+ Add Stock</button>
                                </div>
                                <table className="w-full text-left">
                                    <thead><tr className="text-slate-500 text-[10px] font-bold uppercase border-b border-slate-800"><th>Name</th><th>Stock</th><th className="text-right">Price</th></tr></thead>
                                    <tbody className="font-bold">{data.inventory.map(p => (
                                        <tr key={p.id} className="border-b border-slate-800/50"><td className="py-4 font-black">{p.brandName}</td><td>{p.stock}</td><td className="text-right text-emerald-400">{Number(p.price).toLocaleString()}</td></tr>
                                    ))}</tbody>
                                </table>
                            </div>
                        )}

                        {view === 'PATIENTS' && (
                            <div className="p-10 bg-slate-900 border border-slate-800 rounded-[3rem]">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-2xl font-black">Patient Registry</h2>
                                    <button onClick={async ()=>{
                                        const n = prompt("Full Name:"); const c = prompt("NHIF / Card ID:");
                                        if(n) await window.api.addDoc(window.api.collection(window.db, "patients"), { name: n, cardId: c });
                                    }} className="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg">+ Register Patient</button>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    {data.patients.map(pt => (
                                        <div key={pt.id} className="p-6 bg-black rounded-3xl border border-slate-800">
                                            <p className="font-black text-lg text-emerald-500 uppercase">{pt.name}</p>
                                            <p className="text-xs text-slate-500 font-bold uppercase mt-1 tracking-widest">ID: {pt.cardId}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'REPORTS' && (
                            <div className="p-10 bg-slate-900 border border-slate-800 rounded-[3rem]">
                                <h2 className="text-2xl font-black mb-8">Sales Audit Log</h2>
                                <div className="space-y-2">
                                    {data.sales.map(s => (
                                        <div key={s.id} className="flex justify-between p-5 bg-black rounded-2xl border border-slate-800">
                                            <div className="flex gap-4 items-center">
                                                <div className="w-2 h-2 bg-emerald-500 rounded-full"></div>
                                                <span className="text-xs font-bold text-slate-500">{new Date(s.timestamp).toLocaleString()}</span>
                                            </div>
                                            <span className="font-black text-emerald-400">+{s.total.toLocaleString()} TZS</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'STG' && (
                            <div className="p-10 bg-slate-900 border border-slate-800 rounded-[3rem]">
                                <h2 className="text-2xl font-black mb-8">Medicine Intelligence (STG)</h2>
                                <div className="space-y-4">
                                    {STG_DATA.map((item, i) => (
                                        <div key={i} className="p-6 bg-black rounded-3xl border border-slate-800">
                                            <h4 className="text-emerald-500 font-black text-lg underline">{item.disease}</h4>
                                            <p className="text-sm mt-2 text-slate-300 font-bold">Standard Treatment: <span className="text-white">{item.treatment}</span></p>
                                            <p className="text-xs mt-1 text-slate-500 italic">{item.dose}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const boot = setInterval(() => {
            if (window.db) {
                const root = ReactDOM.createRoot(document.getElementById('apex-root'));
                root.render(<App />);
                clearInterval(boot);
            }
        }, 500);
    </script>
</body>
</html>
