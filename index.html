<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX | Sovereign Enterprise</title>
    <!-- PRODUCTION LIBRARIES -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; background-color: #020617; color: white; }
        .active-tab { background: #10b981 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal-overlay { background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="apex-root">
        <div style="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#020617;">
            <h1 style="font-size:4rem;font-weight:900;color:#10b981;font-style:italic;">APEX</h1>
            <p style="color:#64748b;letter-spacing:4px;font-weight:bold;margin-top:10px;">BOOTING SYSTEM...</p>
        </div>
    </div>

    <!-- FAIL SAFE CRASH CATCHER -->
    <script>
        window.onerror = function(msg, url, line) {
            document.getElementById('apex-root').innerHTML = `<div style="padding:50px;color:#f87171;background:#020617;height:100vh;font-family:monospace;"><h2>SYSTEM CRASH</h2><p>${msg}</p><p>Line: ${line}</p></div>`;
            return false;
        };
    </script>

    <!-- 1. CLOUD ENGINE (FIREBASE) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, query, where, getDocs, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // !!! PASTE YOUR REAL CONFIG HERE !!!
        const firebaseConfig = {
            apiKey: "AIzaSyAAazqZ1XnzpQ6A_cCHyQEsgXxq5jVVLXE",
            authDomain: "apex-pharmacy-a69b5.firebaseapp.com",
            projectId: "apex-pharmacy-a69b5",
            storageBucket: "apex-pharmacy-a69b5.firebasestorage.app",
            messagingSenderId: "28559683699",
            appId: "1:28559683699:web:1cc3f16a98a32463657a06",
            measurementId: "G-SVDCM1Y693"
        };

        try {
            const app = initializeApp(firebaseConfig);
            window.db = getFirestore(app);
            window.api = { collection, onSnapshot, addDoc, updateDoc, doc, query, where, getDocs, deleteDoc, orderBy };
        } catch (e) { console.error("Firebase Config Error"); }
    </script>

    <!-- 2. APEX APPLICATION LOGIC -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('LOGIN');
            const [user, setUser] = useState(null);
            const [data, setData] = useState({ inventory: [], sales: [], users: [], patients: [], expenses: [] });
            const [cart, setCart] = useState([]);
            const [search, setSearch] = useState("");
            
            // Modals
            const [editing, setEditing] = useState(null); 
            const [checkoutModal, setCheckoutModal] = useState(false);
            const [debtModal, setDebtModal] = useState(null); 

            // CLOUD SYNC
            useEffect(() => {
                if (!window.db) return;
                const u1 = window.api.onSnapshot(window.api.collection(window.db, "inventory"), (s) => setData(p => ({...p, inventory: s.docs.map(d=>({id:d.id, ...d.data()}))})));
                const u2 = window.api.onSnapshot(window.api.collection(window.db, "sales"), (s) => setData(p => ({...p, sales: s.docs.map(d=>({id:d.id, ...d.data()}))})));
                const u3 = window.api.onSnapshot(window.api.collection(window.db, "patients"), (s) => setData(p => ({...p, patients: s.docs.map(d=>({id:d.id, ...d.data()}))})));
                const u4 = window.api.onSnapshot(window.api.collection(window.db, "users"), (s) => setData(p => ({...p, users: s.docs.map(d=>({id:d.id, ...d.data()}))})));
                const u5 = window.api.onSnapshot(window.api.collection(window.db, "expenses"), (s) => setData(p => ({...p, expenses: s.docs.map(d=>({id:d.id, ...d.data()}))})));
                return () => { u1(); u2(); u3(); u4(); u5(); };
            }, []);

            // PERMISSIONS
            const hasAccess = (level) => {
                const roles = { 'MANAGER': 4, 'PHARMACIST': 3, 'TECHNICIAN': 2, 'ASSISTANT': 1, 'DISPENSER': 0 };
                return roles[user?.role] >= roles[level];
            };

            // LOGIN
            const handleLogin = async () => {
                const u = document.getElementById('u_box').value.toLowerCase().trim();
                const p = document.getElementById('p_box').value.trim();
                const q = window.api.query(window.api.collection(window.db, "users"), window.api.where("username", "==", u), window.api.where("pin", "==", p));
                const snap = await window.api.getDocs(q);
                if (!snap.empty) { 
                    const uData = { id: snap.docs[0].id, ...snap.docs[0].data() };
                    if (uData.status !== 'ACTIVE') return alert("Account is INACTIVE.");
                    setUser(uData); setView('DASHBOARD'); 
                } else alert("Access Denied");
            };

            // POS
            const addToCart = (p) => {
                setCart(prev => {
                    const ex = prev.find(i => i.id === p.id);
                    if (ex) return prev.map(i => i.id === p.id ? {...i, qty: i.qty + 1} : i);
                    return [...prev, {...p, qty: 1, currentPrice: p.price}];
                });
            };

            const updateCartItem = (id, field, val) => {
                setCart(prev => prev.map(i => i.id === id ? {...i, [field]: Number(val) || 0} : i));
            };

            const finalizeSale = async (method, patientId = null) => {
                const total = cart.reduce((s,i)=>s+(i.currentPrice*i.qty), 0);
                const totalCost = cart.reduce((s,i)=>s+(i.costPrice*i.qty), 0);
                
                await window.api.addDoc(window.api.collection(window.db, "sales"), {
                    total, profit: total - totalCost, timestamp: new Date().toISOString(), soldBy: user.username, method, items: cart
                });

                if (method === 'DEBT' && patientId) {
                    const pt = data.patients.find(p => p.id === patientId);
                    await window.api.updateDoc(window.api.doc(window.db, "patients", patientId), { 
                        creditBalance: (pt.creditBalance || 0) + total 
                    });
                }

                for(const i of cart) await window.api.updateDoc(window.api.doc(window.db, "inventory", i.id), { stock: i.stock - i.qty });
                
                setCart([]); setCheckoutModal(false); alert("Sale Authorized");
            };

            // MISSING FUNCTION FIX 1: CLEAR DEBT
            const clearDebt = async (e) => {
                e.preventDefault();
                const amount = Number(new FormData(e.target).get('amount'));
                const client = data.patients.find(c => c.id === debtModal);
                
                await window.api.updateDoc(window.api.doc(window.db, "patients", debtModal), {
                    creditBalance: (client.creditBalance || 0) - amount
                });

                await window.api.addDoc(window.api.collection(window.db, "sales"), {
                    total: amount, profit: amount, timestamp: new Date().toISOString(), soldBy: user.username, method: 'DEBT_CLEARANCE', items: [{brandName: `Debt Clearance: ${client.name}`, qty: 1}]
                });

                setDebtModal(null); alert("Debt Cleared & Revenue Updated!");
            };

            // MISSING FUNCTION FIX 2: EXPORT EXCEL
            const exportData = () => {
                if(data.sales.length === 0) return alert("No data to export");
                const ws = XLSX.utils.json_to_sheet(data.sales.map(s => ({
                    Date: new Date(s.timestamp).toLocaleString(),
                    Amount: s.total,
                    Method: s.method || 'CASH',
                    SoldBy: s.soldBy
                })));
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Sales Report");
                XLSX.writeFile(wb, `Apex_Report_${new Date().toLocaleDateString()}.xlsx`);
            };

            // --- UI: LOGIN ---
            if (!user) {
                return (
                    <div className="h-screen flex items-center justify-center bg-black">
                        <div className="bg-slate-900 p-12 rounded-[4rem] shadow-2xl w-full max-w-sm text-center border border-slate-800">
                            <h1 className="text-5xl font-black text-emerald-500 mb-2 italic">APEX</h1>
                            <p className="text-slate-500 text-[10px] font-bold uppercase mb-12 tracking-[0.3em]">Sovereign Cloud</p>
                            <input id="u_box" placeholder="Username" className="w-full p-4 mb-3 bg-slate-800 rounded-2xl outline-none border border-slate-700 text-center font-bold" />
                            <input id="p_box" type="password" placeholder="PIN" className="w-full p-4 mb-10 bg-slate-800 rounded-2xl outline-none border border-slate-700 text-center font-bold" />
                            <button onClick={handleLogin} className="w-full bg-emerald-600 text-white py-5 rounded-[2rem] font-black text-xl shadow-lg hover:bg-emerald-500 transition-all active:scale-95">AUTHORIZE</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden bg-slate-950">
                    {/* SIDEBAR */}
                    <aside className="w-72 bg-black border-r border-slate-800 p-8 flex flex-col shrink-0">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="w-10 h-10 bg-emerald-600 rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-lg">A</div>
                            <h2 className="text-2xl font-black tracking-tighter">APEX <span className="text-emerald-600 italic">Pro</span></h2>
                        </div>
                        <nav className="flex-1 space-y-1 overflow-y-auto no-scrollbar">
                            <NavBtn id="DASHBOARD" label="Dashboard" icon={lucide.LayoutDashboard} active={view} onClick={setView} />
                            <NavBtn id="POS" label="Sales Terminal" icon={lucide.ShoppingCart} active={view} onClick={setView} />
                            {hasAccess('TECHNICIAN') && <NavBtn id="STOO" label="Inventory" icon={lucide.Package} active={view} onClick={setView} />}
                            <NavBtn id="PATIENTS" label="Patients" icon={lucide.Users} active={view} onClick={setView} />
                            <NavBtn id="GUIDE" label="Med Guide" icon={lucide.BookOpen} active={view} onClick={setView} />
                            {hasAccess('MANAGER') && <NavBtn id="FINANCE" label="Financials" icon={lucide.BarChart3} active={view} onClick={setView} />}
                            {hasAccess('MANAGER') && <NavBtn id="USERS" label="Personnel" icon={lucide.ShieldCheck} active={view} onClick={setView} />}
                        </nav>
                        <div className="pt-6 border-t border-slate-800 mt-4">
                             <div className="flex items-center gap-3 mb-4">
                                <div className="w-8 h-8 bg-slate-800 text-emerald-500 rounded-full flex items-center justify-center font-black">{user.username[0].toUpperCase()}</div>
                                <div><p className="text-[10px] font-black uppercase text-emerald-500">{user.role}</p><p className="text-xs font-bold text-slate-300">{user.username}</p></div>
                             </div>
                             <button onClick={()=>window.location.reload()} className="w-full text-left text-rose-500 font-bold text-[10px] uppercase tracking-widest mt-2 hover:bg-rose-950/30 p-2 rounded-lg transition-all">Terminate Session</button>
                        </div>
                    </aside>

                    {/* MAIN */}
                    <main className="flex-1 p-8 md:p-10 overflow-auto no-scrollbar relative">
                        
                        {/* DASHBOARD */}
                        {view === 'DASHBOARD' && (
                            <div className="animate-in fade-in duration-700">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-4xl font-black tracking-tighter">Director's Overview</h2>
                                    <button onClick={exportData} className="bg-slate-800 text-emerald-400 border border-emerald-900 px-6 py-3 rounded-2xl font-bold flex items-center gap-2 hover:bg-slate-700 text-xs tracking-widest uppercase"><lucide.Download size={16}/> Export Data</button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <StatCard label="Lifetime Revenue" value={data.sales.reduce((a,b)=>a+Number(b.total),0).toLocaleString()} sub="TZS" color="text-emerald-400" border="border-emerald-500" />
                                    <StatCard label="Inventory Wealth" value={data.inventory.reduce((a,b)=>a+(Number(b.costPrice)*Number(b.stock)),0).toLocaleString()} sub="At Cost" color="text-blue-400" border="border-blue-500" />
                                    <StatCard label="Outstanding Debt" value={data.patients.reduce((a,b)=>a+(Number(b.creditBalance)||0),0).toLocaleString()} sub="Unpaid" color="text-rose-400" border="border-rose-500" />
                                </div>
                            </div>
                        )}

                        {/* POS */}
                        {view === 'POS' && (
                            <div className="flex gap-8 h-full animate-in slide-in-from-bottom duration-500">
                                <div className="flex-1 space-y-6 overflow-y-auto no-scrollbar">
                                    <input placeholder="Search disease, symptom or drug..." className="w-full p-6 bg-slate-900 border border-slate-800 rounded-[2rem] text-xl font-bold outline-none focus:ring-2 ring-emerald-500 shadow-xl" onChange={(e)=>setSearch(e.target.value.toLowerCase())} />
                                    <div className="grid grid-cols-2 gap-4">
                                        {data.inventory.filter(p => p.brandName.toLowerCase().includes(search) || p.symptoms?.toLowerCase().includes(search)).map(p => (
                                            <div key={p.id} onClick={()=>addToCart(p)} className="bg-slate-900 border border-slate-800 p-6 rounded-[2.5rem] hover:border-emerald-500 cursor-pointer active:scale-95 transition-all shadow-xl">
                                                <div className="flex justify-between mb-4"><span className="text-[9px] font-black text-emerald-500 uppercase">{p.category}</span></div>
                                                <h4 className="font-black text-xl mb-1">{p.brandName}</h4>
                                                <p className="text-[10px] text-slate-500 font-bold uppercase mb-4">{p.strength} • {p.genericName}</p>
                                                <div className="flex justify-between items-end">
                                                    <p className="text-2xl font-black text-emerald-400">{Number(p.price).toLocaleString()} <span className="text-xs text-slate-500">TZS</span></p>
                                                    <p className={`text-[10px] font-black px-2 py-1 rounded-lg ${p.stock < 10 ? 'bg-rose-900 text-rose-300 animate-pulse':'bg-slate-800 text-slate-400'}`}>STK: {p.stock}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="w-96 bg-white text-slate-900 p-8 rounded-[3.5rem] shadow-2xl h-fit border-t-8 border-emerald-600 sticky top-0 flex flex-col shrink-0">
                                    <div className="flex justify-between items-center mb-8"><h3 className="font-black text-2xl tracking-tighter uppercase">Cart</h3><button onClick={()=>setCart([])} className="text-[10px] font-black text-rose-500 uppercase underline">Clear</button></div>
                                    <div className="space-y-4 mb-8 overflow-auto max-h-[40vh] no-scrollbar px-1">
                                        {cart.length === 0 && <p className="text-center text-slate-300 font-bold text-xs uppercase tracking-widest py-10">Cart Empty</p>}
                                        {cart.map(i => (
                                            <div key={i.id} className="flex justify-between items-center border-b border-slate-100 pb-4">
                                                <div className="flex-1">
                                                    <p className="font-bold text-sm uppercase">{i.brandName}</p>
                                                    <div className="flex items-center gap-2 mt-1">
                                                        <span className="text-[10px] font-bold text-slate-400">Price:</span>
                                                        <input type="number" value={i.currentPrice} onChange={(e)=>updateCartItem(i.id, 'currentPrice', e.target.value)} className="w-20 bg-slate-50 rounded-lg text-xs font-black text-emerald-600 outline-none p-1 border border-slate-200" />
                                                    </div>
                                                </div>
                                                <div className="flex flex-col items-end gap-2">
                                                    <input type="number" value={i.qty} onChange={(e)=>updateCartItem(i.id, 'qty', e.target.value)} className="w-16 p-2 bg-slate-50 rounded-xl text-center font-black text-slate-800 outline-none border border-slate-200" />
                                                    <button onClick={()=>setCart(cart.filter(x=>x.id!==i.id))} className="text-[10px] text-rose-500 font-bold uppercase">Remove</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex justify-between font-black text-4xl mb-10 tracking-tighter text-emerald-600"><span>Total</span><span>{cart.reduce((s,i)=>s+(i.currentPrice*i.qty),0).toLocaleString()}</span></div>
                                    <button onClick={() => cart.length > 0 ? setCheckoutModal(true) : alert("Cart is empty")} className="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black text-xl shadow-xl active:scale-95 transition-all">PROCESS PAYMENT</button>
                                </div>
                            </div>
                        )}

                        {view === 'STOO' && (
                            <div className="bg-slate-900 p-10 rounded-[3.5rem] border border-slate-800 animate-in fade-in duration-500 h-full overflow-y-auto no-scrollbar">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-3xl font-black text-emerald-500 uppercase">Inventory Vault</h2>
                                    <button onClick={() => setEditing({ type: 'PRODUCT', item: {} })} className="bg-emerald-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg hover:scale-105 transition-all text-[10px] tracking-widest uppercase">+ Add Product</button>
                                </div>
                                <table className="w-full text-left">
                                    <thead><tr className="text-slate-500 text-[10px] font-bold uppercase border-b border-slate-800 pb-4"><th className="pb-4">Product</th><th>Category</th><th>Stock</th><th>Margin</th><th className="text-right pb-4">Selling Price</th><th className="text-right pb-4">Manage</th></tr></thead>
                                    <tbody className="font-bold">{data.inventory.map(p => (
                                        <tr key={p.id} className="border-b border-slate-800/50 hover:bg-black/50 transition-all group">
                                            <td className="py-6"><p className="font-black text-white text-lg">{p.brandName}</p><p className="text-[10px] text-slate-500 uppercase">{p.genericName} • {p.strength}</p></td>
                                            <td><span className="text-[9px] bg-slate-800 px-2 py-1 rounded text-slate-400 font-black uppercase">{p.category}</span></td>
                                            <td className={p.stock < 10 ? 'text-rose-500 text-xl' : 'text-slate-300 text-xl'}>{p.stock}</td>
                                            <td className="text-emerald-500">{(((p.price-p.costPrice)/p.price)*100).toFixed(0)}%</td>
                                            <td className="text-right text-emerald-400 text-2xl tracking-tighter">{Number(p.price).toLocaleString()}</td>
                                            <td className="text-right"><button onClick={()=>setEditing({type: 'PRODUCT', item: p})} className="bg-slate-800 text-blue-400 px-4 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-blue-600 hover:text-white transition-all">Edit</button></td>
                                        </tr>
                                    ))}</tbody>
                                </table>
                            </div>
                        )}

                        {view === 'PATIENTS' && (
                            <div className="bg-slate-900 p-10 rounded-[3.5rem] border border-slate-800 animate-in fade-in duration-500 h-full overflow-auto no-scrollbar">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-3xl font-black text-blue-500 uppercase tracking-tighter">Client Registry</h2>
                                    <button onClick={() => setEditing({ type: 'PATIENT', item: {} })} className="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg uppercase text-[10px] tracking-widest">+ New Profile</button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {data.patients.map(pt => (
                                        <div key={pt.id} className="p-8 bg-black rounded-[3rem] border border-slate-800 flex justify-between items-center group hover:border-blue-500 transition-all shadow-xl">
                                            <div>
                                                <h4 className="font-black text-xl text-white uppercase tracking-tighter">{pt.name}</h4>
                                                <p className="text-[10px] text-slate-500 font-bold uppercase mt-2 tracking-widest">{pt.sex} • {pt.age} YRS • {pt.weight} KG</p>
                                                <p className="text-[10px] text-slate-500 font-bold uppercase mt-1 tracking-widest">📞 {pt.phone} • {pt.address}</p>
                                            </div>
                                            <div className="flex flex-col items-end gap-3">
                                                <div className="text-right"><p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Unpaid Debt</p><p className="text-rose-500 font-black text-2xl">{Number(pt.creditBalance || 0).toLocaleString()} <span className="text-xs">TZS</span></p></div>
                                                <div className="flex gap-2">
                                                    {(pt.creditBalance > 0) && <button onClick={()=>setDebtModal(pt.id)} className="text-[10px] font-black text-emerald-500 bg-slate-900 px-3 py-1 rounded-lg uppercase hover:bg-emerald-900 transition-colors">Clear Debt</button>}
                                                    <button onClick={()=>setEditing({type: 'PATIENT', item: pt})} className="text-[10px] font-black text-blue-500 bg-slate-900 px-3 py-1 rounded-lg uppercase hover:bg-blue-900 transition-colors">Edit</button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* MODALS: EDIT EVERYTHING */}
                        {editing && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
                                <div className="bg-slate-900 border border-slate-800 w-full max-w-2xl p-10 rounded-[4rem] shadow-2xl animate-in zoom-in duration-300 overflow-y-auto max-h-[90vh] no-scrollbar">
                                    <h3 className="text-3xl font-black mb-8 text-emerald-500 uppercase tracking-tighter italic">Modify Record</h3>
                                    
                                    <form onSubmit={async (e) => {
                                        e.preventDefault();
                                        const d = new FormData(e.target);
                                        const payload = Object.fromEntries(d.entries());

                                        if (editing.type === 'PRODUCT') {
                                            const pData = { ...payload, price: Number(payload.price), costPrice: Number(payload.costPrice), stock: Number(payload.stock) };
                                            if (editing.item.id) await window.api.updateDoc(window.api.doc(window.db, "inventory", editing.item.id), pData);
                                            else await window.api.addDoc(window.api.collection(window.db, "inventory"), pData);
                                        } 
                                        else if (editing.type === 'PATIENT') {
                                            if (editing.item.id) await window.api.updateDoc(window.api.doc(window.db, "patients", editing.item.id), payload);
                                            else await window.api.addDoc(window.api.collection(window.db, "patients"), { ...payload, creditBalance: 0 });
                                        }
                                        else if (editing.type === 'USER') {
                                            if (editing.item.id) await window.api.updateDoc(window.api.doc(window.db, "users", editing.item.id), payload);
                                            else await window.api.addDoc(window.api.collection(window.db, "users"), { ...payload, status: 'ACTIVE' });
                                        }
                                        setEditing(null); alert("Data Synchronized.");
                                    }} className="space-y-6">

                                        {editing.type === 'PRODUCT' && (
                                            <div className="space-y-4">
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase">Brand Name</label><input name="brandName" defaultValue={editing.item.brandName} required className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800" /></div>
                                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase">Category</label><select name="category" defaultValue={editing.item.category || 'Medicine'} className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800"><option>Medicine</option><option>Medical Supplies</option><option>Cosmetics</option></select></div>
                                                </div>
                                                <div className="grid grid-cols-3 gap-4">
                                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase">Strength</label><input name="strength" defaultValue={editing.item.strength} className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800" /></div>
                                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase">Generic</label><input name="genericName" defaultValue={editing.item.genericName} className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800" /></div>
                                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase">Stock Qty</label><input name="stock" type="number" defaultValue={editing.item.stock} required className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800 font-black text-emerald-500" /></div>
                                                </div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase">Sell Price</label><input name="price" type="number" defaultValue={editing.item.price} required className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800 font-black text-xl text-emerald-500" /></div>
                                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase">Cost Price</label><input name="costPrice" type="number" defaultValue={editing.item.costPrice} required className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800 opacity-60" /></div>
                                                </div>
                                                <div><label className="text-[10px] font-bold text-slate-500 uppercase">Symptoms (For POS Search)</label><textarea name="symptoms" defaultValue={editing.item.symptoms} className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800 h-24 text-sm" placeholder="e.g. fever, headache, pain..."></textarea></div>
                                            </div>
                                        )}

                                        {editing.type === 'PATIENT' && (
                                            <div className="space-y-4">
                                                <input name="name" defaultValue={editing.item.name} placeholder="Full Name" required className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800 font-bold" />
                                                <div className="grid grid-cols-3 gap-4">
                                                    <input name="age" type="number" defaultValue={editing.item.age} placeholder="Age" className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800" />
                                                    <select name="sex" defaultValue={editing.item.sex || 'Male'} className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800"><option>Male</option><option>Female</option></select>
                                                    <input name="weight" type="number" defaultValue={editing.item.weight} placeholder="Weight (kg)" className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800" />
                                                </div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <input name="phone" defaultValue={editing.item.phone} placeholder="Phone Number" className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800" />
                                                    <input name="cardId" defaultValue={editing.item.cardId} placeholder="Insurance / Card ID" className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800" />
                                                </div>
                                                <input name="address" defaultValue={editing.item.address} placeholder="Physical Address" className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800" />
                                            </div>
                                        )}

                                        <div className="flex gap-4 pt-8">
                                            <button type="submit" className="flex-1 bg-emerald-600 text-white py-5 rounded-[2rem] font-black shadow-lg hover:bg-emerald-500 transition-all active:scale-95">SAVE</button>
                                            {editing.item.id && (
                                                <button type="button" onClick={async()=>{
                                                    if(confirm("Permanently Purge Record?")) {
                                                        const col = editing.type === 'PRODUCT' ? 'inventory' : editing.type === 'PATIENT' ? 'patients' : 'users';
                                                        await window.api.deleteDoc(window.api.doc(window.db, col, editing.item.id));
                                                        setEditing(null);
                                                    }
                                                }} className="bg-rose-950 border border-rose-900 text-rose-500 p-5 rounded-[2rem] hover:bg-rose-900 hover:text-white transition-all"><lucide.Trash size={24}/></button>
                                            )}
                                            <button type="button" onClick={()=>setEditing(null)} className="p-5 bg-black border border-slate-800 rounded-[2rem] font-bold text-xs uppercase tracking-widest text-slate-400 hover:text-white transition-all">Cancel</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* CHECKOUT MODAL (Payments) */}
                        {checkoutModal && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
                                <div className="bg-slate-900 border border-slate-800 w-full max-w-md p-10 rounded-[3.5rem] shadow-2xl animate-in zoom-in duration-300 text-center">
                                    <h3 className="text-3xl font-black mb-2 text-emerald-500 italic tracking-tighter">Finalize Bill</h3>
                                    <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-10">Select Payment Method</p>
                                    
                                    <div className="space-y-4 mb-10">
                                        <button onClick={()=>finalizeSale('CASH')} className="w-full py-5 bg-emerald-600 text-white rounded-3xl font-black shadow-xl hover:bg-emerald-500 transition-all active:scale-95 flex justify-center items-center gap-3">💰 CASH PAYMENT</button>
                                        <button onClick={()=>finalizeSale('MOBILE')} className="w-full py-5 bg-blue-600 text-white rounded-3xl font-black shadow-xl hover:bg-blue-500 transition-all active:scale-95 flex justify-center items-center gap-3">📱 M-PESA / TIGO</button>
                                        <button onClick={()=>{
                                            const pid = prompt("Enter Patient Card ID or Name for Debt Tracking:");
                                            const pt = data.patients.find(p => p.cardId === pid || p.name.toLowerCase() === pid?.toLowerCase());
                                            if(pt) finalizeSale('DEBT', pt.id); else alert("Patient not found in Registry!");
                                        }} className="w-full py-5 bg-rose-600 text-white rounded-3xl font-black shadow-xl hover:bg-rose-500 transition-all active:scale-95 flex justify-center items-center gap-3">📓 DEBT (DENI)</button>
                                        <button onClick={()=>finalizeSale('BONUS')} className="w-full py-5 bg-indigo-600 text-white rounded-3xl font-black shadow-xl hover:bg-indigo-500 transition-all active:scale-95 flex justify-center items-center gap-3">🎁 REWARD / BONUS</button>
                                    </div>
                                    <button onClick={()=>setCheckoutModal(false)} className="text-slate-500 font-bold text-xs uppercase tracking-widest hover:text-white transition-all">Cancel Transaction</button>
                                </div>
                            </div>
                        )}

                        {/* DEBT CLEARANCE MODAL */}
                        {debtModal && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
                                <div className="bg-slate-900 border border-slate-800 w-full max-w-sm p-10 rounded-[3.5rem] shadow-2xl animate-in zoom-in duration-300 text-center">
                                    <h3 className="text-2xl font-black mb-6 text-emerald-500 uppercase tracking-tighter">Clear Debt</h3>
                                    <form onSubmit={clearDebt}>
                                        <input name="amount" type="number" placeholder="Amount Paid (TZS)" required className="w-full p-4 mb-6 bg-black rounded-2xl outline-none border border-slate-800 font-black text-xl text-center text-emerald-400" />
                                        <button type="submit" className="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-emerald-500 transition-all">Confirm Payment</button>
                                    </form>
                                    <button onClick={()=>setDebtModal(null)} className="mt-6 text-slate-500 font-bold text-xs uppercase tracking-widest hover:text-white transition-all">Cancel</button>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const NavBtn = ({ id, label, icon: Icon, active, onClick }) => (
            <button onClick={() => onClick(id)} className={`w-full flex items-center gap-4 p-4 rounded-3xl transition-all duration-300 group ${active === id ? 'active-tab translate-x-2' : 'text-slate-500 hover:bg-slate-900'}`}>
                <Icon size={22} className={active === id ? 'text-white' : 'group-hover:text-emerald-500'} />
                <span className="font-black text-[10px] uppercase tracking-widest">{label}</span>
            </button>
        );

        const StatCard = ({ label, value, sub, color, border }) => (
            <div className={`bg-slate-900 p-10 rounded-[3.5rem] border ${border} shadow-2xl hover:shadow-emerald-500/10 transition-all group relative overflow-hidden`}>
                <p className="text-slate-500 text-[10px] font-black uppercase tracking-[0.3em] mb-4 italic">{label}</p>
                <h3 className={`text-5xl font-black tracking-tighter ${color} relative z-10`}>{value} <span className="text-sm font-normal opacity-30 text-white uppercase">{sub}</span></h3>
            </div>
        );

        const boot = setInterval(() => {
            if (window.db) {
                const root = ReactDOM.createRoot(document.getElementById('apex-root'));
                root.render(<App />);
                clearInterval(boot);
            }
        }, 500);
    </script>
</body>
</html>
