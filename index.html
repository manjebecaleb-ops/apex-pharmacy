<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>APEX | Sovereign Enterprise</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
        .active-tab { background: #10b981 !important; color: white !important; }
    </style>
</head>
<body>
    <div id="apex-root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAAazqZ1XnzpQ6A_cCHyQEsgXxq5jVVLXE",
            authDomain: "apex-pharmacy-a69b5.firebaseapp.com",
            projectId: "apex-pharmacy-a69b5",
            storageBucket: "apex-pharmacy-a69b5.firebasestorage.app",
            messagingSenderId: "28559683699",
            appId: "1:28559683699:web:1cc3f16a98a32463657a06",
            measurementId: "G-SVDCM1Y693"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.api = { collection, onSnapshot, query, orderBy };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('DASHBOARD');
            const [data, setData] = useState({ inventory: [], sales: [], patients: [] });
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (!window.db) return;
                
                // SAFETY SYNC: Using empty arrays as defaults to prevent crashes
                const unsubInv = window.api.onSnapshot(window.api.collection(window.db, "inventory"), (s) => {
                    const inv = s.docs.map(d => ({id: d.id, ...d.data()}));
                    setData(p => ({...p, inventory: inv}));
                    setLoading(false);
                });

                const unsubSales = window.api.onSnapshot(window.api.collection(window.db, "sales"), (s) => {
                    const sls = s.docs.map(d => ({id: d.id, ...d.data()}));
                    setData(p => ({...p, sales: sls}));
                });

                return () => { unsubInv(); unsubSales(); };
            }, []);

            return (
                <div className="flex h-screen bg-slate-950 text-white">
                    {/* SIDEBAR */}
                    <aside className="w-64 border-r border-slate-800 p-6 flex flex-col shrink-0">
                        <h2 className="text-2xl font-black text-emerald-500 mb-10 italic">APEX PRO</h2>
                        <nav className="flex-1 space-y-2">
                            <button onClick={()=>setView('DASHBOARD')} className={`w-full text-left p-3 rounded-xl font-bold ${view==='DASHBOARD'?'active-tab':'text-slate-500'}`}>Dashboard</button>
                            <button onClick={()=>setView('POS')} className={`w-full text-left p-3 rounded-xl font-bold ${view==='POS'?'active-tab':'text-slate-500'}`}>POS Sales</button>
                            <button onClick={()=>setView('STOO')} className={`w-full text-left p-3 rounded-xl font-bold ${view==='STOO'?'active-tab':'text-slate-500'}`}>Inventory</button>
                        </nav>
                        <div className="text-[10px] text-emerald-500 font-bold border border-emerald-500/20 p-2 rounded text-center">
                            {loading ? "⌛ SYNCING..." : "✅ CLOUD LIVE"}
                        </div>
                    </aside>

                    {/* MAIN */}
                    <main className="flex-1 p-10 overflow-auto">
                        <header className="flex justify-between items-center mb-10">
                            <h2 className="text-2xl font-black tracking-tighter uppercase">{view}</h2>
                        </header>

                        {view === 'DASHBOARD' && (
                            <div className="grid grid-cols-2 gap-6">
                                <div className="bg-slate-900 p-8 rounded-3xl border border-slate-800">
                                    <p className="text-slate-500 text-xs font-bold uppercase">Total Revenue</p>
                                    <h3 className="text-4xl font-black text-emerald-400 mt-2">
                                        {(data.sales || []).reduce((a,b)=>a+(b.total||0),0).toLocaleString()} TZS
                                    </h3>
                                </div>
                                <div className="bg-slate-900 p-8 rounded-3xl border border-slate-800">
                                    <p className="text-slate-500 text-xs font-bold uppercase">Inventory Items</p>
                                    <h3 className="text-4xl font-black text-blue-400 mt-2">{(data.inventory || []).length}</h3>
                                </div>
                            </div>
                        )}

                        {view === 'STOO' && (
                            <div className="p-8 bg-slate-900 rounded-3xl border border-slate-800">
                                <button onClick={() => alert("Add logic triggered")} className="mb-6 bg-emerald-600 px-6 py-2 rounded-xl font-bold">+ Add Stock</button>
                                <table className="w-full text-left">
                                    <thead className="text-slate-500 text-xs border-b border-slate-800">
                                        <tr><th className="pb-4">Name</th><th className="pb-4 text-right">Price</th></tr>
                                    </thead>
                                    <tbody>
                                        {(data.inventory || []).map(p => (
                                            <tr key={p.id} className="border-b border-slate-800/50">
                                                <td className="py-4 font-bold">{p.brandName}</td>
                                                <td className="text-right text-emerald-400">{(p.price || 0).toLocaleString()}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const checkDB = setInterval(() => {
            if (window.db) {
                const root = ReactDOM.createRoot(document.getElementById('apex-root'));
                root.render(<App />);
                clearInterval(checkDB);
            }
        }, 500);
    </script>
</body>
</html>
