<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>APEX | Sovereign Enterprise</title>
    <!-- Stable Native Engines -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans overflow-hidden">
    <div id="apex-root">
        <div style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;">
            <h1 style="font-size:3rem; font-weight:900; color:#10b981;">APEX</h1>
            <p>Initializing Sovereign Vault...</p>
        </div>
    </div>

    <script>
        const e = React.createElement;
        const { useState, useEffect } = React;

        // --- 1. THE PRIVATE DATABASE (IndexedDB) ---
        const db = new Dexie("ApexSovereignDB");
        db.version(1).stores({
            inventory: "++id, brandName, genericName, symptoms, stock",
            sales: "++id, timestamp, total",
            patients: "++id, name, cardId",
            users: "++id, &username, pin, role",
            expenses: "++id, category, amount"
        });

        function App() {
            const [view, setView] = useState('LOGIN');
            const [user, setUser] = useState(null);
            const [data, setData] = useState({ inventory: [], sales: [], users: [], patients: [], expenses: [] });
            const [cart, setCart] = useState([]);
            const [search, setSearch] = useState("");

            // --- DATA REFRESH ---
            const refresh = async () => {
                const i = await db.inventory.toArray();
                const s = await db.sales.orderBy('id').reverse().limit(10).toArray();
                const u = await db.users.toArray();
                const p = await db.patients.toArray();
                const ex = await db.expenses.toArray();
                setData({ inventory: i, sales: s, users: u, patients: p, expenses: ex });
            };

            useEffect(() => {
                const init = async () => {
                    if (await db.users.count() === 0) {
                        await db.users.add({ username: "admin", pin: "1234", role: "MANAGER" });
                    }
                    if (user) refresh();
                };
                init();
            }, [user]);

            const handleLogin = async () => {
                const u = document.getElementById('u_box').value.toLowerCase();
                const p = document.getElementById('p_box').value;
                const found = await db.users.where({ username: u, pin: p }).first();
                if (found) { setUser(found); setView('DASHBOARD'); }
                else alert("Access Denied");
            };

            const addToCart = (p) => {
                const ex = cart.find(i => i.id === p.id);
                if (p.stock <= (ex?.qty || 0)) return alert("OUT OF STOCK");
                setCart(prev => ex ? prev.map(i => i.id === p.id ? {...i, qty: i.qty + 1} : i) : [...prev, {...p, qty: 1}]);
            };

            const finalize = async () => {
                const total = cart.reduce((s,i)=>s+(i.price*i.qty), 0);
                await db.sales.add({ total, timestamp: new Date().toLocaleString() });
                for(const i of cart) await db.inventory.update(i.id, { stock: i.stock - i.qty });
                setCart([]); refresh(); alert("Sale Recorded!");
            };

            // --- UI BUILDER ---
            if (view === 'LOGIN') {
                return e('div', { className: 'h-screen flex items-center justify-center bg-black' },
                    e('div', { className: 'bg-slate-900 p-12 rounded-[3rem] shadow-2xl w-80 text-center border border-slate-800' },
                        e('h1', { className: 'text-4xl font-black text-emerald-500 mb-6 italic' }, 'APEX'),
                        e('input', { id: 'u_box', placeholder: 'Username', className: 'w-full p-4 mb-3 bg-slate-800 rounded-2xl outline-none text-white border border-slate-700' }),
                        e('input', { id: 'p_box', type: 'password', placeholder: 'PIN', className: 'w-full p-4 mb-10 bg-slate-800 rounded-2xl outline-none text-white border border-slate-700' }),
                        e('button', { onClick: handleLogin, className: 'w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold shadow-lg' }, 'LOGIN')
                    )
                );
            }

            return e('div', { className: 'flex h-screen overflow-hidden' },
                e('aside', { className: 'w-64 bg-black border-r border-slate-800 p-6 flex flex-col shrink-0' },
                    e('h2', { className: 'text-2xl font-black mb-10 text-emerald-500 italic' }, 'APEX PRO'),
                    e('nav', { className: 'flex-1 space-y-1' },
                        ['DASHBOARD', 'POS', 'STOO', 'PATIENTS', 'REPORTS'].map(v => 
                            e('button', { key: v, onClick: () => setView(v), className: `w-full text-left p-3 rounded-xl font-bold ${view===v?'bg-emerald-600 text-white':'text-slate-500'}` }, v)
                        )
                    ),
                    e('button', { onClick: () => window.location.reload(), className: 'mt-20 text-rose-500 text-xs font-bold' }, 'LOGOUT')
                ),

                e('main', { className: 'flex-1 p-10 overflow-auto bg-slate-950' },
                    view === 'DASHBOARD' && e('div', null,
                        e('h2', {className:'text-3xl font-black mb-8'}, 'Director Overview'),
                        e('div', {className:'grid grid-cols-2 gap-6'},
                            e('div', {className:'bg-slate-900 p-8 rounded-3xl border border-slate-800 border-l-8 border-emerald-500'}, 
                                e('p', {className:'text-xs font-bold text-slate-500 uppercase'}, 'Total Sales'),
                                e('h3', {className:'text-3xl font-black text-emerald-400'}, data.sales.reduce((a,b)=>a+b.total,0).toLocaleString() + ' TZS')
                            ),
                            e('div', {className:'bg-slate-900 p-8 rounded-3xl border border-slate-800 border-l-8 border-blue-500'}, 
                                e('p', {className:'text-xs font-bold text-slate-500 uppercase'}, 'Inventory Wealth'),
                                e('h3', {className:'text-3xl font-black text-blue-400'}, data.inventory.length + ' Items')
                            )
                        )
                    ),

                    view === 'POS' && e('div', { className: 'flex gap-6' },
                        e('div', { className: 'flex-1 space-y-6' },
                            e('input', { placeholder: 'Search products...', className: 'w-full p-4 rounded-2xl bg-slate-900 border border-slate-800', onChange: (ev) => setSearch(ev.target.value.toLowerCase()) }),
                            e('div', { className: 'grid grid-cols-2 gap-4' },
                                data.inventory.filter(p => p.brandName.toLowerCase().includes(search)).map(p => e('div', { key: p.id, onClick: () => addToCart(p), className: 'bg-slate-900 p-6 rounded-3xl border border-slate-800 hover:border-emerald-500 cursor-pointer shadow-sm active:scale-95 transition-all' },
                                    e('p', {className:'font-black text-lg'}, p.brandName),
                                    e('p', {className:'text-emerald-400 font-bold'}, Number(p.price).toLocaleString() + ' TZS'),
                                    e('p', {className:'text-[10px] text-slate-600 mt-2'}, 'STOCK: '+p.stock)
                                ))
                            )
                        ),
                        e('div', { className: 'w-80 bg-white text-slate-900 p-8 rounded-[3rem] shadow-2xl h-fit border-t-8 border-emerald-600' },
                            e('h3', {className:'font-black text-xl mb-4'}, 'Bill'),
                            cart.map(i => e('div', {key:i.id, className:'flex justify-between py-2 border-b text-sm font-bold'}, e('span',null,i.brandName+' x'+i.qty), e('span',null,(i.price*i.qty).toLocaleString()))),
                            e('div', {className:'mt-6 flex justify-between font-black text-2xl text-emerald-600'}, e('span',null,'Total'), e('span',null, cart.reduce((s,i)=>s+(i.price*i.qty),0).toLocaleString())),
                            e('button', {onClick: finalize, className: 'w-full bg-emerald-600 text-white p-4 rounded-2xl font-bold mt-8 shadow-lg' }, 'FINALIZE SALE')
                        )
                    ),

                    view === 'STOO' && e('div', null,
                        e('div', {className:'flex justify-between mb-8'},
                            e('h2', {className:'text-3xl font-black'}, 'Inventory'),
                            e('button', {onClick: async () => {
                                const n = prompt("Brand:"); const p = prompt("Price:"); const c = prompt("Cost:"); const s = prompt("Stock:");
                                if(n) await db.inventory.add({brandName:n.toUpperCase(), price:Number(p), costPrice:Number(c), stock:Number(s), symptoms:''}); refresh();
                            }, className: 'bg-emerald-600 text-white px-6 py-2 rounded-xl font-bold' }, '+ Add Stock')
                        ),
                        e('table', {className:'w-full text-left bg-slate-900 rounded-3xl overflow-hidden shadow-sm'},
                            e('thead', {className:'bg-black text-[10px] font-bold text-slate-500 p-4 uppercase'}, e('tr', null, e('th', {className:'p-4'},'Product'), e('th',null,'Stock'), e('th',null,'Price'))),
                            e('tbody', null, data.inventory.map(p => e('tr', {key:p.id, className:'border-b border-slate-800'},
                                e('td', {className:'p-4 font-bold'}, p.brandName),
                                e('td', null, p.stock),
                                e('td', {className:'font-bold text-emerald-400'}, p.price.toLocaleString())
                            )))
                        )
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('apex-root'));
        root.render(e(App));
    </script>
</body>
</html>
