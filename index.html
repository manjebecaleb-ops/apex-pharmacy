<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX | Stable Enterprise</title>
    <!-- PRODUCTION LIBRARIES (NO BABEL) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; background-color: #020617; color: white; margin: 0; }
        .active-tab { background: #10b981 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal-overlay { background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="apex-root">
        <div style="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <h1 style="font-size:4rem;font-weight:900;color:#10b981;font-style:italic;">APEX</h1>
            <p style="color:#64748b;font-weight:bold;margin-top:10px;">CONNECTING TO CLOUD...</p>
        </div>
    </div>

    <!-- 1. CLOUD ENGINE (FIREBASE) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, query, where, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // !!! PASTE YOUR REAL CONFIG HERE !!!
        const firebaseConfig = {
            apiKey: "AIzaSyAAazqZ1XnzpQ6A_cCHyQEsgXxq5jVVLXE",
            authDomain: "apex-pharmacy-a69b5.firebaseapp.com",
            projectId: "apex-pharmacy-a69b5",
            storageBucket: "apex-pharmacy-a69b5.firebasestorage.app",
            messagingSenderId: "28559683699",
            appId: "1:28559683699:web:1cc3f16a98a32463657a06"
        };

        try {
            const app = initializeApp(firebaseConfig);
            window.db = getFirestore(app);
            window.api = { collection, onSnapshot, addDoc, updateDoc, doc, query, where, getDocs, deleteDoc };
        } catch (err) { alert("Firebase Config Error"); }
    </script>

    <!-- 2. APEX APPLICATION LOGIC (NATIVE JS) -->
    <script>
        const e = React.createElement;
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState('LOGIN');
            const [user, setUser] = useState(null);
            const [inventory, setInventory] = useState([]);
            const [sales, setSales] = useState([]);
            const [patients, setPatients] = useState([]);
            const [users, setUsers] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [cart, setCart] = useState([]);
            const [search, setSearch] = useState("");
            
            const [editing, setEditing] = useState(null);
            const [checkoutModal, setCheckoutModal] = useState(false);
            const [debtModal, setDebtModal] = useState(null);

            // CLOUD SYNC
            useEffect(() => {
                if (!window.db) return;
                const unsubInv = window.api.onSnapshot(window.api.collection(window.db, "inventory"), (s) => setInventory(s.docs.map(d=>({id:d.id, ...d.data()}))));
                const unsubSales = window.api.onSnapshot(window.api.collection(window.db, "sales"), (s) => setSales(s.docs.map(d=>({id:d.id, ...d.data()}))));
                const unsubPatients = window.api.onSnapshot(window.api.collection(window.db, "patients"), (s) => setPatients(s.docs.map(d=>({id:d.id, ...d.data()}))));
                const unsubUsers = window.api.onSnapshot(window.api.collection(window.db, "users"), (s) => setUsers(s.docs.map(d=>({id:d.id, ...d.data()}))));
                const unsubExp = window.api.onSnapshot(window.api.collection(window.db, "expenses"), (s) => setExpenses(s.docs.map(d=>({id:d.id, ...d.data()}))));
                return () => { unsubInv(); unsubSales(); unsubPatients(); unsubUsers(); unsubExp(); };
            }, []);

            // BOOTSTRAP ADMIN
            useEffect(() => {
                const init = async () => {
                    const q = window.api.query(window.api.collection(window.db, "users"), window.api.where("username", "==", "admin"));
                    const snap = await window.api.getDocs(q);
                    if (snap.empty) await window.api.addDoc(window.api.collection(window.db, "users"), { username: "admin", pin: "1234", role: "MANAGER", status: "ACTIVE" });
                };
                if(window.db) init();
            }, []);

            const hasAccess = (level) => {
                const roles = { 'MANAGER': 4, 'PHARMACIST': 3, 'TECHNICIAN': 2, 'ASSISTANT': 1, 'DISPENSER': 0 };
                return roles[user?.role] >= roles[level];
            };

            const handleLogin = async () => {
                const u = document.getElementById('u_box').value.toLowerCase().trim();
                const p = document.getElementById('p_box').value.trim();
                const q = window.api.query(window.api.collection(window.db, "users"), window.api.where("username", "==", u), window.api.where("pin", "==", p));
                const snap = await window.api.getDocs(q);
                if (!snap.empty) { 
                    const uData = { id: snap.docs[0].id, ...snap.docs[0].data() };
                    if (uData.status !== 'ACTIVE') return alert("Account INACTIVE. See Manager.");
                    setUser(uData); setView('DASHBOARD'); 
                } else alert("Invalid Username or PIN");
            };

            const addToCart = (p) => {
                const ex = cart.find(i => i.id === p.id);
                if (p.stock <= (ex?.qty || 0)) return alert("OUT OF STOCK!");
                setCart(prev => ex ? prev.map(i => i.id === p.id ? {...i, qty: i.qty + 1} : i) : [...prev, {...p, qty: 1, currentPrice: p.price}]);
            };

            const finalizeSale = async (method, patientId = null) => {
                const total = cart.reduce((s,i)=>s+(i.currentPrice*i.qty), 0);
                const totalCost = cart.reduce((s,i)=>s+(i.costPrice*i.qty), 0);
                
                await window.api.addDoc(window.api.collection(window.db, "sales"), { total, profit: total - totalCost, timestamp: new Date().toISOString(), soldBy: user.username, method, items: cart });

                if (method === 'DEBT' && patientId) {
                    const pt = patients.find(p => p.id === patientId);
                    await window.api.updateDoc(window.api.doc(window.db, "patients", patientId), { creditBalance: (pt.creditBalance || 0) + total });
                }

                for(const i of cart) await window.api.updateDoc(window.api.doc(window.db, "inventory", i.id), { stock: i.stock - i.qty });
                
                setCart([]); setCheckoutModal(false); alert("Sale Authorized");
            };

            const clearDebt = async (evt) => {
                evt.preventDefault();
                const amount = Number(new FormData(evt.target).get('amount'));
                const client = patients.find(c => c.id === debtModal);
                
                await window.api.updateDoc(window.api.doc(window.db, "patients", debtModal), { creditBalance: (client.creditBalance || 0) - amount });
                await window.api.addDoc(window.api.collection(window.db, "sales"), { total: amount, profit: amount, timestamp: new Date().toISOString(), soldBy: user.username, method: 'DEBT_CLEARANCE', items: [{brandName: `Debt Clearance: ${client.name}`, qty: 1}] });
                setDebtModal(null); alert("Debt Cleared!");
            };

            // --- UI BUILDER ---
            if (!user) {
                return e('div', { className: 'h-screen flex items-center justify-center bg-black' },
                    e('div', { className: 'bg-slate-900 p-12 rounded-[4rem] shadow-2xl w-full max-w-sm text-center border border-slate-800' },
                        e('h1', { className: 'text-5xl font-black text-emerald-500 mb-2 italic' }, 'APEX'),
                        e('p', { className: 'text-slate-500 text-[10px] font-bold uppercase mb-12 tracking-[0.3em]' }, 'Sovereign Cloud'),
                        e('input', { id: 'u_box', placeholder: 'Username', className: 'w-full p-4 mb-3 bg-slate-800 rounded-2xl outline-none border border-slate-700 text-center font-bold' }),
                        e('input', { id: 'p_box', type: 'password', placeholder: 'PIN', className: 'w-full p-4 mb-10 bg-slate-800 rounded-2xl outline-none border border-slate-700 text-center font-bold tracking-[1em]' }),
                        e('button', { onClick: handleLogin, className: 'w-full bg-emerald-600 text-white py-5 rounded-[2rem] font-black text-xl shadow-lg hover:bg-emerald-500 transition-all' }, 'AUTHORIZE')
                    )
                );
            }

            const NavBtn = ({ id, label }) => e('button', {
                onClick: () => setView(id),
                className: `w-full text-left p-4 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all mb-2 ${view === id ? 'active-tab' : 'text-slate-500 hover:bg-slate-900'}`
            }, label);

            const StatCard = ({ label, value, sub, color }) => e('div', { className: 'bg-slate-900 p-10 rounded-[3rem] shadow-2xl border border-slate-800' },
                e('p', { className: 'text-slate-500 text-[10px] font-black uppercase tracking-[0.3em] mb-4' }, label),
                e('h3', { className: `text-5xl font-black tracking-tighter ${color}` }, value, e('span', { className: 'text-sm font-normal opacity-30 text-white uppercase ml-2' }, sub))
            );

            return e('div', { className: 'flex h-screen overflow-hidden bg-slate-950 text-white' },
                // SIDEBAR
                e('aside', { className: 'w-72 bg-black border-r border-slate-800 p-8 flex flex-col shrink-0' },
                    e('div', { className: 'flex items-center gap-3 mb-10' },
                        e('div', { className: 'w-10 h-10 bg-emerald-600 rounded-2xl flex items-center justify-center text-white font-black text-xl' }, 'A'),
                        e('h2', { className: 'text-2xl font-black tracking-tighter italic' }, 'APEX ', e('span', {className:'text-emerald-600'}, 'Pro'))
                    ),
                    e('nav', { className: 'flex-1 overflow-y-auto no-scrollbar' },
                        NavBtn({ id: 'DASHBOARD', label: 'Command Center' }),
                        NavBtn({ id: 'POS', label: 'Sales Terminal' }),
                        hasAccess('TECHNICIAN') && NavBtn({ id: 'STOO', label: 'Inventory Vault' }),
                        NavBtn({ id: 'PATIENTS', label: 'Patient Registry' }),
                        hasAccess('MANAGER') && NavBtn({ id: 'FINANCE', label: 'Financials' }),
                        hasAccess('MANAGER') && NavBtn({ id: 'USERS', label: 'Personnel' })
                    ),
                    e('button', { onClick: () => window.location.reload(), className: 'text-rose-500 font-bold text-[10px] uppercase tracking-widest mt-10' }, 'Logout Session')
                ),

                // MAIN CONTENT
                e('main', { className: 'flex-1 p-10 overflow-auto no-scrollbar relative' },
                    view === 'DASHBOARD' && e('div', null,
                        e('h2', { className: 'text-4xl font-black mb-10 tracking-tighter' }, "Director's Overview"),
                        e('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-6' },
                            StatCard({ label: 'Lifetime Revenue', value: sales.reduce((a,b)=>a+b.total,0).toLocaleString(), sub: 'TZS', color: 'text-emerald-400' }),
                            StatCard({ label: 'Inventory Wealth', value: inventory.reduce((a,b)=>a+(b.costPrice*b.stock),0).toLocaleString(), sub: 'At Cost', color: 'text-blue-400' }),
                            StatCard({ label: 'Outstanding Debt', value: patients.reduce((a,b)=>a+(Number(b.creditBalance)||0),0).toLocaleString(), sub: 'Unpaid', color: 'text-rose-400' })
                        )
                    ),

                    view === 'POS' && e('div', { className: 'flex gap-8 h-full' },
                        e('div', { className: 'flex-1 space-y-6 overflow-y-auto no-scrollbar' },
                            e('input', { placeholder: 'Search disease, symptom or drug...', className: 'w-full p-6 bg-slate-900 border border-slate-800 rounded-[2rem] text-xl font-bold outline-none focus:ring-2 ring-emerald-500 shadow-xl', onChange: (ev)=>setSearch(ev.target.value.toLowerCase()) }),
                            e('div', { className: 'grid grid-cols-2 lg:grid-cols-3 gap-4' },
                                inventory.filter(p => (p.brandName||'').toLowerCase().includes(search) || (p.symptoms||'').toLowerCase().includes(search)).map(p => 
                                    e('div', { key: p.id, onClick: () => addToCart(p), className: 'bg-slate-900 border border-slate-800 p-6 rounded-[2.5rem] hover:border-emerald-500 cursor-pointer shadow-xl flex flex-col justify-between h-48' },
                                        e('div', null, e('span', {className:'text-[9px] font-black text-emerald-500 uppercase'}, p.category)),
                                        e('h4', {className:'font-black text-xl tracking-tight'}, p.brandName),
                                        e('div', {className:'flex justify-between items-end mt-4'},
                                            e('p', {className:'text-2xl font-black text-emerald-400'}, Number(p.price).toLocaleString()),
                                            e('p', {className:`text-[10px] font-black px-2 py-1 rounded-lg ${p.stock < 10 ? 'bg-rose-900 text-rose-300':'bg-slate-800 text-slate-400'}`}, 'STK: '+p.stock)
                                        )
                                    )
                                )
                            )
                        ),
                        e('div', { className: 'w-96 bg-white text-slate-900 p-8 rounded-[3.5rem] shadow-2xl h-fit border-t-8 border-emerald-600 flex flex-col shrink-0' },
                            e('h3', {className:'font-black text-2xl mb-8 tracking-tighter uppercase'}, 'Cart'),
                            e('div', {className:'space-y-4 mb-8 overflow-auto max-h-[40vh] no-scrollbar px-1 font-bold text-sm'},
                                cart.length === 0 && e('p', {className:'text-center text-slate-300 py-10 uppercase'}, 'Cart Empty'),
                                cart.map(i => e('div', {key:i.id, className:'flex justify-between items-center border-b border-slate-100 pb-4'},
                                    e('div', {className:'flex-1'}, e('p',null,i.brandName), e('input', { type:'number', value:i.currentPrice, onChange:(ev)=>setCart(cart.map(x=>x.id===i.id?{...x, currentPrice:Number(ev.target.value)}:x)), className:'w-20 mt-1 bg-slate-50 rounded-lg text-xs font-black text-emerald-600 outline-none p-1 border border-slate-200' })),
                                    e('div', {className:'flex flex-col items-end gap-2'}, e('input', { type:'number', value:i.qty, onChange:(ev)=>setCart(cart.map(x=>x.id===i.id?{...x, qty:parseInt(ev.target.value)||0}:x)), className:'w-16 p-2 bg-slate-50 rounded-xl text-center font-black outline-none border border-slate-200' }), e('button', {onClick:()=>setCart(cart.filter(x=>x.id!==i.id)), className:'text-[10px] text-rose-500 uppercase'}, 'Remove'))
                                ))
                            ),
                            e('div', {className:'flex justify-between font-black text-4xl mb-10 tracking-tighter text-emerald-600'}, e('span',null,'Total'), e('span',null, cart.reduce((s,i)=>s+(i.currentPrice*i.qty),0).toLocaleString())),
                            e('button', {onClick: () => cart.length > 0 ? setCheckoutModal(true) : alert("Empty!"), className:'w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black text-xl shadow-xl hover:bg-black'}, 'PROCESS PAYMENT')
                        )
                    ),

                    view === 'STOO' && e('div', null,
                        e('div', {className:'flex justify-between items-center mb-10'},
                            e('h2', {className:'text-3xl font-black text-emerald-500 uppercase tracking-widest'}, 'Inventory Vault'),
                            e('button', {onClick: () => setEditing({ type: 'PRODUCT', item: {} }), className:'bg-emerald-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg text-[10px] uppercase tracking-widest'}, '+ Add Stock')
                        ),
                        e('table', {className:'w-full text-left'},
                            e('thead', {className:'text-slate-500 text-[10px] font-bold uppercase border-b border-slate-800 pb-4'}, e('tr',null, e('th',{className:'pb-4'},'Product'), e('th',null,'Stock'), e('th',null,'Margin'), e('th',{className:'text-right'},'Price'), e('th',{className:'text-right'},'Manage'))),
                            e('tbody', {className:'font-bold'}, inventory.map(p => e('tr', {key:p.id, className:'border-b border-slate-800/50 hover:bg-black/50'},
                                e('td', {className:'py-6'}, e('p',{className:'font-black text-white text-lg'}, p.brandName), e('p',{className:'text-[10px] text-slate-500 uppercase'}, p.genericName)),
                                e('td', {className:p.stock < 10 ? 'text-rose-500 text-xl' : 'text-slate-300 text-xl'}, p.stock),
                                e('td', {className:'text-emerald-500'}, (((p.price-p.costPrice)/p.price)*100).toFixed(0)+'%'),
                                e('td', {className:'text-right text-emerald-400 text-2xl tracking-tighter'}, Number(p.price).toLocaleString()),
                                e('td', {className:'text-right'}, e('button', {onClick:()=>setEditing({type: 'PRODUCT', item: p}), className:'bg-slate-800 text-blue-400 px-4 py-2 rounded-xl text-[10px] uppercase'}, 'Edit'))
                            )))
                        )
                    ),

                    view === 'PATIENTS' && e('div', null,
                        e('div', {className:'flex justify-between items-center mb-10'},
                            e('h2', {className:'text-3xl font-black text-blue-500 uppercase tracking-tighter'}, 'Client Registry'),
                            e('button', {onClick: () => setEditing({ type: 'CLIENT', item: {} }), className:'bg-blue-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg uppercase text-[10px] tracking-widest'}, '+ New Profile')
                        ),
                        e('div', {className:'grid grid-cols-1 md:grid-cols-2 gap-6'}, patients.map(pt => e('div', {key:pt.id, className:'p-8 bg-black rounded-[3rem] border border-slate-800 flex justify-between items-center shadow-xl'},
                            e('div', null, e('h4',{className:'font-black text-xl text-white uppercase'}, pt.name), e('p',{className:'text-[10px] text-slate-500 font-bold uppercase mt-2 tracking-widest'}, pt.sex + ' • ' + pt.age + ' YRS • ' + pt.weight + ' KG'), e('p',{className:'text-[10px] text-slate-500 font-bold uppercase mt-1 tracking-widest'}, '📞 ' + pt.phone + ' • ' + pt.address)),
                            e('div', {className:'flex flex-col items-end gap-3'}, 
                                e('div', {className:'text-right'}, e('p',{className:'text-[10px] font-bold text-slate-500 uppercase tracking-widest'}, 'Unpaid Debt'), e('p',{className:'text-rose-500 font-black text-2xl'}, Number(pt.creditBalance || 0).toLocaleString() + ' TZS')),
                                e('div', {className:'flex gap-2'}, 
                                    (pt.creditBalance > 0) && e('button', {onClick:()=>setDebtModal(pt.id), className:'text-[10px] font-black text-emerald-500 bg-slate-900 px-3 py-1 rounded-lg uppercase hover:bg-emerald-900'}, 'Clear Debt'),
                                    e('button', {onClick:()=>setEditing({type: 'CLIENT', item: pt}), className:'text-[10px] font-black text-blue-500 bg-slate-900 px-3 py-1 rounded-lg uppercase hover:bg-blue-900'}, 'Edit')
                                )
                            )
                        )))
                    ),

                    view === 'FINANCE' && e('div', {className:'space-y-10'},
                        e('h2', {className:'text-4xl font-black tracking-tighter uppercase italic decoration-emerald-500 underline underline-offset-8'}, 'Financial Ledger'),
                        e('div', {className:'grid grid-cols-1 md:grid-cols-3 gap-6'},
                            StatCard({ label: 'Gross Revenue', value: sales.reduce((a,b)=>a+b.total,0).toLocaleString(), sub: '', color: 'text-emerald-400', border: 'border-slate-800' }),
                            StatCard({ label: 'Consumption (Bills)', value: expenses.reduce((a,b)=>a+b.amount,0).toLocaleString(), sub: '', color: 'text-rose-500', border: 'border-slate-800' }),
                            StatCard({ label: 'Net Profit', value: (sales.reduce((a,b)=>a+b.total,0) - expenses.reduce((a,b)=>a+b.amount,0)).toLocaleString(), sub: '', color: 'text-white', border: 'border-slate-800' })
                        ),
                        e('div', {className:'bg-slate-900 p-10 rounded-[3rem] border border-slate-800'},
                            e('div', {className:'flex justify-between items-center mb-8'}, e('h3',{className:'font-black text-xl uppercase tracking-tighter'}, 'Consumption Log'), e('button', {onClick: () => setEditing({ type: 'EXPENSE', item: {} }), className:'text-xs font-bold text-emerald-500 bg-emerald-900/30 px-6 py-3 rounded-2xl tracking-widest uppercase hover:bg-emerald-900'}, '+ Record Bill')),
                            e('div', {className:'space-y-3'}, expenses.map(ex => e('div', {key:ex.id, className:'flex justify-between items-center p-4 bg-black rounded-2xl border border-slate-900'}, e('div',null, e('p',{className:'font-bold text-xs uppercase tracking-widest'}, ex.category), e('p',{className:'text-[10px] text-slate-600 italic'}, ex.description)), e('div',{className:'flex items-center gap-4'}, e('p',{className:'font-black text-rose-500 text-lg'}, '-'+ex.amount.toLocaleString()), e('button',{onClick:async()=>{if(confirm("Delete expense?")) await window.api.deleteDoc(window.api.doc(window.db, "expenses", ex.id))}, className:'text-slate-600 hover:text-rose-500'}, 'x')))))
                        )
                    ),

                    view === 'USERS' && e('div', null,
                        e('h2', {className:'text-3xl font-black mb-10 tracking-tighter uppercase'}, 'Personnel Control'),
                        e('button', {onClick: () => setEditing({ type: 'USER', item: {} }), className:'bg-emerald-600 text-white px-8 py-4 rounded-3xl font-black shadow-lg mb-10 uppercase text-[10px] tracking-widest'}, '+ Authorize Staff'),
                        e('div', {className:'space-y-4'}, users.map(u => e('div', {key:u.id, className:'bg-black p-6 rounded-[2.5rem] border border-slate-800 flex justify-between items-center'}, e('div',null, e('p',{className:'font-black text-xl text-white tracking-tighter uppercase'}, u.username), e('p',{className:'text-[10px] text-slate-600 font-black uppercase tracking-widest mt-1'}, u.role)), e('button', {onClick:()=>setEditing({type: 'USER', item: u}), className:'px-6 py-3 bg-slate-900 text-blue-400 font-black text-[10px] uppercase rounded-xl hover:bg-blue-600 hover:text-white'}, 'Manage'))))
                    ),

                    // --- MODALS ---
                    editing && e('div', {className:'fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay'},
                        e('div', {className:'bg-slate-900 border border-slate-800 w-full max-w-2xl p-10 rounded-[4rem] shadow-2xl overflow-y-auto max-h-[90vh] no-scrollbar'},
                            e('h3', {className:'text-3xl font-black mb-8 text-emerald-500 uppercase tracking-tighter italic'}, 'Modify Record'),
                            e('form', {onSubmit: async (evt) => {
                                evt.preventDefault();
                                const d = new FormData(evt.target);
                                const payload = Object.fromEntries(d.entries());
                                if (editing.type === 'PRODUCT') {
                                    const pData = { ...payload, price: Number(payload.price), costPrice: Number(payload.costPrice), stock: Number(payload.stock) };
                                    if (editing.item.id) await window.api.updateDoc(window.api.doc(window.db, "inventory", editing.item.id), pData);
                                    else await window.api.addDoc(window.api.collection(window.db, "inventory"), pData);
                                } else if (editing.type === 'CLIENT') {
                                    if (editing.item.id) await window.api.updateDoc(window.api.doc(window.db, "patients", editing.item.id), payload);
                                    else await window.api.addDoc(window.api.collection(window.db, "patients"), { ...payload, creditBalance: 0 });
                                } else if (editing.type === 'USER') {
                                    if (editing.item.id) await window.api.updateDoc(window.api.doc(window.db, "users", editing.item.id), payload);
                                    else await window.api.addDoc(window.api.collection(window.db, "users"), { ...payload, status: 'ACTIVE' });
                                } else if (editing.type === 'EXPENSE') {
                                    await window.api.addDoc(window.api.collection(window.db, "expenses"), { ...payload, amount: Number(payload.amount), date: new Date().toISOString() });
                                }
                                setEditing(null); alert("Data Synchronized.");
                            }, className:'space-y-6'},
                                editing.type === 'PRODUCT' && e('div', {className:'space-y-4'},
