<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX | Sovereign Enterprise ERP</title>
    <!-- 1. STABLE LIBRARIES (NO BABEL/MODULE CONFLICTS) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- 2. FIREBASE COMPAT (BULLETPROOF SYNCHRONOUS LOADING) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; background-color: #020617; color: white; }
        .active-tab { background: #10b981 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal-overlay { background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(10px); z-index: 50; }
    </style>
</head>
<body>
    <div id="apex-root">
        <!-- FAIL-SAFE BOOT SCREEN -->
        <div style="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#020617;">
            <h1 style="font-size:4rem;font-weight:900;color:#10b981;font-style:italic;">APEX</h1>
            <p style="color:#64748b;letter-spacing:4px;font-weight:bold;margin-top:10px;" id="boot-text">ESTABLISHING CLOUD UPLINK...</p>
            <div id="crash-log" style="color:#f43f5e; margin-top:20px; font-family:monospace; font-weight:bold;"></div>
        </div>
    </div>

    <!-- 3. SYNCHRONOUS DATABASE SETUP -->
    <script>
        try {
            // !!! PASTE YOUR REAL FIREBASE CONFIG HERE !!!
            const firebaseConfig = {
                apiKey: "AIzaSyAAazqZ1XnzpQ6A_cCHyQEsgXxq5jVVLXE",
                authDomain: "apex-pharmacy-a69b5.firebaseapp.com",
                projectId: "apex-pharmacy-a69b5",
                storageBucket: "apex-pharmacy-a69b5.firebasestorage.app",
                messagingSenderId: "28559683699",
                appId: "1:28559683699:web:1cc3f16a98a32463657a06",
                measurementId: "G-SVDCM1Y693"
            };
            firebase.initializeApp(firebaseConfig);
            window.db = firebase.firestore();
            document.getElementById('boot-text').innerText = "DATABASE CONNECTED. LOADING UI...";
        } catch (error) {
            document.getElementById('crash-log').innerText = "FIREBASE CONFIG ERROR: " + error.message;
        }
    </script>

    <!-- 4. APEX REACT ENGINE -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('LOGIN');
            const [user, setUser] = useState(null);
            const [data, setData] = useState({ inventory: [], sales: [], users: [], patients: [], expenses: [] });
            const [cart, setCart] = useState([]);
            const [search, setSearch] = useState("");
            
            const [editing, setEditing] = useState(null); 
            const [checkoutModal, setCheckoutModal] = useState(false);
            const [historyModal, setHistoryModal] = useState(null); 

            // REAL-TIME CLOUD SYNC
            useEffect(() => {
                if (!window.db) return;
                try {
                    const u1 = window.db.collection("inventory").onSnapshot(s => setData(p => ({...p, inventory: s.docs.map(d=>({id:d.id, ...d.data()}))})));
                    const u2 = window.db.collection("sales").onSnapshot(s => setData(p => ({...p, sales: s.docs.map(d=>({id:d.id, ...d.data()}))})));
                    const u3 = window.db.collection("patients").onSnapshot(s => setData(p => ({...p, patients: s.docs.map(d=>({id:d.id, ...d.data()}))})));
                    const u4 = window.db.collection("users").onSnapshot(s => setData(p => ({...p, users: s.docs.map(d=>({id:d.id, ...d.data()}))})));
                    const u5 = window.db.collection("expenses").onSnapshot(s => setData(p => ({...p, expenses: s.docs.map(d=>({id:d.id, ...d.data()}))})));
                    return () => { u1(); u2(); u3(); u4(); u5(); };
                } catch (e) {
                    document.getElementById('crash-log').innerText = "SYNC ERROR: " + e.message;
                }
            }, []);

            // BOOTSTRAP ADMIN
            useEffect(() => {
                const init = async () => {
                    const snap = await window.db.collection("users").where("username", "==", "admin").get();
                    if (snap.empty) {
                        await window.db.collection("users").add({ username: "admin", pin: "1234", role: "MANAGER", status: "ACTIVE" });
                    }
                };
                if(window.db) init();
            }, []);

            const hasAccess = (level) => {
                const roles = { 'MANAGER': 4, 'PHARMACIST': 3, 'TECHNICIAN': 2, 'ASSISTANT': 1, 'DISPENSER': 0 };
                return roles[user?.role] >= roles[level];
            };

            const handleLogin = async () => {
                const u = document.getElementById('u_box').value.toLowerCase().trim();
                const p = document.getElementById('p_box').value.trim();
                const snap = await window.db.collection("users").where("username", "==", u).where("pin", "==", p).get();
                if (!snap.empty) { 
                    const uData = { id: snap.docs[0].id, ...snap.docs[0].data() };
                    if (uData.status !== 'ACTIVE') return alert("Account INACTIVE. See Manager.");
                    setUser(uData); setView('DASHBOARD'); 
                } else alert("Access Denied: Invalid Credentials");
            };

            const addToCart = (p) => {
                setCart(prev => {
                    const ex = prev.find(i => i.id === p.id);
                    if (ex) return prev.map(i => i.id === p.id ? {...i, qty: i.qty + 1} : i);
                    return [...prev, {...p, qty: 1, currentPrice: p.price}];
                });
            };

            const updateCartItem = (id, field, val) => {
                setCart(prev => prev.map(i => i.id === id ? {...i, [field]: Number(val) || 0} : i));
            };

            const finalizeSale = async (method, patientId = null) => {
                const total = cart.reduce((s,i)=>s+(i.currentPrice*i.qty), 0);
                const totalCost = cart.reduce((s,i)=>s+(i.costPrice*i.qty), 0);
                
                await window.db.collection("sales").add({ total, profit: total - totalCost, timestamp: new Date().toISOString(), soldBy: user.username, method, items: cart });

                if (method === 'DEBT' && patientId) {
                    const pt = data.patients.find(p => p.id === patientId);
                    await window.db.collection("patients").doc(patientId).update({ creditBalance: (pt.creditBalance || 0) + total });
                }

                for(const i of cart) await window.db.collection("inventory").doc(i.id).update({ stock: i.stock - i.qty });
                
                setCart([]); setCheckoutModal(false); alert("Sale Authorized");
            };

            const exportData = () => {
                if(data.sales.length === 0) return alert("No sales to export");
                const ws = XLSX.utils.json_to_sheet(data.sales.map(s => ({ Date: new Date(s.timestamp).toLocaleString(), Amount: s.total, Profit: s.profit, Method: s.method, SoldBy: s.soldBy })));
                const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Sales"); XLSX.writeFile(wb, `Apex_Report_${new Date().toLocaleDateString()}.xlsx`);
            };

            if (!user) {
                return (
                    <div className="h-screen flex items-center justify-center bg-black">
                        <div className="bg-slate-900 p-12 rounded-[4rem] shadow-2xl w-full max-w-sm text-center border border-slate-800">
                            <h1 className="text-5xl font-black text-emerald-500 mb-2 italic tracking-tighter">APEX</h1>
                            <p className="text-slate-500 text-[10px] font-bold uppercase mb-12 tracking-[0.3em]">Sovereign Cloud</p>
                            <input id="u_box" placeholder="Username" className="w-full p-4 mb-3 bg-slate-800 rounded-2xl outline-none border border-slate-700 text-center font-bold" />
                            <input id="p_box" type="password" placeholder="PIN" className="w-full p-4 mb-10 bg-slate-800 rounded-2xl outline-none border border-slate-700 text-center font-bold tracking-[1em]" />
                            <button onClick={handleLogin} className="w-full bg-emerald-600 text-white py-5 rounded-[2rem] font-black text-xl shadow-lg hover:bg-emerald-500 transition-all active:scale-95">AUTHORIZE</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden bg-slate-950">
                    <aside className="w-72 bg-black border-r border-slate-800 p-8 flex flex-col shrink-0">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="w-10 h-10 bg-emerald-600 rounded-2xl flex items-center justify-center text-white font-black text-xl">A</div>
                            <h2 className="text-2xl font-black tracking-tighter italic">APEX <span className="text-emerald-600">Pro</span></h2>
                        </div>
                        <nav className="flex-1 space-y-1 overflow-y-auto no-scrollbar">
                            <NavBtn id="DASHBOARD" label="Dashboard" icon={lucide.LayoutDashboard} active={view} onClick={setView} />
                            <NavBtn id="POS" label="Sales Terminal" icon={lucide.ShoppingCart} active={view} onClick={setView} />
                            {hasAccess('TECHNICIAN') && <NavBtn id="STOO" label="Inventory" icon={lucide.Package} active={view} onClick={setView} />}
                            <NavBtn id="PATIENTS" label="Patients" icon={lucide.Users} active={view} onClick={setView} />
                            <NavBtn id="GUIDE" label="Clinical Guide" icon={lucide.BookOpen} active={view} onClick={setView} />
                            {hasAccess('MANAGER') && <NavBtn id="FINANCE" label="Financials" icon={lucide.BarChart3} active={view} onClick={setView} />}
                            {hasAccess('MANAGER') && <NavBtn id="USERS" label="Personnel" icon={lucide.ShieldCheck} active={view} onClick={setView} />}
                        </nav>
                        <div className="pt-6 border-t border-slate-800 mt-4 text-center">
                             <div className="flex items-center justify-center gap-3 mb-4">
                                <div className="w-8 h-8 bg-slate-800 text-emerald-500 rounded-full flex items-center justify-center font-black">{user.username[0].toUpperCase()}</div>
                                <div className="text-left"><p className="text-[10px] font-black uppercase text-emerald-500">{user.role}</p><p className="text-xs font-bold text-slate-300">{user.username}</p></div>
                             </div>
                             <button onClick={()=>window.location.reload()} className="text-rose-500 font-bold text-[10px] uppercase tracking-widest mt-2 hover:bg-rose-950/30 px-4 py-2 rounded-lg transition-all">Logout</button>
                        </div>
                    </aside>

                    <main className="flex-1 p-8 md:p-10 overflow-auto no-scrollbar relative">
                        {view === 'DASHBOARD' && (
                            <div className="animate-in fade-in duration-700">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-4xl font-black tracking-tighter">Command Center</h2>
                                    {hasAccess('MANAGER') && <button onClick={exportData} className="bg-slate-800 text-emerald-400 border border-emerald-900 px-6 py-3 rounded-2xl font-bold flex items-center gap-2 hover:bg-slate-700 transition-all text-xs tracking-widest uppercase"><lucide.Download size={16}/> Export Data</button>}
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <StatCard label="Lifetime Revenue" value={data.sales.reduce((a,b)=>a+b.total,0).toLocaleString()} sub="TZS" color="text-emerald-400" border="border-emerald-500" />
                                    <StatCard label="Inventory Wealth" value={data.inventory.reduce((a,b)=>a+(b.costPrice*b.stock),0).toLocaleString()} sub="At Cost" color="text-blue-400" border="border-blue-500" />
                                    <StatCard label="Outstanding Debt" value={data.patients.reduce((a,b)=>a+(Number(b.creditBalance)||0),0).toLocaleString()} sub="Unpaid" color="text-rose-400" border="border-rose-500" />
                                </div>
                            </div>
                        )}

                        {view === 'POS' && (
                            <div className="flex gap-8 h-full animate-in slide-in-from-bottom duration-500">
                                <div className="flex-1 space-y-6 overflow-y-auto no-scrollbar">
                                    <div className="relative">
                                        <lucide.Search className="absolute left-6 top-1/2 -translate-y-1/2 text-slate-500" size={20} />
                                        <input placeholder="Search disease, symptom or drug..." className="w-full pl-14 pr-6 py-6 bg-slate-900 border border-slate-800 rounded-[2.5rem] text-xl font-bold outline-none focus:ring-2 ring-emerald-500 shadow-xl transition-all" onChange={(e)=>setSearch(e.target.value.toLowerCase())} />
                                    </div>
                                    <div className="grid grid-cols-2 lg:grid-cols-3 gap-4">
                                        {data.inventory.filter(p => p.brandName.toLowerCase().includes(search) || p.symptoms?.toLowerCase().includes(search)).map(p => (
                                            <div key={p.id} onClick={()=>addToCart(p)} className="bg-slate-900 border border-slate-800 p-6 rounded-[2.5rem] hover:border-emerald-500 cursor-pointer active:scale-95 transition-all shadow-xl flex flex-col justify-between">
                                                <div>
                                                    <div className="flex justify-between mb-4"><span className="text-[9px] font-black text-emerald-500 uppercase">{p.category}</span></div>
                                                    <h4 className="font-black text-xl mb-1 tracking-tight">{p.brandName}</h4>
                                                    <p className="text-[10px] text-slate-500 font-bold uppercase mb-6">{p.strength} • {p.genericName}</p>
                                                </div>
                                                <div className="flex justify-between items-end">
                                                    <p className="text-2xl font-black text-emerald-400">{Number(p.price).toLocaleString()} <span className="text-xs text-slate-500">TZS</span></p>
                                                    <p className={`text-[10px] font-black px-2 py-1 rounded-lg ${p.stock < 10 ? 'bg-rose-900 text-rose-300 animate-pulse':'bg-slate-800 text-slate-400'}`}>STK: {p.stock}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="w-96 bg-white text-slate-900 p-8 rounded-[3.5rem] shadow-2xl h-fit border-t-8 border-emerald-600 sticky top-0 flex flex-col shrink-0">
                                    <div className="flex justify-between items-center mb-8"><h3 className="font-black text-2xl tracking-tighter uppercase">Cart</h3><button onClick={()=>setCart([])} className="text-[10px] font-black text-rose-500 uppercase tracking-widest underline">Clear</button></div>
                                    <div className="space-y-4 mb-8 overflow-auto max-h-[40vh] no-scrollbar px-1">
                                        {cart.length === 0 && <p className="text-center text-slate-300 font-bold text-xs uppercase tracking-widest py-10">Cart is Empty</p>}
                                        {cart.map(i => (
                                            <div key={i.id} className="flex justify-between items-center border-b border-slate-100 pb-4">
                                                <div className="flex-1">
                                                    <p className="text-sm font-bold uppercase">{i.brandName}</p>
                                                    <div className="flex items-center gap-2 mt-1">
                                                        <span className="text-[10px] font-bold text-slate-400">Price:</span>
                                                        <input type="number" value={i.currentPrice} onChange={(e)=>updateCartItem(i.id, 'currentPrice', e.target.value)} className="w-20 bg-slate-50 rounded-lg text-xs font-black text-emerald-600 outline-none p-1 border border-slate-200" />
                                                    </div>
                                                </div>
                                                <div className="flex flex-col items-end gap-2">
                                                    <input type="number" value={i.qty} onChange={(e)=>updateCartItem(i.id, 'qty', e.target.value)} className="w-16 p-2 bg-slate-50 rounded-xl text-center font-black text-slate-800 outline-none border border-slate-200" />
                                                    <button onClick={()=>setCart(cart.filter(x=>x.id!==i.id))} className="text-[10px] text-rose-500 font-bold uppercase">Remove</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex justify-between font-black text-4xl mb-10 tracking-tighter text-emerald-600"><span>Total</span><span>{cart.reduce((s,i)=>s+(i.currentPrice*i.qty),0).toLocaleString()}</span></div>
                                    <button onClick={() => cart.length > 0 ? setCheckoutModal(true) : alert("Cart is empty")} className="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black text-xl shadow-xl active:scale-95 transition-all">PROCESS PAYMENT</button>
                                </div>
                            </div>
                        )}

                        {view === 'STOO' && (
                            <div className="bg-slate-900 p-10 rounded-[3.5rem] border border-slate-800 animate-in fade-in duration-500">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-3xl font-black text-emerald-500 uppercase tracking-widest">Inventory Vault</h2>
                                    <button onClick={() => setEditing({ type: 'PRODUCT', item: {} })} className="bg-emerald-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg hover:scale-105 transition-all text-[10px] tracking-widest uppercase">+ Add Product</button>
                                </div>
                                <table className="w-full text-left">
                                    <thead><tr className="text-slate-500 text-[10px] font-bold uppercase border-b border-slate-800 pb-4"><th className="pb-4">Product</th><th>Category</th><th>Stock</th><th>Margin</th><th className="text-right pb-4">Selling Price</th><th className="text-right pb-4">Manage</th></tr></thead>
                                    <tbody className="font-bold">{data.inventory.map(p => (
                                        <tr key={p.id} className="border-b border-slate-800/50 hover:bg-black/50 transition-all group">
                                            <td className="py-6"><p className="font-black text-white text-lg">{p.brandName}</p><p className="text-[10px] text-slate-500 uppercase">{p.genericName} • {p.strength}</p></td>
                                            <td><span className="text-[9px] bg-slate-800 text-slate-400 px-3 py-1 rounded-full uppercase font-black tracking-widest">{p.category}</span></td>
                                            <td className={p.stock < 10 ? 'text-rose-500 text-xl' : 'text-slate-300 text-xl'}>{p.stock}</td>
                                            <td className="text-emerald-500">{p.price && p.costPrice ? (((p.price-p.costPrice)/p.price)*100).toFixed(0) : 0}%</td>
                                            <td className="text-right text-emerald-400 text-2xl tracking-tighter">{Number(p.price).toLocaleString()}</td>
                                            <td className="text-right"><button onClick={()=>setEditing({type: 'PRODUCT', item: p})} className="bg-slate-800 text-blue-400 px-4 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-blue-600 hover:text-white transition-all">Edit</button></td>
                                        </tr>
                                    ))}</tbody>
                                </table>
                            </div>
                        )}

                        {view === 'PATIENTS' && (
                            <div className="bg-slate-900 p-10 rounded-[3.5rem] border border-slate-800 animate-in fade-in duration-500 h-full overflow-auto no-scrollbar">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-3xl font-black text-blue-500 uppercase tracking-tighter">Client Registry</h2>
                                    <button onClick={() => setEditing({ type: 'CLIENT', item: {} })} className="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg uppercase text-[10px] tracking-widest">+ New Profile</button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {data.patients.map(pt => (
                                        <div key={pt.id} className="p-8 bg-black rounded-[3rem] border border-slate-800 flex justify-between items-center group hover:border-blue-500 transition-all shadow-xl">
                                            <div>
                                                <h4 className="font-black text-xl text-white uppercase tracking-tighter">{pt.name}</h4>
                                                <p className="text-[10px] text-slate-500 font-bold uppercase mt-2 tracking-widest">{pt.sex || '-'} • {pt.age || '-'} YRS • {pt.weight || '-'} KG</p>
                                                <p className="text-[10px] text-slate-500 font-bold uppercase mt-1 tracking-widest">📞 {pt.phone} • {pt.address}</p>
                                                <button onClick={()=>setHistoryModal(pt)} className="text-[10px] text-blue-500 mt-4 underline uppercase font-bold tracking-widest">View Medical History</button>
                                            </div>
                                            <div className="flex flex-col items-end gap-3">
                                                <div className="text-right"><p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Unpaid Debt</p><p className="text-rose-500 font-black text-2xl">{Number(pt.creditBalance || 0).toLocaleString()} <span className="text-xs">TZS</span></p></div>
                                                <div className="flex gap-2">
                                                    {(pt.creditBalance > 0) && <button onClick={()=>setDebtModal(pt.id)} className="text-[10px] font-black text-emerald-500 bg-slate-900 px-3 py-1 rounded-lg uppercase hover:bg-emerald-900 transition-colors">Clear Debt</button>}
                                                    <button onClick={()=>setEditing({type: 'CLIENT', item: pt})} className="text-[10px] font-black text-blue-500 bg-slate-900 px-3 py-1 rounded-lg uppercase hover:bg-blue-900 transition-colors">Edit</button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'FINANCE' && (
                            <div className="animate-in fade-in duration-500 space-y-10">
                                <h2 className="text-4xl font-black tracking-tighter uppercase italic decoration-emerald-500 underline underline-offset-8">Financial Ledger</h2>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="bg-slate-900 p-10 rounded-[3.5rem] border border-slate-800 text-center shadow-2xl"><p className="text-[10px] font-black opacity-30 uppercase mb-4 tracking-widest">Gross Revenue</p><p className="text-4xl font-black text-emerald-400">{data.sales.reduce((a,b)=>a+b.total,0).toLocaleString()}</p></div>
                                    <div className="bg-white text-slate-900 p-10 rounded-[3.5rem] text-center shadow-xl"><p className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Consumption (Bills)</p><p className="text-4xl font-black text-rose-500">{data.expenses.reduce((a,b)=>a+b.amount,0).toLocaleString()}</p></div>
                                    <div className="bg-emerald-600 p-10 rounded-[3.5rem] shadow-2xl text-center"><p className="text-[10px] font-black opacity-70 uppercase mb-4 tracking-widest text-white">Net Profit</p><p className="text-4xl font-black text-white">{(data.sales.reduce((a,b)=>a+b.total,0) - data.expenses.reduce((a,b)=>a+b.amount,0)).toLocaleString()}</p></div>
                                </div>
                                <div className="bg-slate-900 p-10 rounded-[3rem] border border-slate-800">
                                     <div className="flex justify-between items-center mb-8"><h3 className="font-black text-xl uppercase tracking-tighter">Consumption Log</h3><button onClick={() => setEditing({ type: 'EXPENSE', item: {} })} className="text-xs font-bold text-emerald-500 bg-emerald-950/30 px-6 py-3 rounded-2xl tracking-widest uppercase hover:bg-emerald-900 transition-all">+ Record Bill</button></div>
                                     <div className="space-y-3">{data.expenses.map(ex => (
                                         <div key={ex.id} className="flex justify-between items-center p-4 bg-black rounded-2xl border border-slate-900">
                                             <div><p className="font-bold text-xs uppercase tracking-widest">{ex.category}</p><p className="text-[10px] text-slate-600 italic">{ex.description}</p></div>
                                             <div className="flex items-center gap-4"><p className="font-black text-rose-500 text-lg">-{ex.amount.toLocaleString()} TZS</p><button onClick={async()=>{if(confirm("Delete expense?")) await window.db.collection("expenses").doc(ex.id).delete();}} className="text-slate-600 hover:text-rose-500"><lucide.Trash2 size={16}/></button></div>
                                         </div>
                                     ))}</div>
                                </div>
                            </div>
                        )}

                        {view === 'GUIDE' && (
                            <div className="bg-slate-900 p-10 rounded-[3.5rem] border border-slate-800 h-full overflow-y-auto no-scrollbar animate-in fade-in duration-500">
                                <h2 className="text-3xl font-black mb-10 tracking-tighter uppercase italic decoration-emerald-500 underline underline-offset-8">Clinical Intelligence</h2>
                                <div className="space-y-6">
                                    {data.inventory.filter(p=>p.category === 'Medicine').map(p => (
                                        <div key={p.id} className="p-8 bg-black rounded-[2.5rem] border border-slate-800 group hover:border-emerald-500 transition-all">
                                            <div className="flex justify-between items-start mb-6">
                                                <h4 className="text-emerald-400 font-black text-2xl uppercase tracking-tighter">{p.brandName}</h4>
                                                <span className="text-[9px] font-black px-3 py-1 bg-slate-900 text-slate-400 rounded-lg tracking-widest">{p.genericName}</span>
                                            </div>
                                            <div>
                                                <p className="text-[10px] text-slate-500 font-bold uppercase mb-2">Indications & Symptoms</p>
                                                <p className="text-sm italic text-slate-300 font-bold">"{p.symptoms || "Standard treatment protocol."}"</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'USERS' && (
                             <div className="bg-slate-900 p-10 rounded-[3.5rem] border border-slate-800 animate-in slide-in-from-right duration-500 h-full overflow-y-auto no-scrollbar">
                                <h2 className="text-3xl font-black mb-10 tracking-tighter uppercase">Personnel Authorization</h2>
                                <button onClick={() => setEditing({ type: 'USER', item: {} })} className="bg-emerald-600 text-white px-8 py-4 rounded-3xl font-black shadow-lg mb-10 uppercase text-[10px] tracking-widest">+ Add Staff Member</button>
                                <div className="space-y-4">
                                    {data.users.map(u => (
                                        <div key={u.id} className="bg-black p-6 rounded-[2.5rem] border border-slate-800 flex justify-between items-center group hover:border-emerald-500 transition-all shadow-xl">
                                            <div><p className="font-black text-xl text-white tracking-tighter uppercase">{u.username}</p><p className="text-[10px] text-slate-600 font-black uppercase tracking-widest mt-1">{u.role}</p></div>
                                            <div className="flex gap-4">
                                                <button onClick={()=>setEditing({type: 'USER', item: u})} className="px-6 py-2 bg-slate-900 text-blue-400 font-black text-[10px] uppercase rounded-xl hover:bg-blue-600 hover:text-white transition-colors">Manage Access</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                             </div>
                        )}

                        {/* ==========================================
                            MODALS (EDITING, CREATING, CHECKOUT)
                        ========================================== */}
                        {editing && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay animate-in fade-in duration-200">
                                <div className="bg-slate-900 border border-slate-800 w-full max-w-2xl p-10 rounded-[4rem] shadow-2xl animate-in zoom-in duration-300 overflow-y-auto max-h-[90vh] no-scrollbar">
                                    <h3 className="text-3xl font-black mb-8 text-emerald-500 uppercase tracking-tighter italic">Modify Profile</h3>
                                    
                                    <form onSubmit={async (e) => {
                                        e.preventDefault();
                                        const d = new FormData(e.target);
                                        const payload = Object.fromEntries(d.entries());

                                        if (editing.type === 'PRODUCT') {
                                            const pData = { ...payload, price: Number(payload.price), costPrice: Number(payload.costPrice), stock: Number(payload.stock) };
                                            if (editing.item.id) await window.db.collection("inventory").doc(editing.item.id).update(pData);
                                            else await window.db.collection("inventory").add(pData);
                                        } 
                                        else if (editing.type === 'PATIENT') {
                                            if (editing.item.id) await window.db.collection("patients").doc(editing.item.id).update(payload);
                                            else await window.db.collection("patients").add({ ...payload, creditBalance: 0 });
                                        }
                                        else if (editing.type === 'USER') {
                                            if (editing.item.id) await window.db.collection("users").doc(editing.item.id).update(payload);
                                            else await window.db.collection("users").add({ ...payload, status: 'ACTIVE' });
                                        }
                                        else if (editing.type === 'EXPENSE') {
                                            const category = payload.customCategory ? payload.customCategory : payload.category;
                                            await window.db.collection("expenses").add({ category, description: payload.description, amount: Number(payload.amount), date: new Date().toISOString() });
                                        }

                                        setEditing(null); alert("Data Synchronized.");
                                    }} className="space-y-6">

                                        {editing.type === 'PRODUCT' && (
                                            <div className="space-y-4">
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase ml-2">Brand Name</label><input name="brandName" defaultValue={editing.item.brandName} required className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800 font-bold" /></div>
                                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase ml-2">Category</label><select name="category" defaultValue={editing.item.category || 'Medicine'} className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800"><option>Medicine</option><option>Medical Supplies</option><option>Cosmetics</option></select></div>
                                                </div>
                                                <div className="grid grid-cols-3 gap-4">
                                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase ml-2">Strength / Size</label><input name="strength" defaultValue={editing.item.strength} className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800" /></div>
                                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase ml-2">Generic</label><input name="genericName" defaultValue={editing.item.genericName} className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800" /></div>
                                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase ml-2">Stock Qty</label><input name="stock" type="number" defaultValue={editing.item.stock} required className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800 font-black text-emerald-500" /></div>
                                                </div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase ml-2">Sell Price</label><input name="price" type="number" defaultValue={editing.item.price} required className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800 font-black text-xl text-emerald-500" /></div>
                                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase ml-2">Cost Price</label><input name="costPrice" type="number" defaultValue={editing.item.costPrice} required className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800 opacity-60" /></div>
                                                </div>
                                                <div><label className="text-[10px] font-bold text-slate-500 uppercase ml-2">Symptoms (For POS Search)</label><textarea name="symptoms" defaultValue={editing.item.symptoms} className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800 h-24 text-sm" placeholder="e.g. fever, headache, pain..."></textarea></div>
                                            </div>
                                        )}

                                        {editing.type === 'PATIENT' && (
                                            <div className="space-y-4">
                                                <input name="name" defaultValue={editing.item.name} placeholder="Full Name" required className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800 font-bold text-emerald-400 uppercase" />
                                                <div className="grid grid-cols-3 gap-4">
                                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase ml-2">Age</label><input name="age" type="number" defaultValue={editing.item.age} className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800" /></div>
                                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase ml-2">Sex</label><select name="sex" defaultValue={editing.item.sex || 'Male'} className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800"><option>Male</option><option>Female</option></select></div>
                                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase ml-2">Weight (Kg)</label><input name="weight" type="number" defaultValue={editing.item.weight} className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800" /></div>
                                                </div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase ml-2">Phone</label><input name="phone" defaultValue={editing.item.phone} className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800" /></div>
                                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase ml-2">Insurance ID</label><input name="cardId" defaultValue={editing.item.cardId} className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800" /></div>
                                                </div>
                                                <div><label className="text-[10px] font-bold text-slate-500 uppercase ml-2">Physical Address</label><input name="address" defaultValue={editing.item.address} className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800" /></div>
                                            </div>
                                        )}

                                        {editing.type === 'USER' && (
                                            <div className="space-y-4">
                                                <input name="username" defaultValue={editing.item.username} placeholder="Username" required className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800 font-bold" />
                                                <input name="pin" defaultValue={editing.item.pin} placeholder="4-Digit PIN" required className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800 tracking-[1em] text-center font-black" />
                                                <select name="role" defaultValue={editing.item.role || 'DISPENSER'} className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800 font-bold">
                                                    <option>MANAGER</option><option>PHARMACIST</option><option>TECHNICIAN</option><option>ASSISTANT</option><option>DISPENSER</option>
                                                </select>
                                                {editing.item.id && (
                                                    <select name="status" defaultValue={editing.item.status} className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800 font-bold text-emerald-500">
                                                        <option>ACTIVE</option><option>INACTIVE</option>
                                                    </select>
                                                )}
                                            </div>
                                        )}

                                        {editing.type === 'EXPENSE' && (
                                            <div className="space-y-4">
                                                <select name="category" className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800 font-bold text-rose-500" onChange={(e)=>{document.getElementById('custom-cat').style.display = e.target.value === 'CUSTOM' ? 'block' : 'none';}}>
                                                    <option>LUKU (Electricity)</option><option>Meal Allowance</option><option>Sewage Service</option><option>Internet Bundle</option><option>Rent</option><option value="CUSTOM">Other (Specify)</option>
                                                </select>
                                                <input id="custom-cat" name="customCategory" placeholder="Type category name..." style={{display: 'none'}} className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800" />
                                                <input name="amount" type="number" placeholder="Amount (TZS)" required className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800 font-black text-2xl" />
                                                <input name="description" placeholder="Description / Receipt Ref" className="w-full p-4 bg-black rounded-2xl outline-none border border-slate-800" />
                                            </div>
                                        )}

                                        <div className="flex gap-4 pt-8">
                                            <button type="submit" className="flex-1 bg-emerald-600 text-white py-5 rounded-[2rem] font-black shadow-lg hover:bg-emerald-500 transition-all active:scale-95">COMMIT TO VAULT</button>
                                            {editing.item.id && (
                                                <button type="button" onClick={async()=>{
                                                    if(confirm("Permanently Purge Record?")) {
                                                        const col = editing.type === 'PRODUCT' ? 'inventory' : editing.type === 'CLIENT' ? 'patients' : 'users';
                                                        await window.db.collection(col).doc(editing.item.id).delete();
                                                        setEditing(null);
                                                    }
                                                }} className="bg-rose-950 border border-rose-900 text-rose-500 p-5 rounded-[2rem] hover:bg-rose-900 hover:text-white transition-all"><lucide.Trash size={24}/></button>
                                            )}
                                            <button type="button" onClick={()=>setEditing(null)} className="p-5 bg-black border border-slate-800 rounded-[2rem] font-bold text-xs uppercase tracking-widest text-slate-400 hover:text-white transition-all">Cancel</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* CHECKOUT MODAL */}
                        {checkoutModal && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay animate-in zoom-in duration-200">
                                <div className="bg-slate-900 border border-slate-800 w-full max-w-md p-10 rounded-[3.5rem] shadow-2xl text-center">
                                    <h3 className="text-3xl font-black mb-2 text-emerald-500 italic tracking-tighter">Finalize Bill</h3>
                                    <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-10">Select Payment Method</p>
                                    
                                    <div className="space-y-4 mb-10">
                                        <button onClick={()=>finalizeSale('CASH')} className="w-full py-5 bg-emerald-600 text-white rounded-3xl font-black shadow-xl hover:bg-emerald-500 transition-all active:scale-95 flex justify-center items-center gap-3"><lucide.Banknote /> CASH PAYMENT</button>
                                        <button onClick={()=>finalizeSale('MOBILE')} className="w-full py-5 bg-blue-600 text-white rounded-3xl font-black shadow-xl hover:bg-blue-500 transition-all active:scale-95 flex justify-center items-center gap-3"><lucide.Smartphone /> M-PESA / TIGO</button>
                                        <button onClick={()=>{
                                            const pid = prompt("Enter Patient Card ID or Name for Debt Tracking:");
                                            const pt = data.patients.find(p => p.cardId === pid || p.name.toLowerCase() === pid?.toLowerCase());
                                            if(pt) finalizeSale('DEBT', pt.id); else alert("Patient not found in Registry!");
                                        }} className="w-full py-5 bg-rose-600 text-white rounded-3xl font-black shadow-xl hover:bg-rose-500 transition-all active:scale-95 flex justify-center items-center gap-3"><lucide.BookOpen /> DEBT (DENI)</button>
                                        <button onClick={()=>finalizeSale('BONUS')} className="w-full py-5 bg-indigo-600 text-white rounded-3xl font-black shadow-xl hover:bg-indigo-500 transition-all active:scale-95 flex justify-center items-center gap-3"><lucide.Gift /> REWARD / BONUS</button>
                                    </div>
                                    <button onClick={()=>setCheckoutModal(false)} className="text-slate-500 font-bold text-xs uppercase tracking-widest hover:text-white transition-all">Cancel Transaction</button>
                                </div>
                            </div>
                        )}

                        {/* DEBT CLEARANCE MODAL */}
                        {debtModal && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay animate-in zoom-in duration-200">
                                <div className="bg-slate-900 border border-slate-800 w-full max-w-sm p-10 rounded-[3.5rem] shadow-2xl text-center">
                                    <h3 className="text-2xl font-black mb-6 text-emerald-500 uppercase tracking-tighter">Clear Debt</h3>
                                    <form onSubmit={clearDebt}>
                                        <input name="amount" type="number" placeholder="Amount Paid (TZS)" required className="w-full p-4 mb-6 bg-black rounded-2xl outline-none border border-slate-800 font-black text-xl text-center text-emerald-400" />
                                        <button type="submit" className="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-emerald-500 transition-all">Confirm Payment</button>
                                    </form>
                                    <button onClick={()=>setDebtModal(null)} className="mt-6 text-slate-500 font-bold text-xs uppercase tracking-widest hover:text-white transition-all">Cancel</button>
                                </div>
                            </div>
                        )}

                        {/* HISTORY MODAL */}
                        {historyModal && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay animate-in fade-in">
                                <div className="bg-slate-900 border border-slate-800 w-full max-w-3xl p-10 rounded-[4rem] shadow-2xl overflow-y-auto max-h-[90vh] no-scrollbar">
                                    <div className="flex justify-between items-start mb-8">
                                        <div>
                                            <h3 className="text-3xl font-black text-emerald-500 uppercase tracking-tighter italic">Medical History</h3>
                                            <p className="text-sm font-bold mt-2 uppercase text-slate-400">{historyModal.name} • {historyModal.age || '?'} YRS</p>
                                        </div>
                                        <button onClick={()=>setHistoryModal(null)} className="bg-black p-4 rounded-full text-slate-500 hover:text-white"><lucide.X/></button>
                                    </div>

                                    <div className="space-y-4 mb-8">
                                        {data.sales.filter(s => s.method === 'DEBT' || s.items?.some(i=>i.brandName.includes(historyModal.name))).map((s, idx) => (
                                            <div key={idx} className="bg-black p-6 rounded-3xl border border-slate-800">
                                                <div className="flex justify-between mb-4 border-b border-slate-800 pb-2">
                                                    <span className="text-xs font-bold text-slate-500">{new Date(s.timestamp).toLocaleString()}</span>
                                                    <span className={`text-[10px] font-black px-2 py-1 rounded ${s.method==='DEBT'?'bg-rose-900 text-rose-300':'bg-emerald-900 text-emerald-300'}`}>{s.method}</span>
                                                </div>
                                                {s.items?.map((i, k) => (
                                                    <div key={k} className="flex justify-between text-sm mb-1"><span className="font-bold">{i.brandName} x{i.qty}</span><span>{(i.price * i.qty).toLocaleString()}</span></div>
                                                ))}
                                                <p className="text-right font-black text-emerald-500 mt-4 border-t border-slate-800 pt-2">Total: {s.total.toLocaleString()} TZS</p>
                                            </div>
                                        ))}
                                    </div>
                                    
                                    {historyModal.creditBalance > 0 && (
                                        <div className="bg-rose-950/30 border border-rose-900 p-6 rounded-3xl text-center">
                                            <p className="text-[10px] font-bold text-rose-500 uppercase tracking-widest">Unpaid Balance</p>
                                            <p className="text-3xl font-black text-rose-400 mt-2">{Number(historyModal.creditBalance).toLocaleString()} TZS</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const NavBtn = ({ id, label, icon: Icon, active, onClick }) => (
            <button onClick={() => onClick(id)} className={`w-full flex items-center gap-4 p-4 rounded-3xl transition-all duration-300 group ${active === id ? 'active-tab translate-x-2' : 'text-slate-500 hover:bg-slate-900'}`}>
                <Icon size={22} className={active === id ? 'text-white' : 'group-hover:text-emerald-500'} />
                <span className="font-black text-[10px] uppercase tracking-widest">{label}</span>
            </button>
        );

        const StatCard = ({ label, value, sub, color, border }) => (
            <div className={`bg-slate-900 p-10 rounded-[3.5rem] border ${border} shadow-2xl hover:shadow-emerald-500/10 transition-all group relative overflow-hidden`}>
                <p className="text-slate-500 text-[10px] font-black uppercase tracking-[0.3em] mb-4 italic">{label}</p>
                <h3 className={`text-5xl font-black tracking-tighter ${color} relative z-10`}>{value} <span className="text-sm font-normal opacity-30 text-white uppercase">{sub}</span></h3>
            </div>
        );

        const bootCheck = setInterval(() => {
            if (window.db) {
                const root = ReactDOM.createRoot(document.getElementById('apex-root'));
                root.render(<App />);
                clearInterval(bootCheck);
            }
        }, 500);
    </script>
</body>
</html>
