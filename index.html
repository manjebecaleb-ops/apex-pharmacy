    <script>
        window.addEventListener('error', function(e) {
            const el = document.getElementById('error-text');
            if(el) { el.style.display = 'block'; el.innerText = 'SYSTEM ERROR: ' + (e.message || "Network/CDN failure. Check connection."); }
        });
        setTimeout(() => {
            const el = document.getElementById('error-text');
            if (el && el.style.display === 'none') {
                el.style.display = 'block';
                el.innerText = "Boot timeout. Ensure stable internet for first-time CDN downloads.";
            }
        }, 10000);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript;base64,' + btoa(`
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('activate', e => e.waitUntil(clients.claim()));
                self.addEventListener('fetch', e => {
                    e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => {
                        const clone = res.clone();
                        caches.open('apex-v1').then(cache => cache.put(e.request, clone));
                        return res;
                    }).catch(() => new Response('Offline', {status: 503}))));
                });
            `)).catch(() => {});
        }
    </script>

            const getDosesPerDay = (freq) => {
                if (!freq) return 1;
                const f = freq.toLowerCase();
                if (f.includes('every 1') || f.includes('hourly')) {
                    if (f.includes('1-2')) return 12;
                    if (f.includes('3-4')) return 6;
                    if (f.includes('4') && !f.includes('24') && !f.includes('4-6')) return 6;
                    if (f.includes('4-6')) return 4;
                    if (f.includes('6')) return 4;
                    if (f.includes('8')) return 3;
                    if (f.includes('12')) return 2;
                    if (f.includes('24')) return 1;
                }
                if (f.includes('once daily') || f.includes('single') || f.includes('stat')) return 1;
                if (f.includes('twice daily') || f.includes('12 hourly')) return 2;
                if (f.includes('three times') || f.includes('8 hourly')) return 3;
                if (f.includes('four times') || f.includes('6 hourly')) return 4;
                if (f.includes('every 12')) return 2;
                if (f.includes('every 8')) return 3;
                if (f.includes('every 6')) return 4;
                if (f.includes('every 4')) return 6;
                if (f.includes('every 24')) return 1;
                if (f.includes('hourly')) return 4; // default
                return 1;

                const warnings = [];
                const names = items.map(i => ({
                    generic: (i.genericName || '').toLowerCase().trim(),
                    brand: (i.brandName || '').toLowerCase().trim(),
                    original: i
                }));
                const seen = new Set();

                for (let i = 0; i < names.length; i++) {
                    for (let j = i + 1; j < names.length; j++) {
                        const d1 = names[i];
                        const d2 = names[j];
                        const pairKey = [d1.original.id, d2.original.id].sort().join('|');
                        if (seen.has(pairKey)) continue;
                        seen.add(pairKey);

                        const checkPair = (a, b) => {
                            for (const [drugKey, interactions] of Object.entries(DRUG_INTERACTIONS)) {
                                const aIsKey = a.generic.includes(drugKey) || a.brand.includes(drugKey);
                                if (!aIsKey) continue;
                                for (const [interactKey, severity] of Object.entries(interactions)) {
                                    const bMatches = b.generic.includes(interactKey) || b.brand.includes(interactKey);
                                    if (bMatches) {
                                        warnings.push({
                                            drugs: [a.original.brandName, b.original.brandName],
                                            severity,
                                            description: `${severity} interaction between ${a.original.brandName} and ${b.original.brandName}`
                                        });
                                        return true;
                                    }
                                }
                            }
                            return false;
                        };

                        checkPair(d1, d2) || checkPair(d2, d1);

                                maxDailyText = 'Consult Tanzania HIV treatment guidelines';
                                warning = 'Children 20-30 kg require pediatric formulations or dose adjustment';
                            } else {
                                doseText = 'Pediatric formulations required - consult specialist';
                                maxDailyText = 'See Tanzania HIV treatment guidelines for children <20 kg';
                            }
                            tanzaniaSTG = drug.notes;
                        } else if (drug.id === 'benzylpenicillin') {
                            const units = w * 50000;
                            doseText = `${units.toLocaleString()} units every 6 hours IV/IM`;
                            maxDailyText = `${(w * 300000).toLocaleString()} units/day`;
                            tanzaniaSTG = drug.notes;
                        } else if (drug.id === 'vitamin-a') {
                            let iu = 200000;
                            if (a < 0.5) iu = 50000;
                            else if (a < 1) iu = 100000;
                            doseText = `${iu.toLocaleString()} IU ${drug.pediatric.freq}`;
                            maxDailyText = `${iu.toLocaleString()} IU/day`;
                            tanzaniaSTG = 'Tanzania STG: For measles, xerophthalmia. Day 1 + next day + 2-4 weeks later';
                        } else if (drug.id === 'zinc') {
                            let zincDose = w < 10 ? 10 : 20;
                            doseText = `${zincDose} mg once daily x 10-14 days`;
                            maxDailyText = `${zincDose} mg/day`;
                            if (a < 6) {
                                doseText = `10 mg once daily x 10-14 days (<6 months)`;
                                maxDailyText = '10 mg/day';
                            }
                            tanzaniaSTG = 'Tanzania STG: All children with diarrhea. Give for 10-14 days total.';
                        } else if (drug.id === 'ors') {
                            const planB = w * 75;
                            const planA = w * 50;
                            doseText = `Plan A (home): ${planA} mL after each stool | Plan B (clinic): ${planB} mL over 4 hours`;
                            maxDailyText = 'As needed for hydration';
                            tanzaniaSTG = 'Tanzania STG: Use low-osmolarity WHO ORS. Continue feeding. Plan C = IV for severe dehydration.';
                        } else if (drug.id === 'ferrous-sulfate') {
                            let feDose = a < 2 ? 25 : (a < 5 ? 60 : 0);
                            if (feDose === 0) {
                                doseText = 'Use adult dosing (200 mg FeSO4 + 0.4 mg FA once daily)';
                                maxDailyText = '200 mg Fe/day';
                            } else {
                                doseText = `${feDose} mg elemental iron + folic acid once daily`;
                                maxDailyText = `${feDose} mg Fe/day`;
                            }
                            tanzaniaSTG = 'Tanzania STG: Take with vitamin C. Side effects: constipation, dark stools. FATAL in overdose - keep away from children!';
                        } else if (drug.id === 'adrenaline') {
                            const ml = (w * 0.01).toFixed(2);
                            doseText = `${ml} mL of 1:1000 IM (anterolateral thigh), repeat every 5 min if needed`;
                            maxDailyText = 'As needed for anaphylaxis';
                            tanzaniaSTG = 'Tanzania STG: Anaphylaxis first-line. IM preferred over SC. Use autoinjector if available (EpiPen Jr for <30 kg).';
                        } else {
                            // Standard mg/kg calculation
                            const doseMg = (w * drug.pediatric.mgPerKg).toFixed(1);
                            const maxDailyMg = drug.pediatric.maxDailyMgPerKg ? (w * drug.pediatric.maxDailyMgPerKg).toFixed(1) : 'N/A';
                            const dosesPerDay = getDosesPerDay(drug.pediatric.freq);
                            const dailyCalc = (w * drug.pediatric.mgPerKg * dosesPerDay).toFixed(1);
                            
                            doseText = `${doseMg} mg (${drug.pediatric.mgPerKg} mg/kg) ${drug.pediatric.freq}`;
                            maxDailyText = drug.pediatric.maxDailyMgPerKg ? `${maxDailyMg} mg/day (max ${drug.pediatric.maxDailyMgPerKg} mg/kg/day)` : 'See clinical notes';
                            
                            if (drug.pediatric.maxDailyMgPerKg && Number(dailyCalc) > Number(maxDailyMg) * 1.1) {
                                warning = `WARNING: Estimated daily dose (${dailyCalc} mg) may exceed maximum (${maxDailyMg} mg). Reduce frequency or dose.`;
                            }
                            if (drug.pediatric.minWeight && w < drug.pediatric.minWeight) {
                                warning = (warning ? warning + ' ' : '') + `CAUTION: Weight below typical minimum (${drug.pediatric.minWeight} kg). Consult specialist.`;
                            }
                            if (drug.pediatric.maxWeight && w > drug.pediatric.maxWeight) {
                                warning = (warning ? warning + ' ' : '') + `NOTE: Weight exceeds typical pediatric range (${drug.pediatric.maxWeight} kg). Consider adult dosing.`;
                            }
                        }
                    }

                    const res = {
                        drugName: drug.name,
                        generic: drug.generic,
                        category: drug.category,
                        mode,
                        weight: mode === 'PEDIATRIC' ? w : null,
                        age: a,
                        dose: doseText,
                        maxDaily: maxDailyText,
                        warning,
                        tanzaniaSTG: tanzaniaSTG || drug.notes,
                        timestamp: new Date().toISOString()
                    };
                    setResult(res);
                    const newHistory = [res, ...history].slice(0, 30);
                    setHistory(newHistory);
                    localStorage.setItem('apex_dose_history_v2', JSON.stringify(newHistory));
                    toast('Dose calculated per Tanzania STG', 'success');
                };

                const copyToClipboard = () => {
                    if (!result) return;
                    const text = `APEX Dose Calc (Tanzania STG)\nDrug: ${result.drugName} (${result.generic})\nCategory: ${result.category}\nMode: ${result.mode}\n${result.weight ? `Weight: ${result.weight} kg\n` : ''}Age: ${result.age} yrs\nDose: ${result.dose}\nMax Daily: ${result.maxDaily}\n\nTanzania STG Notes: ${result.tanzaniaSTG}`;
                    navigator.clipboard.writeText(text).then(() => toast('Copied to clipboard', 'success')).catch(() => toast('Copy failed', 'error'));
                };

                return (
                    <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 modal-overlay" onClick={(e) => { if(e.target === e.currentTarget) onClose(); }}>
                        <div className="bg-slate-900 border border-slate-800 w-full max-w-2xl p-6 md:p-8 rounded-[3rem] shadow-2xl flex flex-col animate-slide-up max-h-[95vh] overflow-hidden">
                            <div className="flex items-center justify-center gap-3 mb-6">
                                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center text-white font-black text-lg">Rx</div>
                                <h3 className="text-xl font-black text-emerald-400 uppercase">Dose Calculator</h3>
                                <span className="text-[9px] bg-emerald-900/50 text-emerald-400 px-2 py-1 rounded-lg font-bold">Tanzania STG 2021</span>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto no-scrollbar space-y-4">
                                {/* Category Filter */}
                                <div>
                                    <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2 block">Filter by Category</label>
                                    <div className="flex gap-2 flex-wrap">
                                        <button onClick={() => { setSelectedCategory('ALL'); setSelectedDrugId(''); }} className={`px-3 py-1.5 rounded-xl font-bold text-[10px] uppercase tracking-wider transition-all ${selectedCategory === 'ALL' ? 'bg-emerald-600 text-white' : 'bg-slate-800 text-slate-400 hover:text-white'}`}>All</button>
                                        {DRUG_CATEGORIES.map(cat => (
                                            <button key={cat} onClick={() => { setSelectedCategory(cat); setSelectedDrugId(''); }} className={`px-3 py-1.5 rounded-xl font-bold text-[10px] uppercase tracking-wider transition-all ${selectedCategory === cat ? 'bg-emerald-600 text-white' : 'bg-slate-800 text-slate-400 hover:text-white'}`}>{cat}</button>
                                        ))}
                                    </div>
                                </div>

                                {/* Drug Selection */}
                                <select value={selectedDrugId} onChange={e => { setSelectedDrugId(e.target.value); setResult(null); }} className="w-full p-4 bg-black rounded-xl text-white font-bold text-sm outline-none border border-slate-800 focus:border-emerald-500 input-focus">
                                    <option value="">Select Drug *</option>
                                    {DRUG_CATEGORIES.map(cat => {
                                        const catDrugs = filteredDrugs.filter(d => d.category === cat);
                                        if (catDrugs.length === 0) return null;
                                        return (
                                            <optgroup key={cat} label={cat}>
                                                {catDrugs.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
                                            </optgroup>
                                        );
                                    })}
                                </select>

                                {/* Mode Selection */}
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => { setMode('ADULT'); setResult(null); }} className={`py-3 rounded-xl font-black text-xs uppercase tracking-widest transition-all ${mode === 'ADULT' ? 'bg-emerald-600 text-white shadow-lg' : 'bg-slate-800 text-slate-400 hover:text-white'}`}>Adult (≥12 yrs)</button>
                                    <button onClick={() => { setMode('PEDIATRIC'); setResult(null); }} className={`py-3 rounded-xl font-black text-xs uppercase tracking-widest transition-all ${mode === 'PEDIATRIC' ? 'bg-emerald-600 text-white shadow-lg' : 'bg-slate-800 text-slate-400 hover:text-white'}`}>Pediatric (&lt;12 yrs)</button>
                                </div>

                                {/* Weight and Age Inputs */}
                                <div className="grid grid-cols-2 gap-3">
                                    {mode === 'PEDIATRIC' && (
                                        <input type="number" value={weight} onChange={e => setWeight(e.target.value)} placeholder="Weight (kg) * 1-300" min="1" max="300" step="0.1" className="w-full p-4 bg-black rounded-xl text-white font-bold text-sm outline-none border border-slate-800 focus:border-emerald-500 input-focus" />
                                    )}
                                    <input type="number" value={age} onChange={e => setAge(e.target.value)} placeholder="Age (years) * 0-120" min="0" max="120" step="0.1" className={`w-full p-4 bg-black rounded-xl text-white font-bold text-sm outline-none border border-slate-800 focus:border-emerald-500 input-focus ${mode === 'ADULT' ? 'col-span-2' : ''}`} />
                                </div>

                                <button onClick={calculate} className="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg transition-all">Calculate Dose</button>

                                {/* Results */}
                                {result && (
                                    <div className="bg-black p-5 rounded-2xl border border-emerald-500/30 space-y-3">
                                        <div className="flex justify-between items-center border-b border-slate-800 pb-2">
                                            <div>
                                                <span className="text-emerald-400 font-black text-sm">{result.drugName}</span>
                                                <p className="text-[10px] text-slate-500">{result.generic}</p>
                                            </div>
                                            <span className="text-[10px] text-slate-500 uppercase font-bold bg-slate-800 px-2 py-1 rounded-lg">{result.mode}</span>
                                        </div>
                                        
                                        <div className="space-y-2 text-xs">
                                            <div className="dose-result-highlight p-3 rounded-xl">
                                                <p className="text-[10px] text-emerald-300 uppercase font-bold mb-1">Calculated Dose</p>
                                                <p className="text-white font-bold text-sm">{result.dose}</p>
                                            </div>
                                            <div className="flex justify-between text-slate-400 bg-slate-800/50 p-2 rounded-lg">
                                                <span>Max Daily Dose:</span>
                                                <span className="text-white font-bold">{result.maxDaily}</span>
                                            </div>
                                            {result.weight && (
                                                <div className="flex justify-between text-slate-400 bg-slate-800/50 p-2 rounded-lg">
                                                    <span>Weight:</span>
                                                    <span className="text-white font-bold">{result.weight} kg</span>
                                                </div>
                                            )}
                                            <div className="flex justify-between text-slate-400 bg-slate-800/50 p-2 rounded-lg">
                                                <span>Age:</span>
                                                <span className="text-white font-bold">{result.age} yrs</span>
                                            </div>
                                        </div>

                                        {result.warning && (
                                            <div className="bg-rose-950/30 border border-rose-800 p-3 rounded-xl text-rose-400 text-[11px] font-bold">{result.warning}</div>
                                        )}

                                        <div className="bg-slate-800/50 p-3 rounded-xl border border-slate-700">
                                            <p className="text-[10px] text-slate-500 uppercase font-bold mb-1">Tanzania STG Clinical Notes</p>
                                            <p className="text-slate-300 text-xs leading-relaxed">{result.tanzaniaSTG}</p>
                                        </div>

                                        <button onClick={copyToClipboard} className="w-full bg-slate-800 hover:bg-slate-700 text-white py-3 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all">Copy to Clipboard</button>
                                    </div>
                                )}

                                {/* History */}
                                {history.length > 0 && (
                                    <div className="border-t border-slate-800 pt-4">
                                        <h4 className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-3">Calculation History ({history.length}/30)</h4>
                                        <div className="space-y-2 max-h-48 overflow-y-auto no-scrollbar">
                                            {history.map((h, idx) => (
                                                <div key={idx} className="bg-black p-3 rounded-xl border border-slate-800 flex justify-between items-center hover:border-emerald-500/30 transition-all">
                                                    <div className="min-w-0 flex-1">
                                                        <p className="text-white font-bold text-xs truncate">{h.drugName} <span className="text-slate-500 font-normal">({h.mode})</span></p>
                                                        <p className="text-[10px] text-slate-500 truncate">{new Date(h.timestamp).toLocaleTimeString()} - {h.dose}</p>
                                                    </div>
                                                    <span className="text-[9px] text-slate-600 ml-2 shrink-0">{h.category}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                            
                            <button onClick={onClose} className="mt-4 w-full text-slate-500 hover:text-white font-bold text-xs uppercase pt-4 border-t border-slate-800 transition-all">Close <span className="kbd-shortcut">Esc</span></button>
                        </div>
                    </div>
                );
            };

            // ==================== MAIN APP ====================
            const App = () => {
                const { show: toast } = useToast();
                const chartRef = useRef(null);
                const chartInstance = useRef(null);
                const sigCanvasRef = useRef(null);
                const sigCtxRef = useRef(null);
                const isDrawing = useRef(false);
                const idleTimerRef = useRef(null);
                const sessionWarningRef = useRef(null);

                const [isInitializing, setIsInitializing] = useState(true);
                const [syncStatus, setSyncStatus] = useState('ONLINE');
                const [view, setView] = useState('LOGIN');
                const [viewHistory, setViewHistory] = useState([]);
                const [user, setUser] = useState(null);
                const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
                const [data, setData] = useState({ inventory: [], sales: [], patients: [], users: [], expenses: [], medicalHistory: [], suppliers: [], insuranceClaims: [], auditLogs: [], returns: [], purchaseOrders: [], stockMovements: [], shifts: [], prescriptions: [] });
                const [cart, setCart] = useState([]);
                const [heldCarts, setHeldCarts] = useState([]);
                const [search, setSearch] = useState("");
                const [sortOption, setSortOption] = useState("DEFAULT");
                const [isOnline, setIsOnline] = useState(navigator.onLine);
                const [barcodeInput, setBarcodeInput] = useState('');

                const [editing, setEditing] = useState(null);
                const [editClientType, setEditClientType] = useState('PATIENT');
                const [checkoutModal, setCheckoutModal] = useState(false);
                const [amountTendered, setAmountTendered] = useState(0);
                const [checkoutDiscount, setCheckoutDiscount] = useState(0);
                const [checkoutPatient, setCheckoutPatient] = useState('');
                const [medicalHistoryModal, setMedicalHistoryModal] = useState(null);
                const [receiptData, setReceiptData] = useState(null);
                const [drugInteractions, setDrugInteractions] = useState([]);

                const [scannerActive, setScannerActive] = useState(false);
                const scannerTargetRef = useRef('');
                const inventoryRef = useRef(data.inventory);

                const [viewHeldCarts, setViewHeldCarts] = useState(false);
                const [viewSalesVolume, setViewSalesVolume] = useState(false);
                const [viewExpensesDetail, setViewExpensesDetail] = useState(false);
                const [viewNetProfitDetail, setViewNetProfitDetail] = useState(false);
                const [chartPeriod, setChartPeriod] = useState('7DAYS');
                const [showSignaturePad, setShowSignaturePad] = useState(false);
                const [showInsuranceModal, setShowInsuranceModal] = useState(false);
                const [showSupplierModal, setShowSupplierModal] = useState(false);
                const [showAuditLog, setShowAuditLog] = useState(false);
                const [showReorderModal, setShowReorderModal] = useState(false);
                const [showTransferModal, setShowTransferModal] = useState(false);
                const [showReturnModal, setShowReturnModal] = useState(false);
                const [showNotificationCenter, setShowNotificationCenter] = useState(false);
                const [showShortcutHelp, setShowShortcutHelp] = useState(false);
                const [showSessionWarning, setShowSessionWarning] = useState(false);
                const [sessionCountdown, setSessionCountdown] = useState(60);
                const [showStockTakeModal, setShowStockTakeModal] = useState(false);
                const [showPurchaseOrderModal, setShowPurchaseOrderModal] = useState(false);
                const [showBackupModal, setShowBackupModal] = useState(false);
                const [showShiftModal, setShowShiftModal] = useState(false);
                const [showPrescriptionModal, setShowPrescriptionModal] = useState(false);
                const [showSettingsModal, setShowSettingsModal] = useState(false);
                const [showCustomerHistory, setShowCustomerHistory] = useState(null);
                const [showDoseCalc, setShowDoseCalc] = useState(false);
                const [splitPayment, setSplitPayment] = useState({ cash: 0, mobile: 0, card: 0 });
                const [showSplitPayment, setShowSplitPayment] = useState(false);

                const [reportPeriod, setReportPeriod] = useState('DAILY');
                const [reportTab, setReportTab] = useState('SALES');
                const [reportSearch, setReportSearch] = useState('');
                const [currency, setCurrency] = useLocalStorage('apex_currency', 'TZS');
                const [location, setLocation] = useLocalStorage('apex_location', 'MAIN');
                const [taxRate, setTaxRate] = useLocalStorage('apex_tax_rate', 0);
                const [favorites, setFavorites] = useLocalStorage('apex_favorites', []);
                const [salesTarget, setSalesTarget] = useLocalStorage('apex_sales_target', 100000);

                const [currentShift, setCurrentShift] = useState(null);

                useEffect(() => { inventoryRef.current = data.inventory; }, [data.inventory]);

                // Idle timeout - auto-lock after 15 minutes with warning at 1 minute
                useEffect(() => {
                    const resetTimer = () => {
                        if (idleTimerRef.current) clearTimeout(idleTimerRef.current);
                        if (sessionWarningRef.current) clearInterval(sessionWarningRef.current);
                        setShowSessionWarning(false);
                        idleTimerRef.current = setTimeout(() => {
                            if (user && view === 'POS') {
                                setShowSessionWarning(true);
                                setSessionCountdown(60);
                                sessionWarningRef.current = setInterval(() => {
                                    setSessionCountdown(prev => {
                                        if (prev <= 1) {
                                            clearInterval(sessionWarningRef.current);
                                            handleLogout();
                                            return 0;
                                        }
                                        return prev - 1;
                                    });
                                }, 1000);
                            }
                        }, 14 * 60 * 1000);
                    };
                    window.addEventListener('mousemove', resetTimer);
                    window.addEventListener('keydown', resetTimer);
                    window.addEventListener('click', resetTimer);
                    resetTimer();
                    return () => {
                        window.removeEventListener('mousemove', resetTimer);
                        window.removeEventListener('keydown', resetTimer);
                        window.removeEventListener('click', resetTimer);
                        if (idleTimerRef.current) clearTimeout(idleTimerRef.current);
                        if (sessionWarningRef.current) clearInterval(sessionWarningRef.current);
                    };
                }, [user, view]);

                // Keyboard shortcuts
                useEffect(() => {
                    const handleKeyDown = (e) => {
                        if (!user) return;
                        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
                            if (e.key === 'Escape') { e.target.blur(); }
                            return;
                        }
                        switch(e.key) {
                            case 'F1':
                                e.preventDefault();
                                if (view === 'POS') document.querySelector('input[placeholder*="barcode"], input[placeholder*="Scan"]')?.focus();
                                else handleSetView('POS');
                                break;
                            case 'F2':
                                e.preventDefault();
                                if (view === 'POS' && cart.length > 0) openCheckoutModal();
                                break;
                            case 'F3':
                                e.preventDefault();
                                if (view === 'POS') handleHoldCart();
                                break;
                            case 'F4':
                                e.preventDefault();
                                if (view === 'POS') setViewHeldCarts(true);
                                break;
                            case 'F5':
                                e.preventDefault();
                                if (view === 'POS') { scannerTargetRef.current = 'POS'; setScannerActive(true); }
                                break;
                            case 'Escape':
                                if (checkoutModal) setCheckoutModal(false);
                                else if (scannerActive) setScannerActive(false);
                                else if (editing) setEditing(null);
                                else if (viewHeldCarts) setViewHeldCarts(false);
                                else if (receiptData) setReceiptData(null);
                                else if (showNotificationCenter) setShowNotificationCenter(false);
                                else if (showShortcutHelp) setShowShortcutHelp(false);
                                else if (showSessionWarning) { setShowSessionWarning(false); if(sessionWarningRef.current) clearInterval(sessionWarningRef.current); }
                                else if (showDoseCalc) setShowDoseCalc(false);
                                else if (viewHistory.length > 0) handleGoBack();
                                break;
                            case 'F6': e.preventDefault(); handleSetView('STOO'); break;
                            case 'F7': e.preventDefault(); handleSetView('PATIENTS'); break;
                            case 'F8': e.preventDefault(); handleSetView('FINANCE'); break;
                            case 'F9': e.preventDefault(); setShowShortcutHelp(true); break;
                            case 'F10': e.preventDefault(); if (view === 'POS') setShowCustomerHistory('walkin'); break;
                        }
                    };
                    document.addEventListener('keydown', handleKeyDown);
                    return () => document.removeEventListener('keydown', handleKeyDown);
                }, [user, view, cart, checkoutModal, scannerActive, editing, viewHeldCarts, receiptData, showNotificationCenter, viewHistory, showShortcutHelp, showSessionWarning, showDoseCalc]);

                useEffect(() => {
                    if (typeof firebase === 'undefined') { setIsInitializing(false); return; }
                    if (!localStorage.getItem('apex_strict_login_enforced')) {
                        firebase.auth().signOut();
                        localStorage.setItem('apex_strict_login_enforced', 'true');
                    }
                    const unsubscribe = firebase.auth().onAuthStateChanged(async (authUser) => {
                        if (authUser) {
                            try {
                                const snap = await window.db.collection('users').where('email', '==', authUser.email).get();
                                if (!snap.empty) {
                                    const uData = { id: snap.docs[0].id, ...snap.docs[0].data() };
                                    if (uData.status === 'ACTIVE') {
                                        setUser(uData);
                                        setView('DASHBOARD');
                                        toast(`Welcome back, ${uData.fullName || uData.email}`, 'success');
                                    } else {
                                        toast("Account disabled. Contact Administrator.", 'error');
                                        await firebase.auth().signOut();
                                    }
                                }
                            } catch (err) { console.error("Auth failed:", err); }
                        } else { setUser(null); setView('LOGIN'); }
                        setIsInitializing(false);
                    });
                    return () => unsubscribe();
                }, []);

                useEffect(() => {
                    if (editing?.type === 'PATIENT') setEditClientType(editing.item.clientType || 'PATIENT');
                }, [editing]);

                useEffect(() => {
                    const handleResize = () => setIsMobile(window.innerWidth < 768);
                    const handleOnline = () => { setIsOnline(true); setSyncStatus('ONLINE'); toast('Connection restored', 'success'); };
                    const handleOffline = () => { setIsOnline(false); setSyncStatus('OFFLINE'); toast('Working offline', 'warning'); };
                    window.addEventListener('resize', handleResize);
                    window.addEventListener('online', handleOnline);
                    window.addEventListener('offline', handleOffline);
                    return () => { window.removeEventListener('resize', handleResize); window.removeEventListener('online', handleOnline); window.removeEventListener('offline', handleOffline); };
                }, []);

                useEffect(() => {
                    if (typeof window.db === 'undefined' || !user) return;
                    const collections = ["inventory", "sales", "patients", "users", "expenses", "medicalHistory", "suppliers", "insuranceClaims", "auditLogs", "returns", "purchaseOrders", "stockMovements", "shifts", "prescriptions"];
                    const unsubscribers = collections.map(col => 
                        window.db.collection(col).onSnapshot(
                            s => {
                                setData(p => ({...p, [col]: s.docs.map(d => ({id: d.id, ...d.data()}))}));
                                if (col === 'sales' || col === 'inventory') setSyncStatus('SYNCING');
                                setTimeout(() => setSyncStatus('ONLINE'), 1000);
                            },
                            err => console.error(`Load ${col}:`, err)
                        )
                    );
                    return () => unsubscribers.forEach(u => u());
                }, [user]);

                useEffect(() => {
                    if (!user) return;
                    const activeShift = data.shifts.find(s => s.status === 'OPEN' && s.userId === user.id && s.location === location);

                        const getPos = (e) => { const rect = canvas.getBoundingClientRect(); const cx = e.touches ? e.touches[0].clientX : e.clientX; const cy = e.touches ? e.touches[0].clientY : e.clientY; return { x: cx - rect.left, y: cy - rect.top }; };

                // Finance chart
                useEffect(() => {

                    if (chartPeriod === '7DAYS') {

                        revs = labels.map(d => (data.sales || []).filter(s => s.timestamp && s.timestamp.split('T')[0] === d).reduce((sum, s) => sum + (s.total || 0), 0));
                        grossProfs = labels.map(d => (data.sales || []).filter(s => s.timestamp && s.timestamp.split('T')[0] === d).reduce((sum, s) => sum + (s.profit || 0), 0));
                        exp = labels.map(d => (data.expenses || []).filter(e => (e.timestamp || e.date) && (e.timestamp || e.date).split('T')[0] === d).reduce((sum, e) => sum + Number(e.amount || 0), 0));

                    } else if (chartPeriod === '30DAYS') {
                        labels = [...Array(30)].map((_, i) => { const d = new Date(); d.setDate(d.getDate() - i); return toDateKey(d); }).reverse();

                        netProfs = labels.map((_, i) => grossProfs[i] - exp[i]);
                    } else {

                        netProfs = labels.map((_, i) => grossProfs[i] - exp[i]);

                                        <div className="glass-panel p-4 rounded-3xl">
                                            <div className="flex flex-wrap gap-2 mb-4">
                                                {['7DAYS', '30DAYS', '6MONTHS'].map(p => <button key={p} onClick={() => setChartPeriod(p)} className={`px-4 py-2 rounded-xl font-bold text-[10px] uppercase tracking-wider transition-all ${chartPeriod === p ? 'bg-emerald-600 text-white' : 'bg-slate-800 text-slate-400 hover:text-white'}`}>{p === '7DAYS' ? '7 Days' : p === '30DAYS' ? '30 Days' : '6 Months'}</button>)}
                                            </div>
                                            <div className="h-80 w-full"><canvas ref={chartRef}></canvas></div>
                                        </div>
                                        <div className="glass-panel p-6 rounded-3xl">
                                            <h3 className="text-sm font-black text-white uppercase tracking-wider mb-4">Record Expense</h3>
                                            <form onSubmit={(e) => { e.preventDefault(); const fd = new FormData(e.target); safeAdd('expenses', { description: fd.get('description'), amount: Number(fd.get('amount')), category: fd.get('category'), timestamp: new Date().toISOString(), recordedBy: user.fullName || user.email, location }); toast("Expense recorded", 'success'); e.target.reset(); logAudit('EXPENSE_ADDED', { amount: Number(fd.get('amount')) }); }} className="grid grid-cols-1 md:grid-cols-4 gap-3">
                                                <input name="description" placeholder="Description *" required className="p-3 bg-black rounded-xl text-white font-bold text-sm outline-none border border-slate-800 focus:border-rose-500 input-focus" />
                                                <input name="amount" type="number" placeholder="Amount *" required className="p-3 bg-black rounded-xl text-white font-bold text-sm outline-none border border-slate-800 focus:border-rose-500 input-focus" />
                                                <select name="category" className="p-3 bg-black rounded-xl text-white font-bold text-sm outline-none border border-slate-800 focus:border-rose-500 input-focus">
                                                    <option value="SALARIES">Salaries</option><option value="RENT">Rent</option><option value="UTILITIES">Utilities</option><option value="SUPPLIES">Supplies</option><option value="MARKETING">Marketing</option><option value="MAINTENANCE">Maintenance</option><option value="TAXES">Taxes</option><option value="OTHER">Other</option>
                                                </select>
                                                <button type="submit" className="bg-rose-600 hover:bg-rose-500 text-white py-3 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg transition-all">Add Expense</button>
                                            </form>
                                        </div>
                                        <div className="glass-panel p-6 rounded-3xl">
                                            <div className="flex justify-between items-center mb-4"><h3 className="text-sm font-black text-white uppercase tracking-wider">Recent Expenses</h3><button onClick={() => exportToExcel(data.expenses.map(e => ({Description: e.description, Amount: e.amount, Category: e.category, Date: e.timestamp, By: e.recordedBy})), 'Expenses')} className="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase transition-all">Excel</button></div>
                                            <div className="space-y-2 max-h-80 overflow-y-auto no-scrollbar">
                                                {data.expenses.slice().sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)).map(exp => <div key={exp.id} className="bg-black p-3 rounded-xl border border-slate-800 flex justify-between items-center"><div><p className="text-white font-bold text-xs">{exp.description}</p><p className="text-[10px] text-slate-500">{exp.category} - {new Date(exp.timestamp).toLocaleString()}</p></div><span className="text-rose-400 font-black text-sm">{Number(exp.amount).toLocaleString()} {currency}</span></div>)}
                                                {data.expenses.length === 0 && <p className="text-center py-6 text-slate-500 font-bold uppercase text-xs">No expenses recorded</p>}
                                            </div>
                                        </div>
                                        {hasAccess('MANAGER') && (
                                            <div className="glass-panel p-6 rounded-3xl border border-red-900/30">
                                                <h3 className="text-sm font-black text-red-400 uppercase tracking-wider mb-4">Danger Zone</h3>
                                                <button onClick={handleDeleteAllFinance} className="bg-red-950 hover:bg-red-900 text-red-400 border border-red-800 px-6 py-3 rounded-2xl font-black text-xs uppercase tracking-widest transition-all">Delete All Financial Data</button>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {/* ========== REPORTS VIEW ========== */}
                                {view === 'REPORTS' && (
                                    <div className="space-y-6 animate-fade-in">
                                        <div className="flex flex-col md:flex-row gap-3">
                                            <div className="flex gap-2">
                                                {['SALES', 'EXPENSES', 'CLAIMS', 'STOCK'].map(tab => <button key={tab} onClick={() => setReportTab(tab)} className={`px-4 py-2 rounded-xl font-bold text-[10px] uppercase tracking-wider transition-all ${reportTab === tab ? 'bg-emerald-600 text-white' : 'bg-slate-800 text-slate-400 hover:text-white'}`}>{tab}</button>)}
                                            </div>
                                            <div className="flex gap-2">
                                                {['DAILY', 'WEEKLY', 'MONTHLY'].map(p => <button key={p} onClick={() => setReportPeriod(p)} className={`px-4 py-2 rounded-xl font-bold text-[10px] uppercase tracking-wider transition-all ${reportPeriod === p ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400 hover:text-white'}`}>{p}</button>)}
                                            </div>
                                            <input value={reportSearch} onChange={(e) => setReportSearch(e.target.value)} placeholder="Search reports..." className="flex-1 p-3 bg-slate-800 rounded-xl text-white font-bold text-sm outline-none border border-slate-700 focus:border-emerald-500 input-focus" />
                                            <button onClick={() => { if (reportTab === 'SALES') exportToExcel(filteredSales.map(s => ({Date: s.timestamp, Total: s.total, Profit: s.profit, Method: s.method, Cashier: s.soldBy, Items: s.items?.length})), 'Sales_Report'); else if (reportTab === 'EXPENSES') exportToExcel(data.expenses.map(e => ({Description: e.description, Amount: e.amount, Category: e.category, Date: e.timestamp})), 'Expenses_Report'); else if (reportTab === 'CLAIMS') exportToExcel(data.insuranceClaims.map(c => ({Provider: c.provider, Patient: c.patientName, Amount: c.totalAmount, Claimed: c.claimedAmount, Status: c.status, Date: c.submittedAt})), 'Claims_Report'); else exportToExcel(data.inventory.map(i => ({Brand: i.brandName, Stock: i.stock, Price: i.price, Cost: i.costPrice, Value: i.stock * i.price})), 'Stock_Report'); }} className="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase transition-all whitespace-nowrap">Export Excel</button>
                                        </div>
                                        {reportTab === 'SALES' && (
                                            <div className="glass-panel p-6 rounded-3xl">
                                                <h3 className="text-sm font-black text-white uppercase tracking-wider mb-4">Sales Report ({reportPeriod})</h3>
                                                <div className="space-y-2 max-h-[60vh] overflow-y-auto no-scrollbar">
                                                    {filteredSales.map(sale => <div key={sale.id} className="bg-black p-4 rounded-2xl border border-slate-800"><div className="flex justify-between items-center mb-2"><span className="text-white font-bold text-xs">{new Date(sale.timestamp).toLocaleString()}</span><div className="flex gap-2"><span className="text-emerald-400 font-black text-sm">{sale.total.toLocaleString()} {currency}</span><button onClick={() => setShowReturnModal(true)} className="text-rose-400 text-[10px] font-bold hover:text-rose-300">Return</button></div></div><p className="text-[10px] text-slate-500">{sale.soldBy} | {sale.method} | {sale.items?.length} items | Profit: {sale.profit?.toLocaleString()} {currency}</p>{sale.drugInteractions && <p className="text-[10px] text-red-400 font-bold mt-1">Drug interactions noted</p>}</div>)}
                                                    {filteredSales.length === 0 && <p className="text-center py-6 text-slate-500 font-bold uppercase text-xs">No sales in selected period</p>}
                                                </div>
                                                <div className="mt-4 pt-4 border-t border-slate-800 flex justify-between text-sm font-bold"><span className="text-slate-400">Total: <span className="text-white">{filteredSales.reduce((a,b) => a + b.total, 0).toLocaleString()} {currency}</span></span><span className="text-slate-400">Profit: <span className="text-emerald-400">{filteredSales.reduce((a,b) => a + (b.profit || 0), 0).toLocaleString()} {currency}</span></span><span className="text-slate-400">Transactions: <span className="text-white">{filteredSales.length}</span></span></div>
                                            </div>
                                        )}
                                        {reportTab === 'EXPENSES' && (
                                            <div className="glass-panel p-6 rounded-3xl">
                                                <h3 className="text-sm font-black text-white uppercase tracking-wider mb-4">Expenses Report</h3>
                                                <div className="space-y-2 max-h-[60vh] overflow-y-auto no-scrollbar">
                                                    {data.expenses.slice().sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)).map(exp => <div key={exp.id} className="bg-black p-3 rounded-xl border border-slate-800 flex justify-between items-center"><div><p className="text-white font-bold text-xs">{exp.description}</p><p className="text-[10px] text-slate-500">{exp.category} - {new Date(exp.timestamp).toLocaleDateString()}</p></div><span className="text-rose-400 font-black text-sm">{Number(exp.amount).toLocaleString()} {currency}</span></div>)}
                                                    {data.expenses.length === 0 && <p className="text-center py-6 text-slate-500 font-bold uppercase text-xs">No expenses</p>}
                                                </div>
                                            </div>
                                        )}
                                        {reportTab === 'CLAIMS' && (
                                            <div className="glass-panel p-6 rounded-3xl">
                                                <h3 className="text-sm font-black text-white uppercase tracking-wider mb-4">Insurance Claims</h3>
                                                <div className="space-y-2 max-h-[60vh] overflow-y-auto no-scrollbar">
                                                    {data.insuranceClaims.slice().sort((a,b) => new Date(b.submittedAt) - new Date(a.submittedAt)).map(claim => <div key={claim.id} className="bg-black p-4 rounded-2xl border border-slate-800"><div className="flex justify-between items-center mb-2"><span className="text-white font-bold text-xs">{claim.provider} - {claim.patientName}</span><span className={`text-[10px] font-bold px-2 py-1 rounded-lg ${claim.status === 'PENDING' ? 'bg-amber-500/20 text-amber-400' : claim.status === 'APPROVED' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-rose-500/20 text-rose-400'}`}>{claim.status}</span></div><div className="flex justify-between text-xs text-slate-400"><span>Total: {claim.totalAmount?.toLocaleString()} {currency}</span><span>Claimed: {claim.claimedAmount?.toLocaleString()} {currency}</span></div><p className="text-[10px] text-slate-500 mt-1">{new Date(claim.submittedAt).toLocaleString()} - {claim.submittedBy}</p></div>)}
                                                    {data.insuranceClaims.length === 0 && <p className="text-center py-6 text-slate-500 font-bold uppercase text-xs">No claims submitted</p>}
                                                </div>
                                            </div>
                                        )}
                                        {reportTab === 'STOCK' && (
                                            <div className="glass-panel p-6 rounded-3xl">
                                                <h3 className="text-sm font-black text-white uppercase tracking-wider mb-4">Stock Valuation Report</h3>
                                                <div className="space-y-2 max-h-[60vh] overflow-y-auto no-scrollbar">
                                                    {data.inventory.slice().sort((a,b) => (b.stock * b.price) - (a.stock * a.price)).map(item => <div key={item.id} className="bg-black p-3 rounded-xl border border-slate-800 flex justify-between items-center"><div><p className="text-white font-bold text-xs">{item.brandName}</p><p className="text-[10px] text-slate-500">Stock: {item.stock} | Cost: {Number(item.costPrice).toLocaleString()} {currency}</p></div><div className="text-right"><p className="text-emerald-400 font-bold text-sm">{(item.stock * item.price).toLocaleString()} {currency}</p><p className="text-[10px] text-slate-500">Value</p></div></div>)}
                                                    {data.inventory.length === 0 && <p className="text-center py-6 text-slate-500 font-bold uppercase text-xs">No inventory</p>}
                                                </div>
                                                <div className="mt-4 pt-4 border-t border-slate-800 flex justify-between text-sm font-bold"><span className="text-slate-400">Total Stock Value: <span className="text-emerald-400">{inventoryTotalValue.toLocaleString()} {currency}</span></span><span className="text-slate-400">Total Cost: <span className="text-rose-400">{inventoryTotalCost.toLocaleString()} {currency}</span></span></div>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {/* ========== USERS VIEW ========== */}
                                {view === 'USERS' && (
                                    <div className="space-y-4 animate-fade-in">
                                        <div className="flex flex-col md:flex-row gap-3">
                                            <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Search personnel..." className="flex-1 p-4 bg-slate-800 rounded-2xl text-white font-bold text-sm outline-none border border-slate-700 focus:border-emerald-500 input-focus" />
                                            <button onClick={() => setEditing({type: 'USER', item: {}})} className="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg transition-all whitespace-nowrap">+ Add Personnel</button>
                                            <button onClick={() => exportToExcel(data.users.map(u => ({Name: u.fullName, Email: u.email, Role: u.role, Phone: u.phone, Status: u.status})), 'Personnel')} className="bg-slate-700 hover:bg-slate-600 text-white px-4 py-4 rounded-2xl font-black text-xs uppercase tracking-widest transition-all whitespace-nowrap">Excel</button>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                            {(data.users || []).filter(u => !search || (u.fullName || '').toLowerCase().includes(search.toLowerCase()) || (u.email || '').toLowerCase().includes(search.toLowerCase()) || (u.role || '').toLowerCase().includes(search.toLowerCase())).map(u => (
                                                <div key={u.id} className="bg-slate-800 p-5 rounded-3xl border border-slate-700 hover:border-emerald-500 transition-all">
                                                    <div className="flex justify-between items-start mb-3">
                                                        <div><p className="text-white font-bold text-sm">{u.fullName || u.email}</p><p className="text-[10px] text-slate-500">{u.email}</p></div>
                                                        <div className="flex gap-2"><span className={`text-[9px] font-bold uppercase px-2 py-1 rounded-lg ${u.status === 'ACTIVE' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-rose-500/20 text-rose-400'}`}>{u.status || 'ACTIVE'}</span></div>
                                                    </div>
                                                    <div className="space-y-1 text-xs text-slate-400 mb-3">
                                                        <div className="flex justify-between"><span>Role:</span><span className="text-white font-bold">{u.role}</span></div>
                                                        {u.phone && <div className="flex justify-between"><span>Phone:</span><span className="text-white">{u.phone}</span></div>}
                                                        <div className="flex justify-between"><span>Location:</span><span className="text-white">{u.location || 'All'}</span></div>
                                                    </div>
                                                    <button onClick={() => setEditing({type: 'USER', item: u})} className="w-full bg-slate-700 hover:bg-slate-600 text-white py-2 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all">Edit Personnel</button>
                                                </div>
                                            ))}
                                        </div>
                                        {(data.users || []).filter(u => !search || (u.fullName || '').toLowerCase().includes(search.toLowerCase())).length === 0 && <p className="text-center py-12 text-slate-500 font-bold uppercase text-xs">No personnel found</p>}
                                    </div>
                                )}

                            </div>
                        </div>

                        {/* Mobile Bottom Navigation */}
                        {isMobile && (
                            <div className="shrink-0 bg-slate-900 border-t border-slate-800 p-2 no-print">
                                <div className="flex justify-around">
                                    {navItems.filter(n => !n.a || hasAccess(n.a)).map(item => <button key={item.v} onClick={() => handleSetView(item.v)} className={`flex flex-col items-center gap-1 px-3 py-2 rounded-xl transition-all ${view === item.v ? 'text-emerald-400' : 'text-slate-500'}`}><span className="text-[10px] font-bold uppercase">{item.n.slice(0, 4)}</span></button>)}
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const root = ReactDOM.createRoot(document.getElementById('apex-root'));
            root.render(<App />);
        } catch (err) {
            console.error("APEX Boot Error:", err);
            const el = document.getElementById('error-text');
            if (el) { el.style.display = 'block'; el.innerText = "CRITICAL: " + (err.message || "Application failed to initialize."); }
        }
    </script>
</body>
</html>
