        window.addEventListener('error', function(e) {
            const el = document.getElementById('error-text');
            if(el) { el.style.display = 'block'; el.innerText = 'SYSTEM ERROR: ' + (e.message || "Network/CDN failure. Check connection."); }
        });
        setTimeout(() => {
            const el = document.getElementById('error-text');
            if (el && el.style.display === 'none') {
                el.style.display = 'block';
                el.innerText = "鈿狅笍 Boot timeout. Ensure stable internet for first-time CDN downloads.";
            }
        }, 10000);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript;base64,' + btoa(`
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('activate', e => e.waitUntil(clients.claim()));
                self.addEventListener('fetch', e => {
                    e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => {
                        const clone = res.clone();
                        caches.open('apex-v1').then(cache => cache.put(e.request, clone));
                        return res;
                    }).catch(() => new Response('Offline', {status: 503}))));
                });
            `)).catch(() => {});
        }

    <script type="text/babel">
        try {
            const { useState, useEffect, useMemo, useRef, useCallback } = React;

            const useToast = () => {
                const show = useCallback((message, type = 'info', duration = 4000) => {
                    const container = document.getElementById('toast-root');
                    const toast = document.createElement('div');
                    toast.className = `toast toast-${type}`;
                    toast.innerHTML = `<div style="display:flex;align-items:center;gap:8px;"><span style="font-size:16px;">${type==='success'?'鉁�':type==='error'?'鉁�':type==='warning'?'鈿�':'鈩�'}</span>${message}</div>`;
                    container.appendChild(toast);
                    setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateY(10px)'; setTimeout(() => toast.remove(), 300); }, duration);
                }, []);
                return { show };
            };

            const useLocalStorage = (key, initial) => {
                const [val, setVal] = useState(() => {
                    try { return JSON.parse(localStorage.getItem(key)) || initial; } catch { return initial; }
                });
                useEffect(() => localStorage.setItem(key, JSON.stringify(val)), [key, val]);
                return [val, setVal];
            };

            const DRUG_INTERACTIONS = {
                'warfarin': { 'aspirin': 'SEVERE', 'ibuprofen': 'SEVERE', 'metronidazole': 'SEVERE', 'amiodarone': 'SEVERE', 'fluconazole': 'MODERATE' },
                'metformin': { 'contrast': 'SEVERE', 'furosemide': 'MODERATE', 'nifedipine': 'MILD' },
                'lisinopril': { 'spironolactone': 'SEVERE', 'potassium': 'SEVERE', 'nsaids': 'MODERATE' },
                'simvastatin': { 'clarithromycin': 'SEVERE', 'itraconazole': 'SEVERE', 'amlodipine': 'MODERATE', 'grapefruit': 'MODERATE' },
                'digoxin': { 'amiodarone': 'SEVERE', 'quinidine': 'SEVERE', 'verapamil': 'SEVERE', 'furosemide': 'MODERATE' },
                'theophylline': { 'ciprofloxacin': 'SEVERE', 'erythromycin': 'SEVERE', 'fluvoxamine': 'SEVERE' },
                'phenytoin': { 'fluconazole': 'SEVERE', 'amiodarone': 'SEVERE', 'isoniazid': 'SEVERE', 'folate': 'MILD' },
                'methotrexate': { 'trimethoprim': 'SEVERE', 'probenecid': 'SEVERE', 'nsaids': 'MODERATE', 'penicillin': 'MILD' },
                'lithium': { 'ace-inhibitors': 'SEVERE', 'thiazides': 'SEVERE', 'nsaids': 'MODERATE', 'metronidazole': 'MODERATE' },
                'tramadol': { 'ssri': 'SEVERE', 'maoi': 'SEVERE', 'triptans': 'MODERATE', 'alcohol': 'MODERATE' }
            };

            const checkDrugInteractions = (items) => {
                const warnings = [];
                const names = items.map(i => ({
                    generic: (i.genericName || '').toLowerCase().trim(),
                    brand: (i.brandName || '').toLowerCase().trim(),
                    original: i
                }));
                const seen = new Set();

                for (let i = 0; i < names.length; i++) {
                    for (let j = i + 1; j < names.length; j++) {
                        const d1 = names[i];
                        const d2 = names[j];
                        const pairKey = [d1.original.id, d2.original.id].sort().join('|');
                        if (seen.has(pairKey)) continue;
                        seen.add(pairKey);

                        const checkPair = (a, b) => {
                            for (const [drugKey, interactions] of Object.entries(DRUG_INTERACTIONS)) {
                                const aIsKey = a.generic.includes(drugKey) || a.brand.includes(drugKey);
                                if (!aIsKey) continue;
                                for (const [interactKey, severity] of Object.entries(interactions)) {
                                    const bMatches = b.generic.includes(interactKey) || b.brand.includes(interactKey);
                                    if (bMatches) {
                                        warnings.push({
                                            drugs: [a.original.brandName, b.original.brandName],
                                            severity,
                                            description: `${severity} interaction between ${a.original.brandName} and ${b.original.brandName}`
                                        });
                                        return true;
                                    }
                                }
                            }
                            return false;
                        };

                        checkPair(d1, d2) || checkPair(d2, d1);
                    }
                }
                return warnings;
            };

            const safeDb = () => { try { return window.db; } catch(e) { return null; } };

            const safeUpdate = async (col, id, data) => { const db = safeDb(); if (!db || !id) return false; try { await db.collection(col).doc(id).update(data); return true; } catch(e) { console.error('DB update error:', e); return false; } };
            const safeDelete = async (col, id) => { const db = safeDb(); if (!db || !id) return false; try { await db.collection(col).doc(id).delete(); return true; } catch(e) { console.error('DB delete error:', e); return false; } };
            const parseDateLocal = (dateStr) => {
                if (!dateStr) return null;
                const [y, m, d] = dateStr.split('T')[0].split('-').map(Number);
                return new Date(y, m - 1, d);

            const isItemExpired = (dateStr) => {

                if (!exp) return false;
                const today = new Date();
                today.setHours(0,0,0,0);
                exp.setHours(0,0,0,0);
                return exp < today;

                const [search, setSearch] = useState("");
                const [sortOption, setSortOption] = useState("DEFAULT");
                const [isOnline, setIsOnline] = useState(navigator.onLine);
                const [barcodeInput, setBarcodeInput] = useState('');

                const [editing, setEditing] = useState(null);

                const [checkoutModal, setCheckoutModal] = useState(false);
                const [amountTendered, setAmountTendered] = useState(0);
                const [checkoutDiscount, setCheckoutDiscount] = useState(0);
                const [checkoutPatient, setCheckoutPatient] = useState('');
                const [medicalHistoryModal, setMedicalHistoryModal] = useState(null);
                const [receiptData, setReceiptData] = useState(null);
                useEffect(() => {
                    if (receiptData && typeof QRCode !== 'undefined') {
                        const qrEl = document.getElementById('receipt-qr');
                        if (qrEl) {
                            qrEl.innerHTML = '';
                            new QRCode(qrEl, {
                                text: JSON.stringify({ts: receiptData.timestamp, total: receiptData.total, loc: receiptData.location}),

                            });

                    }
                }, [receiptData]);
                const [drugInteractions, setDrugInteractions] = useState([]);

                const [scannerActive, setScannerActive] = useState(false);
                const scannerTargetRef = useRef('');
                const inventoryRef = useRef(data.inventory);

                const [viewHeldCarts, setViewHeldCarts] = useState(false);
                const [viewSalesVolume, setViewSalesVolume] = useState(false);
                const [viewExpensesDetail, setViewExpensesDetail] = useState(false);
                const [viewNetProfitDetail, setViewNetProfitDetail] = useState(false);

                const [showSignaturePad, setShowSignaturePad] = useState(false);

                const [showAuditLog, setShowAuditLog] = useState(false);

                const [showNotificationCenter, setShowNotificationCenter] = useState(false);
                const [showShortcutHelp, setShowShortcutHelp] = useState(false);
                const [showSessionWarning, setShowSessionWarning] = useState(false);
                const [sessionCountdown, setSessionCountdown] = useState(60);
                const [showStockTakeModal, setShowStockTakeModal] = useState(false);
                const [showPurchaseOrderModal, setShowPurchaseOrderModal] = useState(false);
                const [showBackupModal, setShowBackupModal] = useState(false);
                const [showShiftModal, setShowShiftModal] = useState(false);
                const [showPrescriptionModal, setShowPrescriptionModal] = useState(false);
                const [showSettingsModal, setShowSettingsModal] = useState(false);
                const [showCustomerHistory, setShowCustomerHistory] = useState(null);
                const [drawerOpen, setDrawerOpen] = useState(false);
                const drawerRef = useRef(null);
                const drawerStartY = useRef(0);
                const drawerCurrentY = useRef(0);
                const drawerTranslateY = useRef(0);
                const isDraggingDrawer = useRef(false);
                const [splitPayment, setSplitPayment] = useState({ cash: 0, mobile: 0, card: 0 });
                const [showSplitPayment, setShowSplitPayment] = useState(false);

                const [reportPeriod, setReportPeriod] = useState('DAILY');
                const [reportTab, setReportTab] = useState('SALES');
                const [reportSearch, setReportSearch] = useState('');
                const [currency, setCurrency] = useLocalStorage('apex_currency', 'TZS');
                const [location, setLocation] = useLocalStorage('apex_location', 'MAIN');
                const [taxRate, setTaxRate] = useLocalStorage('apex_tax_rate', 0);
                const [favorites, setFavorites] = useLocalStorage('apex_favorites', []);
                const [salesTarget, setSalesTarget] = useLocalStorage('apex_sales_target', 100000);

                // AI features removed per request

                const [currentShift, setCurrentShift] = useState(null);

                useEffect(() => { inventoryRef.current = data.inventory; }, [data.inventory]);

                // Idle timeout - auto-lock after 15 minutes with warning at 1 minute
                useEffect(() => {
                    const resetTimer = () => {
                        if (idleTimerRef.current) clearTimeout(idleTimerRef.current);
                        if (sessionWarningRef.current) clearInterval(sessionWarningRef.current);
                        setShowSessionWarning(false);
                        idleTimerRef.current = setTimeout(() => {
                            if (user && view === 'POS') {
                                setShowSessionWarning(true);
                                setSessionCountdown(60);
                                sessionWarningRef.current = setInterval(() => {
                                    setSessionCountdown(prev => {
                                        if (prev <= 1) {
                                            clearInterval(sessionWarningRef.current);
                                            handleLogout();
                                            return 0;
                                        }
                                        return prev - 1;
                                    });
                                }, 1000);
                            }
                        }, 14 * 60 * 1000);
                    };
                    window.addEventListener('mousemove', resetTimer);
                    window.addEventListener('keydown', resetTimer);
                    window.addEventListener('click', resetTimer);
                    resetTimer();
                    return () => {
                        window.removeEventListener('mousemove', resetTimer);
                        window.removeEventListener('keydown', resetTimer);
                        window.removeEventListener('click', resetTimer);
                        if (idleTimerRef.current) clearTimeout(idleTimerRef.current);
                        if (sessionWarningRef.current) clearInterval(sessionWarningRef.current);
                    };
                }, [user, view]);

                // Drawer swipe handlers
                useEffect(() => {
                    if (!isMobile) return;
                    const drawer = drawerRef.current;
                    if (!drawer) return;

                    const onTouchStart = (e) => {
                        isDraggingDrawer.current = true;
                        drawerStartY.current = e.touches[0].clientY;
                        drawerCurrentY.current = e.touches[0].clientY;
                        drawer.style.transition = 'none';
                    };

                    const onTouchMove = (e) => {
                        if (!isDraggingDrawer.current) return;
                        drawerCurrentY.current = e.touches[0].clientY;
                        const diff = drawerCurrentY.current - drawerStartY.current;
                        if (diff > 0) {
                            drawerTranslateY.current = diff;
                            drawer.style.transform = `translateY(${diff}px)`;
                        }
                    };

                    const onTouchEnd = () => {
                        if (!isDraggingDrawer.current) return;
                        isDraggingDrawer.current = false;
                        drawer.style.transition = 'transform 0.35s cubic-bezier(0.32, 0.72, 0, 1)';
                        const diff = drawerCurrentY.current - drawerStartY.current;
                        if (diff > 120) {
                            setDrawerOpen(false);
                            drawer.style.transform = '';
                        } else {
                            drawer.style.transform = 'translateY(0)';
                        }
                        drawerTranslateY.current = 0;
                    };

                    drawer.addEventListener('touchstart', onTouchStart, { passive: true });
                    drawer.addEventListener('touchmove', onTouchMove, { passive: true });
                    drawer.addEventListener('touchend', onTouchEnd);
                    return () => {
                        drawer.removeEventListener('touchstart', onTouchStart);
                        drawer.removeEventListener('touchmove', onTouchMove);
                        drawer.removeEventListener('touchend', onTouchEnd);
                    };
                }, [isMobile, drawerOpen]);

                // Keyboard shortcuts
                useEffect(() => {
                    const handleKeyDown = (e) => {
                        if (!user) return;
                        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
                            if (e.key === 'Escape') { e.target.blur(); }
                            return;
                        }

                        switch(e.key) {
                            case 'F1':
                                e.preventDefault();
                                if (view === 'POS') document.querySelector('input[placeholder*="barcode"], input[placeholder*="Scan"]').focus();
                                else handleSetView('POS');
                                break;
                            case 'F2':
                                e.preventDefault();
                                if (view === 'POS' && cart.length > 0) openCheckoutModal();
                                break;
                            case 'F3':
                                e.preventDefault();
                                if (view === 'POS') handleHoldCart();
                                break;
                            case 'F4':
                                e.preventDefault();
                                if (view === 'POS') setViewHeldCarts(true);
                                break;
                            case 'F5':
                                e.preventDefault();
                                if (view === 'POS') { scannerTargetRef.current = 'POS'; setScannerActive(true); }
                                break;
                            case 'Escape':
                                if (checkoutModal) setCheckoutModal(false);
                                else if (scannerActive) setScannerActive(false);
                                else if (editing) setEditing(null);
                                else if (viewHeldCarts) setViewHeldCarts(false);
                                else if (receiptData) setReceiptData(null);
                                else if (showNotificationCenter) setShowNotificationCenter(false);
                                else if (showShortcutHelp) setShowShortcutHelp(false);
                                else if (showSessionWarning) { setShowSessionWarning(false); if(sessionWarningRef.current) clearInterval(sessionWarningRef.current); }
                                else if (viewHistory.length > 0) handleGoBack();
                                break;
                            case 'F6':
                                e.preventDefault();
                                handleSetView('STOO');
                                break;
                            case 'F7':
                                e.preventDefault();
                                handleSetView('PATIENTS');
                                break;
                            case 'F8':
                                e.preventDefault();
                                handleSetView('FINANCE');
                                break;
                            case 'F9':
                                e.preventDefault();
                                setShowShortcutHelp(true);
                                break;
                            case 'F10':
                                e.preventDefault();
                                if (view === 'POS') setShowCustomerHistory('walkin');
                                break;
                        }
                    };
                    document.addEventListener('keydown', handleKeyDown);
                    return () => document.removeEventListener('keydown', handleKeyDown);
                }, [user, view, cart, checkoutModal, scannerActive, editing, viewHeldCarts, receiptData, showNotificationCenter, viewHistory, showShortcutHelp, showSessionWarning]);

                useEffect(() => {
                    if (typeof firebase === 'undefined') { setIsInitializing(false); return; }
                    if (!localStorage.getItem('apex_strict_login_enforced')) {
                        firebase.auth().signOut();
                        localStorage.setItem('apex_strict_login_enforced', 'true');
                    }
                    const unsubscribe = firebase.auth().onAuthStateChanged(async (authUser) => {
                        if (authUser) {
                            try {
                                const snap = await window.db.collection('users').where('email', '==', authUser.email).get();
                                if (!snap.empty) {
                                    const uData = { id: snap.docs[0].id, ...snap.docs[0].data() };
                                    if (uData.status === 'ACTIVE') {
                                        setUser(uData);
                                        setView('DASHBOARD');
                                        toast(`Welcome back, ${uData.fullName || uData.email}`, 'success');
                                    } else {
                                        toast("Account disabled. Contact Administrator.", 'error');
                                        await firebase.auth().signOut();
                                    }
                                }
                            } catch (err) { console.error("Auth failed:", err); }
                        } else { setUser(null); setView('LOGIN'); }
                        setIsInitializing(false);
                    });
                    return () => unsubscribe();
                }, []);

                useEffect(() => { if(editing?.type === 'PATIENT') setEditClientType(editing.item.clientType || 'PATIENT'); }, [editing]);

                useEffect(() => {
                    const handleResize = () => setIsMobile(window.innerWidth < 768);
                    const handleOnline = () => { setIsOnline(true); setSyncStatus('ONLINE'); toast('Connection restored', 'success'); };
                    const handleOffline = () => { setIsOnline(false); setSyncStatus('OFFLINE'); toast('Working offline - data will sync when connected', 'warning'); };
                    window.addEventListener('resize', handleResize);
                    window.addEventListener('online', handleOnline);
                    window.addEventListener('offline', handleOffline);
                    return () => { window.removeEventListener('resize', handleResize); window.removeEventListener('online', handleOnline); window.removeEventListener('offline', handleOffline); };
                }, []);

                useEffect(() => {
                    if (typeof window.db === 'undefined' || !user) return;
                    const collections = ["inventory", "sales", "patients", "users", "expenses", "medicalHistory", "suppliers", "insuranceClaims", "auditLogs", "returns", "purchaseOrders", "stockMovements", "shifts", "prescriptions"];
                    const unsubscribers = collections.map(col => 
                        window.db.collection(col).onSnapshot(
                            s => {
                                setData(p => ({...p, [col]: s.docs.map(d => ({id: d.id, ...d.data()}))}));
                                if (col === 'sales' || col === 'inventory') setSyncStatus('SYNCING');
                                setTimeout(() => setSyncStatus('ONLINE'), 1000);
                            },
                            err => console.error(`Load ${col}:`, err)
                        )
                    );
                    return () => unsubscribers.forEach(u => u());
                }, [user]);

                // Load current shift
                useEffect(() => {
                    if (!user) return;
                    const activeShift = data.shifts.find(s => s.status === 'OPEN' && s.userId === user.id && s.location === location);
                    if (activeShift) setCurrentShift(activeShift);
                }, [data.shifts, user, location]);

                const logAudit = useCallback((action, details) => {
                    if (!user) return;
                    const log = {
                        timestamp: new Date().toISOString(),
                        userId: user.id,
                        userName: user.fullName || user.email,
                        userRole: user.role,
                        action,
                        details: JSON.stringify(details),
                        location
                    };
                    safeAdd('auditLogs', log);
                }, [user, location]);

                const logStockMovement = useCallback((itemId, itemName, type, quantity, reason, reference) => {
                    if (!user) return;
                    safeAdd('stockMovements', {
                        timestamp: new Date().toISOString(),
                        itemId, itemName, type, quantity, reason, reference,
                        userId: user.id, userName: user.fullName || user.email,
                        location
                    }).catch(() => {});
                }, [user, location]);

                const scannerRef = useRef(null);
                useEffect(() => {
                    if (!scannerActive) {
                        if (scannerRef.current) {
                            try { scannerRef.current.stop().catch(() => {}); } catch(e) {}
                            scannerRef.current = null;
                        }
                        return;
                    }
                    let html5QrCode = null;
                    const timer = setTimeout(() => {
                        try {
                            html5QrCode = new Html5Qrcode("reader");
                            scannerRef.current = html5QrCode;
                            html5QrCode.start(
                                { facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 100 } },
                                (decodedText) => {
                                    html5QrCode.stop().then(() => {
                                        setScannerActive(false);
                                        scannerRef.current = null;
                                        if (scannerTargetRef.current === 'POS') {
                                            const item = inventoryRef.current.find(i => i.barcode === decodedText || (i.brandName && i.brandName.toLowerCase() === decodedText.toLowerCase()));
                                            if (item) { addToCart(item); toast(`Added: ${item.brandName}`, 'success'); }
                                            else { toast(`Barcode not found: ${decodedText}`, 'error'); }
                                        } else if (scannerTargetRef.current === 'INVENTORY') {
                                            const input = document.getElementById('edit-barcode-input');
                                            if(input) input.value = decodedText;
                                        }
                                    }).catch(() => { setScannerActive(false); scannerRef.current = null; });
                                }, () => {}
                            ).catch(() => { toast("Camera access denied. Use HTTPS.", 'error'); setScannerActive(false); scannerRef.current = null; });
                        } catch (err) { toast("Scanner failed to load.", 'error'); setScannerActive(false); scannerRef.current = null; }
                    }, 200);
                    return () => { clearTimeout(timer); if (html5QrCode) { try { html5QrCode.stop().catch(() => {}); } catch(e) {} } scannerRef.current = null; };
                }, [scannerActive]);

                const hasAccess = (level) => {
                    const roles = { 'MANAGER': 4, 'PHARMACIST': 3, 'TECHNICIAN': 2, 'ASSISTANT': 1, 'DISPENSER': 0 };
                    return roles[user?.role] >= roles[level];
                };

                const handleSetView = (newView) => {
                    if (view !== newView) { setViewHistory(prev => [...prev, view]); setView(newView); setSearch(""); setSortOption("DEFAULT"); setBarcodeInput(""); }
                };

                const handleGoBack = () => {
                    if (viewHistory.length > 0) { const prev = [...viewHistory]; setView(prev.pop()); setViewHistory(prev); setSearch(""); }
                };

                const handleModalClickOutside = (e, closeFunc) => { if (e.target === e.currentTarget) closeFunc(); };

                const handleLogin = async (e) => {
                    e.preventDefault();
                    if (typeof firebase === 'undefined') return toast("System core not loaded.", 'error');
                    const email = e.target.email.value.trim();
                    const password = e.target.password.value;
                    try {
                        setIsInitializing(true);
                        await firebase.auth().setPersistence(firebase.auth.Auth.Persistence.SESSION);
                        await firebase.auth().signInWithEmailAndPassword(email, password);
                    } catch (err) { setIsInitializing(false); toast("Authentication failed.", 'error'); }
                };

                const handleLogout = async () => {
                    if (confirm("Logout from system?")) {
                        logAudit('LOGOUT', {});
                        await firebase.auth().signOut();
                        setUser(null);
                        toast("Logged out successfully", 'info');
                    }
                };

                const requireAdminConfirm = (actionDesc) => {
                    return confirm(`ADMIN ACTION: ${actionDesc}\n\nThis requires Manager role and will be logged. Continue?`);
                };

                const handleDeletePersonnel = (userItem) => {
                    if (userItem.email?.toLowerCase() === 'manjebecaleb@gmail.com') return toast("Cannot delete master admin.", 'warning');
                    if(!confirm("鈿狅笍 Delete this personnel permanently?")) return;
                    setEditing(null); safeDelete('users', userItem.id); toast("Personnel deleted", 'success'); logAudit('DELETE_PERSONNEL', { userId: userItem.id });
                };

                const handleDeleteProduct = (id) => {
                    if(!confirm("鈿狅笍 Delete this item completely?")) return;
                    if(!requireAdminConfirm('DELETE_PRODUCT')) return;
                    setEditing(null); 
                    safeDelete('inventory', id); 
                    toast("Product deleted", 'success');
                    logAudit('DELETE_PRODUCT', { productId: id });
                };

                const handleDeleteAllFinance = () => {
                    if (!hasAccess('MANAGER')) return toast("Manager access required", 'error');
                    if(!requireAdminConfirm('DELETE ALL sales and expenses. This CANNOT be undone!')) return;
                    data.sales.forEach(s => safeDelete('sales', s.id));
                    data.expenses.forEach(e => safeDelete('expenses', e.id));
                    toast('Financial history wiped', 'success');
                    logAudit('WIPE_FINANCE', {});
                };

                const handleWhatsAppReminder = (pt) => {
                    if(!pt.phone) return toast("No phone number recorded.", 'warning');
                    const msg = `Hello ${pt.name},\n\nThis is a reminder from APEX Pharmacy. You have an outstanding balance of ${pt.creditBalance.toLocaleString()} ${currency}.\n\nPlease arrange payment at your earliest convenience. Thank you!`;
                    window.open(`https://wa.me/${pt.phone.replace(/[^0-9\+]/g, '')}?text=${encodeURIComponent(msg)}`, '_blank');
                    logAudit('WHATSAPP_REMINDER', { patientId: pt.id });
                };

                const handleClearDebt = (client) => {
                    const amount = prompt(`Enter amount paid by ${client.name} to clear debt.\nCurrent Debt: ${client.creditBalance.toLocaleString()} ${currency}`);
                    if(!amount || isNaN(amount) || Number(amount) <= 0) return;
                    const paid = Number(amount);
                    const newBalance = Math.max(0, (client.creditBalance || 0) - paid);
                    safeUpdate('patients', client.id, { creditBalance: newBalance, loyaltyPoints: (client.loyaltyPoints || 0) + Math.floor(paid / 1000) });
                    safeAdd('sales', {
                        total: paid, profit: paid, amountTendered: paid, changeGiven: 0, timestamp: new Date().toISOString(),
                        soldBy: user.fullName || user.email, method: 'DEBT_PAYMENT',
                        items: [{brandName: 'Debt Clearance Payment', qty: 1, currentPrice: paid, costPrice: 0}],
                        patientId: client.id, location
                    });
                    toast(`Cleared ${paid.toLocaleString()} ${currency} from ${client.name}'s debt. Earned ${Math.floor(paid / 1000)} loyalty points.`, 'success');
                    logAudit('DEBT_PAYMENT', { patientId: client.id, amount: paid });
                };

                const handleBarcodeSubmit = (e) => {
                    e.preventDefault();
                    if(!barcodeInput.trim()) return;
                    const item = data.inventory.find(i => i.barcode === barcodeInput.trim() || (i.brandName && i.brandName.toLowerCase() === barcodeInput.trim().toLowerCase()));
                    if(item) { addToCart(item); toast(`Added: ${item.brandName}`, 'success'); }
                    else toast("Item / Barcode not found!", 'error');
                    setBarcodeInput('');
                };

                const addToCart = (p) => {
                    if (p.stock <= 0) return toast("Item out of stock!", 'warning');
                    if (p.expiryDate && isItemExpired(p.expiryDate)) return toast("鈿狅笍 Cannot sell expired item!", 'error');
                    setCart(prev => {
                        const ex = prev.find(i => i.id === p.id);
                        if (ex) {
                            if (ex.qty + 1 > p.stock) { toast(`Only ${p.stock} units available!`, 'warning'); return prev; }
                            return prev.map(i => i.id === p.id ? {...i, qty: i.qty + 1} : i);
                        }
                        return [...prev, {...p, qty: 1, currentPrice: p.price}];
                    });
                };

                const updateCartItem = (id, field, val) => {
                    const numVal = Number(val);
                    const item = data.inventory.find(i => i.id === id);
                    if (field === 'qty' && item && numVal > item.stock) { toast(`Only ${item.stock} units available!`, 'warning'); return; }
                    if (field === 'qty' && numVal <= 0) removeFromCart(id);
                    else setCart(prev => prev.map(i => i.id === id ? {...i, [field]: numVal || 0} : i));
                };

                const removeFromCart = (id) => setCart(prev => prev.filter(i => i.id !== id));

                useEffect(() => {
                    if (cart.length >= 2) {
                        const interactions = checkDrugInteractions(cart);
                        setDrugInteractions(interactions);
                        if (interactions.some(i => i.severity === 'SEVERE')) {
                            toast(`鈿狅笍 SEVERE drug interaction detected!`, 'error');
                        }
                    } else {
                        setDrugInteractions([]);
                    }
                }, [cart]);

                const handleHoldCart = () => {
                    if (cart.length === 0) return toast("Cart is empty.", 'warning');
                    const refName = prompt("Enter reference name for this sale:");
                    if (!refName) return;
                    setHeldCarts(prev => [...prev, { id: Date.now(), name: refName, items: [...cart], timestamp: new Date().toISOString() }]);
                    setCart([]);
                    toast("Sale held successfully", 'success');
                };

                const handleRecallCart = (heldCart) => {
                    if (cart.length > 0 && !confirm("Current cart will be overwritten. Continue?")) return;
                    setCart(heldCart.items);
                    setHeldCarts(prev => prev.filter(c => c.id !== heldCart.id));
                    toast("Sale recalled", 'success');
                };

                const openCheckoutModal = () => {
                    if(cart.length === 0) return toast("Cart is empty", 'warning');
                    if (drugInteractions.some(i => i.severity === 'SEVERE')) {
                        if (!confirm("鈿狅笍 SEVERE drug interactions detected! Proceed anyway?")) return;
                    }
                    setAmountTendered(0); setCheckoutDiscount(0); setCheckoutPatient(''); setSplitPayment({ cash: 0, mobile: 0, card: 0 }); setShowSplitPayment(false); setCheckoutModal(true);
                };

                const getCartTotal = () => cart.reduce((s,i) => s + (i.currentPrice * i.qty), 0);
                const getCartTax = () => getCartTotal() * (taxRate / 100);
                const getCartTotalWithTax = () => getCartTotal() + getCartTax();
                const getFinalTotal = () => Math.max(0, getCartTotalWithTax() - checkoutDiscount);

                const finalizeSale = async (method) => {
                    if (method === 'DEBT' && !checkoutPatient) return toast("Select a client for credit!", 'warning');
                    const subTotal = getCartTotal();
                    const taxAmount = getCartTax();
                    const totalCost = cart.reduce((s,i) => s + ((i.costPrice || 0) * i.qty), 0);
                    const totalDue = getFinalTotal();

                    let amountTenderedTotal = 0, changeGiven = 0;
                    if (method === 'SPLIT') {
                        amountTenderedTotal = splitPayment.cash + splitPayment.mobile + splitPayment.card;
                        if (amountTenderedTotal < totalDue) return toast(`Split payment insufficient. Need ${totalDue.toLocaleString()} ${currency}`, 'error');
                        changeGiven = amountTenderedTotal - totalDue;
                    } else if (method === 'CASH') {
                        if (amountTendered < totalDue) return toast(`Insufficient amount. Need ${totalDue.toLocaleString()} ${currency}`, 'error');
                        amountTenderedTotal = amountTendered;
                        changeGiven = amountTendered - totalDue;
                    } else {
                        amountTenderedTotal = totalDue;
                    }

                    const saleData = {
                        total: totalDue, subTotal, tax: taxAmount, taxRate, discount: checkoutDiscount, profit: totalDue - totalCost - taxAmount,
                        amountTendered: amountTenderedTotal, changeGiven,
                        timestamp: new Date().toISOString(), soldBy: user.fullName || user.email, method,
                        items: cart, patientId: checkoutPatient || null, location,
                        drugInteractions: drugInteractions.length > 0 ? drugInteractions : null,
                        currency, splitPayment: method === 'SPLIT' ? splitPayment : null
                    };

                    const currentCart = [...cart];
                    setCart([]); setCheckoutModal(false); setDrugInteractions([]);

                    await safeAdd('sales', saleData);
                    if (method === 'DEBT' && checkoutPatient) {
                        const pt = data.patients.find(p => p.id === checkoutPatient);
                        if(pt) safeUpdate('patients', checkoutPatient, { creditBalance: (Number(pt.creditBalance) || 0) + totalDue });
                    }
                    if (checkoutPatient && method !== 'DEBT') {
                        const pt = data.patients.find(p => p.id === checkoutPatient);
                        if (pt) {
                            const pointsEarned = Math.floor(totalDue / 1000);
                            safeUpdate('patients', checkoutPatient, { 
                                loyaltyPoints: (Number(pt.loyaltyPoints) || 0) + pointsEarned,
                                lastPurchase: new Date().toISOString()
                            });
                            if (pointsEarned > 0) toast(`Client earned ${pointsEarned} loyalty points!`, 'success');
                        }
                    }
                    for (const i of currentCart) {
                        const invItem = data.inventory.find(inv => inv.id === i.id);
                        if (invItem) {
                            const newStock = Math.max(0, (invItem.stock || 0) - i.qty);
                            await safeUpdate('inventory', i.id, { stock: newStock });
                            logStockMovement(i.id, i.brandName, 'SALE', -i.qty, 'POS Sale', saleData.timestamp);
                            if (i.reorderPoint && newStock <= i.reorderPoint) {
                                toast(`鈿狅笍 ${i.brandName} below reorder point (${i.reorderPoint})!`, 'warning');
                            }
                        }
                    }

                    if (currentShift) {
                        safeUpdate('shifts', currentShift.id, {
                            totalSales: (currentShift.totalSales || 0) + totalDue,
                            transactionCount: (currentShift.transactionCount || 0) + 1
                        });
                    }

                    setReceiptData(saleData);
                    logAudit('SALE_COMPLETED', { total: totalDue, method, items: currentCart.length });
                    toast(`Sale completed: ${totalDue.toLocaleString()} ${currency}`, 'success');
                };

                const handleReturn = (saleId, itemId, returnQty, reason) => {
                    const sale = data.sales.find(s => s.id === saleId);
                    if (!sale) return toast("Sale not found", 'error');
                    const item = sale.items?.find(i => i.id === itemId);
                    if (!item) return toast("Item not found in sale", 'error');
                    if (returnQty > item.qty) return toast(`Cannot return more than ${item.qty} units`, 'warning');

                    const returnAmount = item.currentPrice * returnQty;
                    safeAdd('returns', {
                        saleId, itemId, returnQty, reason,
                        itemName: item.brandName,
                        returnAmount,
                        timestamp: new Date().toISOString(),
                        processedBy: user.fullName || user.email,
                        location
                    });

                    const invItem = data.inventory.find(i => i.id === itemId);
                    if (invItem) {
                        safeUpdate('inventory', itemId, { stock: invItem.stock + returnQty });
                        logStockMovement(itemId, item.brandName, 'RETURN', returnQty, reason, saleId);
                    }

                    logAudit('RETURN_PROCESSED', { saleId, itemId, returnQty, amount: returnAmount });

                    ctx.strokeStyle = '#10b981';
                    ctx.lineWidth = 2;
                    ctx.lineCap = 'round';

                    const getPos = (e) => {
                        const rect = canvas.getBoundingClientRect();
                        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                        return { x: clientX - rect.left, y: clientY - rect.top };
                    };

                    const start = (e) => { isDrawing.current = true; const pos = getPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); };
                    const draw = (e) => { if (!isDrawing.current) return; const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); };
                    const end = () => { isDrawing.current = false; };

                    canvas.addEventListener('mousedown', start);
                    canvas.addEventListener('mousemove', draw);
                    canvas.addEventListener('mouseup', end);
                    canvas.addEventListener('touchstart', start);
                    canvas.addEventListener('touchmove', draw);
                    canvas.addEventListener('touchend', end);
                };

                        const ctx = canvas.getContext('2d');
                        sigCtxRef.current = ctx;
                        ctx.strokeStyle = '#10b981';
                        ctx.lineWidth = 2;
                        ctx.lineCap = 'round';
                        const getPos = (e) => {
                            const rect = canvas.getBoundingClientRect();
                            const cx = e.touches ? e.touches[0].clientX : e.clientX;
                            const cy = e.touches ? e.touches[0].clientY : e.clientY;
                            return { x: cx - rect.left, y: cy - rect.top };
                        };
                        const start = (e) => { isDrawing.current = true; const pos = getPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); };
                        const draw = (e) => { if (!isDrawing.current) return; const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); };

                        canvas.addEventListener('mousedown', start);

                                    </button>
                                    {navItems.filter(n => !n.a || hasAccess(n.a)).slice(0, 4).map(item => (
                                        <button key={item.v} onClick={() => { setDrawerOpen(false); handleSetView(item.v); }} className={`flex flex-col items-center justify-center gap-1 px-3 py-2 rounded-xl transition-all min-w-[3.5rem] ${view === item.v ? 'text-emerald-400' : 'text-slate-500'}`}>
                                            <span className="text-lg">{item.i}</span>
                                            <span className="text-[8px] font-bold uppercase tracking-wider">{item.n}</span>
                                        </button>
                                    ))}
                                    <button onClick={handleLogout} className="flex flex-col items-center justify-center gap-1 px-3 py-2 rounded-xl text-rose-500 min-w-[3.5rem]">
                                        <span className="text-lg">馃毆</span>
                                        <span className="text-[8px] font-bold uppercase tracking-wider">Exit</span>
                                    </button>
                                </div>
                            )}
                        </div> {/* End main content area */}
                        {/* Mobile Drawer Dashboard */}
                        {isMobile && (
                            <>
                                <div className={`drawer-overlay ${drawerOpen ? 'open' : ''}`} onClick={() => setDrawerOpen(false)}></div>
                                <div ref={drawerRef} className={`drawer-panel ${drawerOpen ? 'open' : ''}`}>
                                    <div className="drawer-handle"></div>
                                    <div className="drawer-content">
                                        <div className="text-center mb-6">
                                            <h1 className="text-3xl font-black text-emerald-500 italic tracking-tight">APEX</h1>
                                            <p className="text-[10px] text-slate-500 font-bold uppercase tracking-[0.2em] mt-1">Pharmacy OS v2.0</p>
                                        </div>

                                        {/* Quick Stats */}
                                        <div className="grid grid-cols-2 gap-3 mb-6">
                                            <div className="bg-slate-800/80 p-4 rounded-2xl border border-slate-700">
                                                <p className="text-[9px] font-bold text-slate-500 uppercase tracking-wider">Today</p>
                                                <p className="text-lg font-black text-emerald-400">{todayRevenue.toLocaleString()} <span className="text-[9px]">{currency}</span></p>
                                            </div>
                                            <div className="bg-slate-800/80 p-4 rounded-2xl border border-slate-700">
                                                <p className="text-[9px] font-bold text-slate-500 uppercase tracking-wider">Net Profit</p>
                                                <p className={`text-lg font-black ${totalNetProfit >= 0 ? 'text-blue-400' : 'text-rose-400'}`}>{totalNetProfit.toLocaleString()} <span className="text-[9px]">{currency}</span></p>
                                            </div>
                                        </div>

                                        {/* Sales Target */}
                                        <div className="bg-slate-800/80 p-4 rounded-2xl border border-slate-700 mb-6">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="text-[10px] font-bold text-slate-400 uppercase">Target</span>
                                                <span className="text-[10px] text-slate-500 font-bold">{salesTargetProgress.toFixed(0)}%</span>
                                            </div>
                                            <div className="w-full h-2.5 bg-slate-700 rounded-full overflow-hidden">
                                                <div className="h-full bg-gradient-to-r from-emerald-600 to-emerald-400 rounded-full transition-all" style={{width: `${salesTargetProgress}%`}}></div>
                                            </div>
                                        </div>

                                        {/* Navigation Items */}
                                        <div className="space-y-2 mb-6">
                                            {navItems.filter(n => !n.a || hasAccess(n.a)).map(item => (
                                                <button key={item.v} onClick={() => { setDrawerOpen(false); handleSetView(item.v); }} className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold text-sm uppercase tracking-wider transition-all ${view === item.v ? 'active-tab' : 'text-slate-400 bg-slate-800/50'}`}>
                                                    <span className="text-xl">{item.i}</span>
                                                    <span>{item.n}</span>
                                                </button>
                                            ))}
                                        </div>

                                        {/* Quick Actions */}
                                        <div className="space-y-2 mb-6">
                                            <p className="text-[10px] font-bold text-slate-600 uppercase tracking-wider px-2">Quick Actions</p>
                                            <button onClick={() => { setDrawerOpen(false); setShowShiftModal(true); }} className="w-full flex items-center gap-4 px-5 py-3 rounded-2xl font-bold text-xs uppercase tracking-wider text-amber-400 bg-amber-950/20 border border-amber-900/30 transition-all">
                                                <span className="text-lg">馃晲</span>
                                                <span>{currentShift ? 'Close Shift' : 'Open Shift'}</span>
                                            </button>
                                            <button onClick={() => { setDrawerOpen(false); setShowPrescriptionModal(true); }} className="w-full flex items-center gap-4 px-5 py-3 rounded-2xl font-bold text-xs uppercase tracking-wider text-teal-400 bg-teal-950/20 border border-teal-900/30 transition-all">
                                                <span className="text-lg">馃摑</span>
                                                <span>Prescriptions</span>
                                            </button>
                                            <button onClick={() => { setDrawerOpen(false); setShowBackupModal(true); }} className="w-full flex items-center gap-4 px-5 py-3 rounded-2xl font-bold text-xs uppercase tracking-wider text-emerald-400 bg-emerald-950/20 border border-emerald-900/30 transition-all">
                                                <span className="text-lg">馃捑</span>
                                                <span>Backup Data</span>
                                            </button>
                                            <button onClick={() => { setDrawerOpen(false); setShowAuditLog(true); }} className="w-full flex items-center gap-4 px-5 py-3 rounded-2xl font-bold text-xs uppercase tracking-wider text-amber-400 bg-amber-950/20 border border-amber-900/30 transition-all">
                                                <span className="text-lg">馃搵</span>
                                                <span>Audit Log</span>
                                            </button>
                                        </div>

                                        {/* Alerts Summary */}
                                        {(systemAlerts.reorderNeeded > 0 || systemAlerts.outOfStock > 0 || systemAlerts.expired > 0) && (
                                            <div className="space-y-2 mb-6">
                                                <p className="text-[10px] font-bold text-slate-600 uppercase tracking-wider px-2">Alerts</p>
                                                {systemAlerts.reorderNeeded > 0 && (
                                                    <div onClick={() => { setDrawerOpen(false); setShowReorderModal(true); }} className="flex items-center justify-between px-4 py-3 bg-orange-950/20 border border-orange-900/30 rounded-xl">
                                                        <span className="text-orange-400 text-xs font-bold">鈿狅笍 Reorder Needed</span>
                                                        <span className="text-orange-400 font-black text-sm">{systemAlerts.reorderNeeded}</span>
                                                    </div>
                                                )}
                                                {systemAlerts.outOfStock > 0 && (
                                                    <div className="flex items-center justify-between px-4 py-3 bg-rose-950/20 border border-rose-900/30 rounded-xl">
                                                        <span className="text-rose-400 text-xs font-bold">馃毇 Out of Stock</span>
                                                        <span className="text-rose-400 font-black text-sm">{systemAlerts.outOfStock}</span>
                                                    </div>
                                                )}
                                                {systemAlerts.expired > 0 && (
                                                    <div className="flex items-center justify-between px-4 py-3 bg-red-950/20 border border-red-900/30 rounded-xl">
                                                        <span className="text-red-400 text-xs font-bold">鈽狅笍 Expired</span>
                                                        <span className="text-red-400 font-black text-sm">{systemAlerts.expired}</span>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {/* User Info */}
                                        <div className="text-center pt-4 border-t border-slate-800">
                                            <p className="text-xs text-slate-400 font-bold">{user.fullName || user.email}</p>
                                            <p className="text-[10px] text-slate-600 uppercase tracking-wider">{user.role} 鈥� {location}</p>
                                        </div>
                                    </div>
                                </div>
                            </>
                        )}
                    </div> /* End app container */
                );
            };

            const root = ReactDOM.createRoot(document.getElementById('apex-root'));
            root.render(<App />);
        } catch (err) {
            console.error("Fatal boot error:", err);
            document.getElementById('error-text').style.display = 'block';
            document.getElementById('error-text').innerText = "FATAL: " + err.message;
        }
    </script>
</body>
</html>
