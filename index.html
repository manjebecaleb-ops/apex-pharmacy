    <style>

        .bg-offline { background: #dc2626; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        button, select { transition: transform 0.1s ease, background-color 0.2s ease; cursor: pointer; }
        button:active, select:active { transform: scale(0.97); }

        /* THERMAL PRINTER RECEIPT STYLES */

        .markdown-body strong { color: #3b82f6; }

    <script>

            const el = document.getElementById('error-text');
            if(el) {
                el.style.display = 'block';
                el.innerText = 'SYSTEM CRASH LOG: ' + (e.message || "Network Blocked CDN Download. Connect to Wi-Fi.");
            }
        });
        setTimeout(() => {
            const el = document.getElementById('error-text');
            if (el && el.style.display === 'none') {
                el.style.display = 'block';
                el.innerText = "⚠️ Connection timed out. Ensure you have internet so the system can download core application files for the first boot.";
            }
        }, 8000);
    </script>

        try {

    <script type="text/babel">
        try {
            const { useState, useEffect, useMemo, useRef } = React;

            const App = () => {
                const chartRef = useRef(null);
                const chartInstance = useRef(null);

                const [isInitializing, setIsInitializing] = useState(true);
                const [view, setView] = useState('LOGIN');
                const [viewHistory, setViewHistory] = useState([]);
                const [user, setUser] = useState(null);
                const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
                const [data, setData] = useState({ inventory: [], sales: [], patients: [], users: [], expenses: [], medicalHistory: [] });
                const [cart, setCart] = useState([]);
                const [heldCarts, setHeldCarts] = useState([]); 
                const [search, setSearch] = useState("");
                const [sortOption, setSortOption] = useState("DEFAULT");
                const [isOnline, setIsOnline] = useState(navigator.onLine);
                const [barcodeInput, setBarcodeInput] = useState('');
                
                const [editing, setEditing] = useState(null); 
                const [editClientType, setEditClientType] = useState('PATIENT');
                const [checkoutModal, setCheckoutModal] = useState(false);
                const [amountTendered, setAmountTendered] = useState(0);
                const [checkoutDiscount, setCheckoutDiscount] = useState(0); 
                const [checkoutPatient, setCheckoutPatient] = useState('');
                const [medicalHistoryModal, setMedicalHistoryModal] = useState(null);
                const [receiptData, setReceiptData] = useState(null);
                
                const [scannerActive, setScannerActive] = useState(false);
                const scannerTargetRef = useRef(''); 
                
                const [viewHeldCarts, setViewHeldCarts] = useState(false);
                const [viewSalesVolume, setViewSalesVolume] = useState(false);
                const [viewExpensesDetail, setViewExpensesDetail] = useState(false);
                const [viewNetProfitDetail, setViewNetProfitDetail] = useState(false);
                const [chartPeriod, setChartPeriod] = useState('7DAYS'); 

                const [reportPeriod, setReportPeriod] = useState('DAILY');
                const [reportTab, setReportTab] = useState('SALES');
                const [reportSearch, setReportSearch] = useState('');

                // AI ASSISTANT STATES
                const [aiKey, setAiKey] = useState(localStorage.getItem('apex_gemini_key') || '');
                const [showAiSettings, setShowAiSettings] = useState(false);
                const [aiQuery, setAiQuery] = useState('');
                const [aiResponse, setAiResponse] = useState('');
                const [isAiLoading, setIsAiLoading] = useState(false);

                // STRICT AUTHENTICATION LISTENER
                useEffect(() => {
                    if (typeof firebase === 'undefined') { setIsInitializing(false); return; }
                    if (!localStorage.getItem('apex_strict_login_enforced')) {
                        firebase.auth().signOut();
                        localStorage.setItem('apex_strict_login_enforced', 'true');
                    }
                    const unsubscribe = firebase.auth().onAuthStateChanged(async (authUser) => {
                        if (authUser) {
                            try {
                                const snap = await window.db.collection('users').where('email', '==', authUser.email).get();
                                if (!snap.empty) {
                                    const uData = { id: snap.docs[0].id, ...snap.docs[0].data() };
                                    if (uData.status === 'ACTIVE') {
                                        setUser(uData);
                                        if (uData.role === 'MANAGER') setView('DASHBOARD'); else setView('POS');
                                    } else {
                                        alert("Account disabled. Contact Administrator.");
                                        await firebase.auth().signOut();
                                    }
                                }
                            } catch (err) { console.error("Auth routing failed:", err); }
                        } else { setUser(null); setView('LOGIN'); }
                        setIsInitializing(false);
                    });
                    return () => unsubscribe();
                }, []);

                useEffect(() => { if(editing?.type === 'PATIENT') setEditClientType(editing.item.clientType || 'PATIENT'); }, [editing]);

                useEffect(() => {
                    const handleResize = () => setIsMobile(window.innerWidth < 768);
                    const handleOnline = () => setIsOnline(true);
                    const handleOffline = () => setIsOnline(false);
                    window.addEventListener('resize', handleResize); window.addEventListener('online', handleOnline); window.addEventListener('offline', handleOffline);
                    return () => { window.removeEventListener('resize', handleResize); window.removeEventListener('online', handleOnline); window.removeEventListener('offline', handleOffline); };
                }, []);

                useEffect(() => {
                    if (typeof window.db === 'undefined' || !user) return;
                    const collections = ["inventory", "sales", "patients", "users", "expenses", "medicalHistory"];
                    const unsubscribers = collections.map(col => 
                        window.db.collection(col).onSnapshot(s => setData(p => ({...p, [col]: s.docs.map(d=>({id:d.id, ...d.data()}))})), err => console.error(`Error loading ${col}:`, err))
                    );
                    return () => unsubscribers.forEach(u => u());
                }, [user]);

                // CAMERA SCANNER LOGIC
                useEffect(() => {
                    if (!scannerActive) return;
                    let html5QrCode;
                    const timer = setTimeout(() => {
                        try {
                            html5QrCode = new Html5Qrcode("reader");
                            html5QrCode.start(
                                { facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 100 } },
                                (decodedText) => {
                                    html5QrCode.stop().then(() => {
                                        setScannerActive(false);
                                        if (scannerTargetRef.current === 'POS') {
                                            const item = data.inventory.find(i => i.barcode === decodedText || i.brandName.toLowerCase() === decodedText.toLowerCase());
                                            if (item) addToCart(item); else alert(`Barcode Not Found: ${decodedText}`);
                                        } else if (scannerTargetRef.current === 'INVENTORY') {
                                            const input = document.getElementById('edit-barcode-input');
                                            if(input) input.value = decodedText;
                                        }
                                    }).catch(err => console.error(err));
                                },
                                (errorMessage) => { }
                            ).catch((err) => { alert("Camera Access Denied! Ensure you are using HTTPS."); setScannerActive(false); });
                        } catch (err) { alert("Scanner failed to load."); setScannerActive(false); }
                    }, 200);
                    return () => { clearTimeout(timer); if (html5QrCode && html5QrCode.isScanning) { html5QrCode.stop().catch(console.error); } };
                }, [scannerActive, data.inventory]);

                const hasAccess = (level) => {
                    const roles = { 'MANAGER': 4, 'PHARMACIST': 3, 'TECHNICIAN': 2, 'ASSISTANT': 1, 'DISPENSER': 0 };
                    return roles[user?.role] >= roles[level];
                };

                const handleSetView = (newView) => {
                    if (view !== newView) { setViewHistory(prev => [...prev, view]); setView(newView); setSearch(""); setSortOption("DEFAULT"); setBarcodeInput(""); }
                };

                const handleGoBack = () => {
                    if (viewHistory.length > 0) { const prev = [...viewHistory]; setView(prev.pop()); setViewHistory(prev); setSearch(""); }
                };

                const handleModalClickOutside = (e, closeFunc) => { if (e.target === e.currentTarget) closeFunc(); };

                const handleLogin = async (e) => {
                    e.preventDefault();
                    if (typeof firebase === 'undefined') return alert("System core not loaded.");
                    const email = e.target.email.value.trim(); const password = e.target.password.value;
                    try { 
                        setIsInitializing(true);
                        await firebase.auth().setPersistence(firebase.auth.Auth.Persistence.SESSION);
                        await firebase.auth().signInWithEmailAndPassword(email, password); 
                    } catch (err) { setIsInitializing(false); alert("Authentication Failed."); }
                };

                const handleLogout = async () => { if (confirm("Logout from system?")) { await firebase.auth().signOut(); setUser(null); } };

                const executeWithAdminPassword = async (actionFunc) => {
                    if(!isOnline) return alert("You must be online to verify Admin credentials for deletions.");
                    const pwd = prompt("SECURITY LOCK: Enter your Admin Password to confirm this sensitive action.");
                    if (!pwd) return;
                    try { await firebase.auth().signInWithEmailAndPassword(user.email, pwd); actionFunc(); } catch(e) { alert("Incorrect Password. Action Denied."); }
                };

                const handleDeletePersonnel = (userItem) => {
                    if (userItem.email.toLowerCase() === 'manjebecaleb@gmail.com') return alert("Cannot delete master admin.");
                    if(!confirm("⚠️ Delete this personnel permanently?")) return;
                    executeWithAdminPassword(() => { setEditing(null); window.db.collection('users').doc(userItem.id).delete(); });
                };

                const handleDeleteProduct = (id) => {
                    if(!confirm("⚠️ Delete this item completely?")) return;
                    executeWithAdminPassword(() => { setEditing(null); window.db.collection('inventory').doc(id).delete(); });
                };

                const handleDeleteAllFinance = () => {
                    if(!confirm("⚠️ EXTREME WARNING: Permanently delete ALL sales and expenses? This CANNOT be undone!")) return;
                    executeWithAdminPassword(() => {
                        data.sales.forEach(s => window.db.collection('sales').doc(s.id).delete());
                        data.expenses.forEach(e => window.db.collection('expenses').doc(e.id).delete());
                        alert("Financial history wipe executed successfully.");
                    });
                };

                const handleWhatsAppReminder = (pt) => {
                    if(!pt.phone) return alert("Client has no phone number recorded.");
                    const msg = `Hello ${pt.name},\n\nThis is a polite reminder from APEX Pharmacy. You currently have an outstanding balance of ${pt.creditBalance.toLocaleString()} TZS.\n\nPlease arrange for payment at your earliest convenience. Thank you for your business!`;
                    window.open(`https://wa.me/${pt.phone.replace(/[^0-9\+]/g, '')}?text=${encodeURIComponent(msg)}`, '_blank');
                };

                const handleClearDebt = (client) => {
                    const amount = prompt(`Enter cash amount paid by ${client.name} to clear debt.\nCurrent Debt: ${client.creditBalance.toLocaleString()} TZS`);
                    if(!amount || isNaN(amount) || Number(amount) <= 0) return;
                    const paid = Number(amount);
                    const newBalance = Math.max(0, (client.creditBalance || 0) - paid);
                    window.db.collection('patients').doc(client.id).update({ creditBalance: newBalance });
                    window.db.collection('sales').add({
                        total: paid, profit: paid, amountTendered: paid, changeGiven: 0, timestamp: new Date().toISOString(), soldBy: user.fullName || user.email, 
                        method: 'DEBT_PAYMENT', items: [{brandName: 'Debt Clearance Payment', qty: 1, currentPrice: paid, costPrice: 0}], patientId: client.id
                    });
                    alert(`Successfully cleared ${paid.toLocaleString()} TZS from ${client.name}'s debt.`);
                };

                const handleBarcodeSubmit = (e) => {
                    e.preventDefault();
                    if(!barcodeInput.trim()) return;
                    const item = data.inventory.find(i => i.barcode === barcodeInput.trim() || i.brandName.toLowerCase() === barcodeInput.trim().toLowerCase());
                    if(item) addToCart(item); else alert("Item / Barcode not found in inventory!");
                    setBarcodeInput('');
                };

                const addToCart = (p) => {
                    if (p.stock <= 0) return alert("Item out of stock!");
                    if (p.expiryDate && new Date(p.expiryDate) < new Date()) return alert("⚠️ Cannot sell an expired item!");
                    setCart(prev => {
                        const ex = prev.find(i => i.id === p.id);
                        if (ex) return prev.map(i => i.id === p.id ? {...i, qty: i.qty + 1} : i);
                        return [...prev, {...p, qty: 1, currentPrice: p.price}];
                    });
                };

                const updateCartItem = (id, field, val) => {
                    const numVal = Number(val);
                    if (field === 'qty' && numVal <= 0) removeFromCart(id);
                    else setCart(prev => prev.map(i => i.id === id ? {...i, [field]: numVal || 0} : i));
                };

                const removeFromCart = (id) => setCart(prev => prev.filter(i => i.id !== id));

                const handleHoldCart = () => {
                    if (cart.length === 0) return alert("Cart is empty.");
                    const refName = prompt("Enter a reference name for this sale (e.g., Customer Name):");
                    if (!refName) return;
                    setHeldCarts(prev => [...prev, { id: Date.now(), name: refName, items: [...cart] }]);
                    setCart([]);
                };

                const handleRecallCart = (heldCart) => {
                    if (cart.length > 0 && !confirm("Warning: Current cart has items. Recalling this held sale will overwrite your current items!")) return;
                    setCart(heldCart.items);
                    setHeldCarts(prev => prev.filter(c => c.id !== heldCart.id));
                };

                const openCheckoutModal = () => {
                    if(cart.length === 0) return alert("Cart is empty");
                    setAmountTendered(''); setCheckoutDiscount(0); setCheckoutPatient(''); setCheckoutModal(true);
                };

                const finalizeSale = (method) => {
                    if (method === 'DEBT' && !checkoutPatient) return alert("Select a client to issue on credit!");
                    const subTotal = cart.reduce((s,i)=>s+(i.currentPrice*i.qty), 0);
                    const totalCost = cart.reduce((s,i)=>s+(i.costPrice*i.qty), 0);
                    const totalDue = Math.max(0, subTotal - checkoutDiscount); 
                    const changeGiven = (method === 'CASH' && amountTendered > totalDue) ? (amountTendered - totalDue) : 0;
                    
                    const saleData = { 
                        total: totalDue, subTotal, discount: checkoutDiscount, profit: totalDue - totalCost, amountTendered: method === 'CASH' ? amountTendered : totalDue, changeGiven,
                        timestamp: new Date().toISOString(), soldBy: user.fullName || user.email, method, items: cart, patientId: checkoutPatient || null 
                    };
                    
                    const currentCart = [...cart];
                    setCart([]); setCheckoutModal(false); 

                    window.db.collection("sales").add(saleData);
                    if (method === 'DEBT' && checkoutPatient) {
                        const pt = data.patients.find(p => p.id === checkoutPatient);
                        if(pt) window.db.collection("patients").doc(checkoutPatient).update({ creditBalance: (Number(pt.creditBalance) || 0) + totalDue });
                    }
                    currentCart.forEach(i => window.db.collection("inventory").doc(i.id).update({ stock: i.stock - i.qty }));

                    setReceiptData(saleData);
                };

                const addMedicalHistory = (patientId, record) => { window.db.collection("medicalHistory").add({ patientId, date: new Date().toISOString(), ...record }); };

                // AI ASSISTANT LOGIC
                const handleAiSubmit = async (e) => {
                    e.preventDefault();
                    if (!isOnline) return alert("You must be online to use the Clinical AI Assistant.");
                    if (!aiKey) {
                        setShowAiSettings(true);
                        return alert("Please enter your Google Gemini API Key first.");
                    }
                    
                    setIsAiLoading(true);
                    setAiResponse('');
                    
                    try {
                        const systemPrompt = `You are an expert Clinical Pharmacist and Medical Reference Assistant operating in Tanzania. Your role is to provide highly accurate medical reference strictly based on the Tanzania Standard Treatment Guidelines (STG), NEMLIT, and current local protocols. The user will ask about diagnosis, treatment, diseases, signs/symptoms, indications, or contraindications. Format your response professionally using Markdown, with clear headings and bullet points. Never provide direct patient advice, always phrase it as clinical reference. User Query: ${aiQuery}`;
                        
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${aiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: systemPrompt }] }] })
                        });
                        
                        const json = await res.json();
                        if(json.error) throw new Error(json.error.message);
                        
                        let responseText = json.candidates[0].content.parts[0].text;
                        const parsedHTML = marked.parse(responseText);
                        setAiResponse(parsedHTML);
                        setAiQuery(''); 
                        
                    } catch (err) {
                        setAiResponse(`<p class="text-rose-500 font-bold">AI Error: ${err.message}. Please check your API key or internet connection.</p>`);
                    }
                    setIsAiLoading(false);
                };

                const exportToExcel = (exportData, filename) => {
                    if (typeof XLSX === 'undefined') return alert("Excel library could not be loaded. Ensure you are online.");
                    if(exportData.length === 0) return alert("No data to export");
                    const ws = XLSX.utils.json_to_sheet(exportData);
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, "Data");
                    XLSX.writeFile(wb, `${filename}_${new Date().toLocaleDateString().replace(/\//g, '-')}.xlsx`);
                };

                const processedInventory = useMemo(() => {
                    let items = [...data.inventory];
                    if (search) {
                        const term = search.toLowerCase();
                        items = items.filter(p => (p.brandName || '').toLowerCase().includes(term) || (p.genericName || '').toLowerCase().includes(term) || (p.category || '').toLowerCase().includes(term) || (p.subcategory || '').toLowerCase().includes(term) || (p.barcode || '') === term);
                    }
                    items.sort((a, b) => {
                        const isExpA = a.expiryDate && new Date(a.expiryDate) < new Date() ? 1 : 0;
                        const isExpB = b.expiryDate && new Date(b.expiryDate) < new Date() ? 1 : 0;
                        const oosA = a.stock <= 0 ? 1 : 0; const oosB = b.stock <= 0 ? 1 : 0;
                        switch(sortOption) {
                            case 'NEW': return (b.updatedAt ? new Date(b.updatedAt).getTime() : 0) - (a.updatedAt ? new Date(a.updatedAt).getTime() : 0);
                            case 'BRAND_ASC': return (a.brandName||'').localeCompare(b.brandName||'');
                            case 'BRAND_DESC': return (b.brandName||'').localeCompare(a.brandName||'');
                            case 'GENERIC_ASC': return (a.genericName||'').localeCompare(b.genericName||'');
                            case 'PRICE_ASC': return (Number(a.price)||0) - (Number(b.price)||0);
                            case 'PRICE_DESC': return (Number(b.price)||0) - (Number(a.price)||0);
                            case 'EXPIRED': return isExpB - isExpA || (a.brandName||'').localeCompare(b.brandName||'');
                            case 'OOS': return oosB - oosA || (Number(a.stock)||0) - (Number(b.stock)||0);
                            case 'EXPIRING_SOON': 
                                const timeA = a.expiryDate ? new Date(a.expiryDate).getTime() : Infinity;
                                const timeB = b.expiryDate ? new Date(b.expiryDate).getTime() : Infinity;
                                return timeA - timeB;
                            default: return 0;
                        }
                    });
                    return items;
                }, [data.inventory, search, sortOption]);

                const systemAlerts = useMemo(() => {
try {
    const systemPrompt = `You are an expert Clinical Pharmacist and Medical Reference Assistant operating in Tanzania. Your role is to provide highly accurate medical reference strictly based on the Tanzania Standard Treatment Guidelines (STG), NEMLIT, and current local protocols. Format your response professionally using Markdown. User Query: ${aiQuery}`;

    const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${aiKey}`,
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                contents: [
                    {
                        parts: [
                            {
                                text: systemPrompt,
                            },
                        ],
                    },
                ],
            }),
        }
    );

    if (!res.ok) {
        throw new Error(await res.text());
    }

    const json = await res.json();

    const responseText =

                                    <div className="bg-slate-900 border border-slate-800 w-full max-w-sm p-6 md:p-10 rounded-[3rem] shadow-2xl flex flex-col">
                                        <h3 className="text-2xl font-black text-emerald-500 uppercase mb-6 text-center">Profit Breakdown</h3>
                                        
                                        <div className="bg-black p-6 rounded-3xl mb-4 border border-slate-800">
                                            <div className="flex justify-between items-center mb-4 pb-4 border-b border-slate-800">
                                                <span className="text-slate-400 font-bold text-xs uppercase">Gross Profit</span>
                                                <span className="text-blue-400 font-black text-lg">{data.sales.reduce((a,b)=>a+Number(b.profit),0).toLocaleString()}</span>
                                            </div>
                                            <div className="flex justify-between items-center mb-4 pb-4 border-b border-slate-800">
                                                <span className="text-slate-400 font-bold text-xs uppercase">Total Losses/Expenses</span>
                                                <span className="text-rose-500 font-black text-lg">- {data.expenses.reduce((a,b)=>a+Number(b.amount),0).toLocaleString()}</span>
                                            </div>
                                            <div className="flex justify-between items-center mt-2">
                                                <span className="text-emerald-500 font-black text-sm uppercase">Net Profit</span>
                                                <span className="text-emerald-400 font-black text-2xl">{totalNetProfit.toLocaleString()}</span>
                                            </div>
                                        </div>

                                        <button onClick={()=>setViewNetProfitDetail(false)} className="mt-2 shrink-0 bg-slate-800 hover:bg-slate-700 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest w-full">CLOSE</button>
                                    </div>
                                </div>
                            )}

                            {/* SALES VOLUME DETAIL MODAL */}
                            {viewSalesVolume && (
                                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay" onClick={(e) => handleModalClickOutside(e, () => setViewSalesVolume(false))}>
                                    <div className="bg-slate-900 border border-slate-800 w-full max-w-2xl p-6 md:p-10 rounded-[3rem] shadow-2xl max-h-[90vh] flex flex-col">
                                        <h3 className="text-2xl font-black text-emerald-500 uppercase mb-6 shrink-0">Detailed Sales Volume</h3>
                                        <div className="flex-1 overflow-y-auto pr-2 no-scrollbar bg-black p-4 rounded-[2rem] border border-slate-800">
                                            <table className="w-full text-left text-xs">
                                                <thead><tr className="text-slate-500 uppercase border-b border-slate-800"><th className="pb-3 px-2">Date/Time</th><th className="pb-3 px-2">Item(s) Sold</th><th className="pb-3 px-2">Total Value</th></tr></thead>
                                                <tbody>
                                                    {data.sales.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).map(s => (
                                                        <tr key={s.id} className="border-b border-slate-800 hover:bg-slate-900 transition-colors">
                                                            <td className="py-3 px-2 text-slate-400 font-bold">{new Date(s.timestamp).toLocaleString()}</td>
                                                            <td className="py-3 px-2 text-white">{s.items?.map(i => `${i.qty}x ${i.brandName}`).join(', ')}</td>
                                                            <td className="py-3 px-2 text-emerald-400 font-black">{Number(s.total).toLocaleString()}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                            {data.sales.length === 0 && <p className="text-center py-6 text-slate-500 font-bold uppercase">No Sales Recorded</p>}
                                        </div>
                                        <button onClick={()=>setViewSalesVolume(false)} className="mt-6 shrink-0 bg-slate-800 hover:bg-slate-700 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest w-full">CLOSE</button>
                                    </div>
                                </div>
                            )}

                        </main>
                    </div>
                );
            };

            const root = ReactDOM.createRoot(document.getElementById('apex-root'));
            root.render(<App />);

        } catch (error) {
            const el = document.getElementById('error-text');
            if(el) { el.style.display = 'block'; el.innerText = "REACT CRASH: " + error.message; }
        }
    </script>
</body>
</html>
