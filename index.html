<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX | Pharmacy ERP</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white">
    <div id="apex-root">
        <div class="h-screen flex items-center justify-center">
            <h1 class="text-2xl font-bold animate-pulse">APEX IS STARTING...</h1>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // !!! PASTE YOUR FIREBASE CONFIG HERE !!!
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
    </script>

    <script type="text/babel">
        const App = () => {
            return (
                <div class="flex h-screen items-center justify-center">
                    <div class="text-center bg-slate-800 p-20 rounded-[3rem] shadow-2xl border border-slate-700">
                        <h1 class="text-6xl font-black text-emerald-500 italic">APEX</h1>
                        <p class="text-slate-400 mt-4 uppercase font-bold tracking-widest">System is Live on Vercel</p>
                        <button class="mt-10 bg-emerald-600 px-10 py-4 rounded-2xl font-black text-xl hover:bg-emerald-500 transition-all">
                            ENTER VAULT
                        </button>
                    </div>
                </div>
            );
        };

        // Delay to allow Firebase to load
        setTimeout(() => {
            const root = ReactDOM.createRoot(document.getElementById('apex-root'));
            root.render(<App />);
        }, 1500);
    </script>
</body>
</html>
