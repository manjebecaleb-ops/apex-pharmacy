<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>APEX | Enterprise Cloud ERP</title>
    <!-- Stable Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans overflow-hidden">
    <div id="apex-root">
        <div class="h-screen flex items-center justify-center">
            <h1 class="text-2xl font-bold animate-pulse">APEX ENGINE STARTING...</h1>
        </div>
    </div>

    <!-- 1. CLOUD ENGINE (FIREBASE) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, query, where, getDocs, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAAazqZ1XnzpQ6A_cCHyQEsgXxq5jVVLXE",
  authDomain: "apex-pharmacy-a69b5.firebaseapp.com",
  projectId: "apex-pharmacy-a69b5",
  storageBucket: "apex-pharmacy-a69b5.firebasestorage.app",
  messagingSenderId: "28559683699",
  appId: "1:28559683699:web:1cc3f16a98a32463657a06",
  measurementId: "G-SVDCM1Y693"
};

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.api = { collection, onSnapshot, addDoc, updateDoc, doc, query, where, getDocs, deleteDoc, orderBy };
    </script>

    <!-- 2. SYSTEM LOGIC -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('LOGIN');
            const [user, setUser] = useState(null);
            const [data, setData] = useState({ inventory: [], sales: [], users: [], patients: [] });
            const [cart, setCart] = useState([]);
            const [search, setSearch] = useState("");

            // REAL-TIME SYNC
            useEffect(() => {
                if (!window.db) return;
                const unsubInv = window.api.onSnapshot(window.api.collection(window.db, "inventory"), (snap) => {
                    setData(prev => ({...prev, inventory: snap.docs.map(d => ({id: d.id, ...d.data()}))}));
                });
                const unsubSales = window.api.onSnapshot(window.api.collection(window.db, "sales"), (snap) => {
                    setData(prev => ({...prev, sales: snap.docs.map(d => ({id: d.id, ...d.data()}))}));
                });
                const unsubUsers = window.api.onSnapshot(window.api.collection(window.db, "users"), (snap) => {
                    setData(prev => ({...prev, users: snap.docs.map(d => ({id: d.id, ...d.data()}))}));
                });
                const unsubPatients = window.api.onSnapshot(window.api.collection(window.db, "patients"), (snap) => {
                    setData(prev => ({...prev, patients: snap.docs.map(d => ({id: d.id, ...d.data()}))}));
                });
                return () => { unsubInv(); unsubSales(); unsubUsers(); unsubPatients(); };
            }, []);

            // BOOTSTRAP: Create Admin if empty
            useEffect(() => {
                const checkAdmin = async () => {
                    const q = window.api.query(window.api.collection(window.db, "users"), window.api.where("username", "==", "admin"));
                    const snap = await window.api.getDocs(q);
                    if (snap.empty) {
                        await window.api.addDoc(window.api.collection(window.db, "users"), {
                            username: "admin", pin: "1234", role: "MANAGER", status: "ACTIVE"
                        });
                    }
                };
                if(window.db) checkAdmin();
            }, []);

            // LOGIN
            const handleLogin = async () => {
                const u = document.getElementById('u').value, p = document.getElementById('p').value;
                const q = window.api.query(window.api.collection(window.db, "users"), 
                    window.api.where("username", "==", u), 
                    window.api.where("pin", "==", p),
                    window.api.where("status", "==", "ACTIVE")
                );
                const snap = await window.api.getDocs(q);
                if (!snap.empty) { setUser(snap.docs[0].data()); setView('DASHBOARD'); }
                else alert("Login Failed!");
            };

            // POS LOGIC
            const addToCart = (p) => {
                if (p.stock <= 0) return alert("Out of stock!");
                setCart(prev => {
                    const ex = prev.find(i => i.id === p.id);
                    if (ex) return prev.map(i => i.id === p.id ? {...i, qty: i.qty + 1} : i);
                    return [...prev, {...p, qty: 1}];
                });
            };

            const finalizeSale = async () => {
                const total = cart.reduce((s,i) => s + (i.price * i.qty), 0);
                await window.api.addDoc(window.api.collection(window.db, "sales"), {
                    total, timestamp: new Date().toISOString(), items: cart, soldBy: user.username
                });
                for(const i of cart) {
                    await window.api.updateDoc(window.api.doc(window.db, "inventory", i.id), { stock: i.stock - i.qty });
                }
                setCart([]); alert("Sale Completed!");
            };

            if (view === 'LOGIN') {
                return (
                    <div className="h-screen flex items-center justify-center bg-slate-900">
                        <div className="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-sm text-center">
                            <h1 className="text-4xl font-black text-emerald-600 italic mb-10">APEX</h1>
                            <input id="u" placeholder="User" className="w-full p-4 mb-3 bg-slate-100 rounded-2xl outline-none text-black" />
                            <input id="p" type="password" placeholder="PIN" className="w-full p-4 mb-8 bg-slate-100 rounded-2xl outline-none text-black" />
                            <button onClick={handleLogin} className="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black">SIGN IN</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen bg-slate-50 text-slate-900">
                    <aside className="w-64 bg-slate-900 text-white p-6 flex flex-col shrink-0">
                        <h2 className="text-2xl font-black text-emerald-500 mb-10 italic">APEX PRO</h2>
                        <nav className="flex-1 space-y-2">
                            <button onClick={()=>setView('DASHBOARD')} className={`w-full text-left p-3 rounded-xl ${view==='DASHBOARD'?'bg-emerald-600':''}`}>🏠 Dashboard</button>
                            <button onClick={()=>setView('POS')} className={`w-full text-left p-3 rounded-xl ${view==='POS'?'bg-emerald-600':''}`}>🛒 Sales (POS)</button>
                            <button onClick={()=>setView('STOO')} className={`w-full text-left p-3 rounded-xl ${view==='STOO'?'bg-emerald-600':''}`}>📦 Inventory</button>
                            <button onClick={()=>setView('PATIENTS')} className={`w-full text-left p-3 rounded-xl ${view==='PATIENTS'?'bg-emerald-600':''}`}>👥 Patients</button>
                            {user.role === 'MANAGER' && <button onClick={()=>setView('USERS')} className={`w-full text-left p-3 rounded-xl ${view==='USERS'?'bg-blue-600':''}`}>🛡️ Staff</button>}
                        </nav>
                        <button onClick={()=>window.location.reload()} className="text-rose-400 font-bold text-xs uppercase">Logout</button>
                    </aside>

                    <main className="flex-1 p-10 overflow-auto no-scrollbar">
                        {view === 'DASHBOARD' && (
                            <div>
                                <h2 className="text-3xl font-black mb-8">System Summary</h2>
                                <div className="grid grid-cols-2 gap-6">
                                    <div className="bg-white p-8 rounded-3xl border-l-8 border-emerald-500 shadow-sm">
                                        <p className="text-slate-400 text-xs font-bold uppercase">Total Revenue</p>
                                        <h3 className="text-3xl font-black">{data.sales.reduce((a,b)=>a+b.total,0).toLocaleString()} TZS</h3>
                                    </div>
                                    <div className="bg-white p-8 rounded-3xl border-l-8 border-blue-500 shadow-sm">
                                        <p className="text-slate-400 text-xs font-bold uppercase">Inventory Assets</p>
                                        <h3 className="text-3xl font-black">{data.inventory.length} Items</h3>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'POS' && (
                            <div className="flex gap-8">
                                <div className="flex-1 space-y-6">
                                    <input placeholder="Search brand or symptom..." className="w-full p-4 rounded-2xl border shadow-sm" onChange={(e)=>setSearch(e.target.value.toLowerCase())} />
                                    <div className="grid grid-cols-2 gap-4">
                                        {data.inventory.filter(p => p.brandName.toLowerCase().includes(search)).map(p => (
                                            <div key={p.id} onClick={()=>addToCart(p)} className="bg-white p-6 rounded-3xl border-2 hover:border-emerald-500 cursor-pointer transition-all active:scale-95 shadow-sm">
                                                <p className="font-black text-lg">{p.brandName}</p>
                                                <p className="text-emerald-600 font-black">{p.price.toLocaleString()} TZS</p>
                                                <p className="text-[10px] opacity-30 font-bold">STK: {p.stock}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="w-80 bg-white p-8 rounded-[3rem] shadow-2xl h-fit border-t-8 border-emerald-600">
                                    <h3 className="font-black text-xl mb-6">Mkokoteni</h3>
                                    {cart.map(i => (
                                        <div key={i.id} className="flex justify-between py-2 border-b text-sm">
                                            <span>{i.brandName} x{i.qty}</span>
                                            <span className="font-bold">{i.price * i.qty}</span>
                                        </div>
                                    ))}
                                    <div className="mt-8 flex justify-between font-black text-2xl">
                                        <span>Total:</span>
                                        <span>{cart.reduce((s,i)=>s+(i.price*i.qty),0).toLocaleString()}</span>
                                    </div>
                                    <button onClick={finalizeSale} className="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black mt-10 shadow-lg">FINALIZE</button>
                                </div>
                            </div>
                        )}

                        {view === 'STOO' && (
                            <div className="bg-white p-10 rounded-[3rem] shadow-sm border">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-2xl font-black">Stock Management</h2>
                                    <button onClick={async () => {
                                        const n = prompt("Brand:"); const p = prompt("Price:"); const s = prompt("Stock:");
                                        if(n) await window.api.addDoc(window.api.collection(window.db, "inventory"), { brandName: n, price: Number(p), stock: Number(s) });
                                    }} className="bg-emerald-600 text-white px-8 py-3 rounded-2xl font-black">+ Add Item</button>
                                </div>
                                <table className="w-full text-left">
                                    <thead><tr className="text-slate-400 text-xs font-bold uppercase border-b"><th>Name</th><th>Stock</th><th>Price</th></tr></thead>
                                    <tbody>
                                        {data.inventory.map(p => (
                                            <tr key={p.id} className="border-b"><td className="py-4 font-bold">{p.brandName}</td><td>{p.stock}</td><td className="font-black text-emerald-600">{p.price}</td></tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                        
                        {view === 'PATIENTS' && (
                             <div className="bg-white p-10 rounded-[3rem] shadow-sm border">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-2xl font-black">Patient Registry</h2>
                                    <button onClick={async () => {
                                        const n = prompt("Name:"); const c = prompt("NHIF ID:");
                                        if(n) await window.api.addDoc(window.api.collection(window.db, "patients"), { name: n, cardId: c });
                                    }} className="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black">+ Register Patient</button>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    {data.patients.map(pt => (
                                        <div key={pt.id} className="p-6 bg-slate-50 rounded-3xl border">
                                            <p className="font-black text-lg">{pt.name}</p>
                                            <p className="text-xs text-slate-400 font-bold">ID: {pt.cardId}</p>
                                        </div>
                                    ))}
                                </div>
                             </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('apex-root'));
        root.render(<App />);
    </script>
</body>
</html>
