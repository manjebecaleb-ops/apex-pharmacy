<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX | Sovereign Cloud ERP</title>
    <!-- Stable Production Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: white; margin: 0; overflow: hidden; }
        .active-tab { background: #10b981 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="apex-root">
        <div class="h-screen flex flex-col items-center justify-center">
            <h1 class="text-4xl font-black text-emerald-500 animate-pulse italic">APEX</h1>
            <p class="text-slate-500 mt-4 font-bold uppercase tracking-widest">Initializing Secure Cloud...</p>
        </div>
    </div>

    <!-- 1. CLOUD ENGINE (FIREBASE) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, query, where, getDocs, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAAazqZ1XnzpQ6A_cCHyQEsgXxq5jVVLXE",
            authDomain: "apex-pharmacy-a69b5.firebaseapp.com",
            projectId: "apex-pharmacy-a69b5",
            storageBucket: "apex-pharmacy-a69b5.firebasestorage.app",
            messagingSenderId: "28559683699",
            appId: "1:28559683699:web:1cc3f16a98a32463657a06",
            measurementId: "G-SVDCM1Y693"
        };

        try {
            const app = initializeApp(firebaseConfig);
            window.db = getFirestore(app);
            window.api = { collection, onSnapshot, addDoc, updateDoc, doc, query, where, getDocs, deleteDoc, orderBy };
        } catch (e) { console.error("Cloud Error"); }
    </script>

    <!-- 2. APEX INTERFACE LOGIC -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('LOGIN');
            const [user, setUser] = useState(null);
            const [inventory, setInventory] = useState([]);
            const [sales, setSales] = useState([]);
            const [cart, setCart] = useState([]);
            const [isSwahili, setIsSwahili] = useState(true);

            // REAL-TIME SYNC
            useEffect(() => {
                if (!window.db) return;
                const unsubInv = window.api.onSnapshot(window.api.collection(window.db, "inventory"), (s) => setInventory(s.docs.map(d=>({id:d.id, ...d.data()}))));
                const unsubSales = window.api.onSnapshot(window.api.collection(window.db, "sales"), (s) => setSales(s.docs.map(d=>({id:d.id, ...d.data()}))));
                return () => { unsubInv(); unsubSales(); };
            }, []);

            // BOOTSTRAP: Create Admin if empty
            useEffect(() => {
                const init = async () => {
                    const q = window.api.query(window.api.collection(window.db, "users"), window.api.where("username", "==", "admin"));
                    const snap = await window.api.getDocs(q);
                    if (snap.empty) {
                        await window.api.addDoc(window.api.collection(window.db, "users"), { username: "admin", pin: "1234", role: "MANAGER", status: "ACTIVE" });
                    }
                };
                if(window.db) init();
            }, []);

            const handleLogin = async () => {
                const u = document.getElementById('u_box').value, p = document.getElementById('p_box').value;
                const q = window.api.query(window.api.collection(window.db, "users"), window.api.where("username", "==", u), window.api.where("pin", "==", p));
                const snap = await window.api.getDocs(q);
                if (!snap.empty) { setUser(snap.docs[0].data()); setView('DASHBOARD'); }
                else alert("Access Denied");
            };

            const addToCart = (p) => {
                setCart(prev => {
                    const ex = prev.find(i => i.id === p.id);
                    if (ex) return prev.map(i => i.id === p.id ? {...i, qty: i.qty + 1} : i);
                    return [...prev, {...p, qty: 1}];
                });
            };

            const finalizeSale = async () => {
                const total = cart.reduce((s,i)=>s+(i.price*i.qty),0);
                await window.api.addDoc(window.api.collection(window.db, "sales"), { total, timestamp: new Date().toISOString(), items: cart, soldBy: user.username });
                for(const i of cart) await window.api.updateDoc(window.api.doc(window.db, "inventory", i.id), { stock: i.stock - i.qty });
                setCart([]); alert("Transaction Authorized!");
            };

            if (view === 'LOGIN') {
                return (
                    <div className="h-screen flex items-center justify-center">
                        <div className="bg-white text-slate-900 p-12 rounded-[3rem] shadow-2xl w-full max-w-sm text-center border-t-8 border-emerald-500">
                            <h1 className="text-4xl font-black text-emerald-600 mb-2 italic">APEX</h1>
                            <p className="text-slate-400 text-[10px] font-bold uppercase mb-10 tracking-widest">Enterprise Cloud Vault</p>
                            <input id="u_box" placeholder="Username" className="w-full p-4 mb-3 bg-slate-50 rounded-2xl outline-none" />
                            <input id="p_box" type="password" placeholder="PIN" className="w-full p-4 mb-8 bg-slate-50 rounded-2xl outline-none" />
                            <button onClick={handleLogin} className="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black shadow-lg">LOGIN</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden">
                    <aside className="w-72 border-r border-slate-800 p-8 flex flex-col shrink-0">
                        <h2 className="text-2xl font-black text-emerald-500 mb-10 italic">APEX PRO</h2>
                        <nav className="flex-1 space-y-2 font-bold text-slate-400">
                            <button onClick={()=>setView('DASHBOARD')} className={`w-full text-left p-3 rounded-xl ${view==='DASHBOARD'?'bg-emerald-600 text-white':''}`}>🏠 Dashboard</button>
                            <button onClick={()=>setView('POS')} className={`w-full text-left p-3 rounded-xl ${view==='POS'?'bg-emerald-600 text-white':''}`}>🛒 Sales POS</button>
                            <button onClick={()=>setView('STOO')} className={`w-full text-left p-3 rounded-xl ${view==='STOO'?'bg-emerald-600 text-white':''}`}>📦 Inventory</button>
                        </nav>
                        <button onClick={()=>window.location.reload()} className="text-rose-500 text-xs font-bold uppercase mt-10">Logout</button>
                    </aside>

                    <main className="flex-1 p-10 overflow-auto bg-slate-950 no-scrollbar">
                        {view === 'DASHBOARD' && (
                            <div>
                                <h2 className="text-3xl font-black mb-8">System Summary</h2>
                                <div className="grid grid-cols-2 gap-6">
                                    <div className="p-8 bg-slate-900 border border-slate-800 rounded-3xl">
                                        <p className="text-slate-500 text-xs font-bold uppercase tracking-widest">Total Revenue</p>
                                        <h3 className="text-4xl font-black text-emerald-500 mt-2">{sales.reduce((a,b)=>a+b.total,0).toLocaleString()} <span className="text-sm">TZS</span></h3>
                                    </div>
                                    <div className="p-8 bg-slate-900 border border-slate-800 rounded-3xl">
                                        <p className="text-slate-500 text-xs font-bold uppercase tracking-widest">Stock Items</p>
                                        <h3 className="text-4xl font-black text-blue-500 mt-2">{inventory.length} Items</h3>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'POS' && (
                            <div className="flex gap-8">
                                <div className="flex-1 grid grid-cols-2 gap-4 h-fit">
                                    {inventory.map(p => (
                                        <div key={p.id} onClick={()=>addToCart(p)} className="p-6 bg-slate-900 border border-slate-800 rounded-3xl hover:border-emerald-500 cursor-pointer shadow-sm active:scale-95 transition-all">
                                            <p className="font-black text-lg">{p.brandName}</p>
                                            <p className="text-emerald-500 font-bold">{p.price.toLocaleString()} TZS</p>
                                            <p className="text-[10px] opacity-30 font-bold uppercase">STK: {p.stock}</p>
                                        </div>
                                    ))}
                                </div>
                                <div className="w-96 bg-white text-slate-900 p-8 rounded-[3rem] shadow-2xl h-fit border-t-8 border-emerald-600">
                                    <h3 className="font-black text-xl mb-6 tracking-tight">Active Bill</h3>
                                    <div className="space-y-4 mb-8 overflow-auto max-h-64 no-scrollbar">
                                        {cart.map(i => (
                                            <div key={i.id} className="flex justify-between border-b pb-2 text-sm font-bold">
                                                <span>{i.brandName} x{i.qty}</span>
                                                <span>{(i.price * i.qty).toLocaleString()}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex justify-between font-black text-3xl mb-8">
                                        <span>Total:</span>
                                        <span className="text-emerald-600">{cart.reduce((s,i)=>s+(i.price*i.qty),0).toLocaleString()}</span>
                                    </div>
                                    <button onClick={finalizeSale} className="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black text-lg shadow-lg active:scale-95">CONFIRM SALE</button>
                                </div>
                            </div>
                        )}

                        {view === 'STOO' && (
                            <div className="p-10 bg-slate-900 border border-slate-800 rounded-[3rem] shadow-sm">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-2xl font-black text-emerald-500 uppercase tracking-widest">Inventory Management</h2>
                                    <button onClick={async ()=>{
                                        const n = prompt("Item:"); const p = prompt("Price:"); const s = prompt("Stock:");
                                        if(n) await window.api.addDoc(window.api.collection(window.db, "inventory"), { brandName: n.toUpperCase(), price: Number(p), stock: Number(s) });
                                    }} className="bg-emerald-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg">+ Add Med</button>
                                </div>
                                <table className="w-full text-left">
                                    <thead><tr className="text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em] border-b border-slate-800"><th>Name</th><th>Stock</th><th className="text-right">Price</th></tr></thead>
                                    <tbody className="divide-y divide-slate-800 font-bold">{inventory.map(p => (
                                        <tr key={p.id} className="hover:bg-slate-800/50"><td className="py-4 font-black">{p.brandName}</td><td>{p.stock}</td><td className="text-right text-emerald-400">{Number(p.price).toLocaleString()}</td></tr>
                                    ))}</tbody>
                                </table>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const bootInterval = setInterval(() => {
            if (window.db) {
                const root = ReactDOM.createRoot(document.getElementById('apex-root'));
                root.render(<App />);
                clearInterval(bootInterval);
            }
        }, 500);
    </script>
</body>
</html>
