<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX | Sovereign Enterprise ERP</title>
    <!-- PRODUCTION LIBRARIES -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; background-color: #020617; color: white; }
        .active-tab { background: #10b981 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .success-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body>
    <div id="apex-root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <h1 style="font-size: 3rem; font-weight: 900; color: #10b981;">APEX</h1>
            <p style="color: #64748b;">GOLD ENGINE INITIALIZING...</p>
        </div>
    </div>

    <!-- 1. CLOUD ENGINE (FIREBASE) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, query, where, getDocs, deleteDoc, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAAazqZ1XnzpQ6A_cCHyQEsgXxq5jVVLXE",
            authDomain: "apex-pharmacy-a69b5.firebaseapp.com",
            projectId: "apex-pharmacy-a69b5",
            storageBucket: "apex-pharmacy-a69b5.firebasestorage.app",
            messagingSenderId: "28559683699",
            appId: "1:28559683699:web:1cc3f16a98a32463657a06",
            measurementId: "G-SVDCM1Y693"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.api = { collection, onSnapshot, addDoc, updateDoc, doc, query, where, getDocs, deleteDoc, orderBy, limit };
    </script>

    <!-- 2. APEX INTELLIGENCE LOGIC -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [view, setView] = useState('DASHBOARD');
            const [user, setUser] = useState(null);
            const [data, setData] = useState({ inventory: [], sales: [], users: [], patients: [], expenses: [], categories: ['Medicine', 'Supplies', 'Cosmetic'] });
            const [cart, setCart] = useState([]);
            const [search, setSearch] = useState("");
            const [editItem, setEditItem] = useState(null);

            // REAL-TIME CLOUD SYNC
            useEffect(() => {
                if (!window.db) return;
                const unsubInv = window.api.onSnapshot(window.api.collection(window.db, "inventory"), (s) => setData(p => ({...p, inventory: s.docs.map(d=>({id:d.id, ...d.data()}))})));
                const unsubSales = window.api.onSnapshot(window.api.collection(window.db, "sales"), (s) => setData(p => ({...p, sales: s.docs.map(d=>({id:d.id, ...d.data()}))})));
                const unsubPatients = window.api.onSnapshot(window.api.collection(window.db, "patients"), (s) => setData(p => ({...p, patients: s.docs.map(d=>({id:d.id, ...d.data()}))})));
                const unsubExp = window.api.onSnapshot(window.api.collection(window.db, "expenses"), (s) => setData(p => ({...p, expenses: s.docs.map(d=>({id:d.id, ...d.data()}))})));
                const unsubUsers = window.api.onSnapshot(window.api.collection(window.db, "users"), (s) => setData(p => ({...p, users: s.docs.map(d=>({id:d.id, ...d.data()}))})));
                return () => { unsubInv(); unsubSales(); unsubPatients(); unsubExp(); unsubUsers(); };
            }, []);

            // PERMISSIONS
            const hasAccess = (level) => {
                const roles = { 'MANAGER': 4, 'PHARMACIST': 3, 'TECHNICIAN': 2, 'ASSISTANT': 1, 'DISPENSER': 0 };
                return roles[user?.role] >= roles[level];
            };

            const handleLogin = async () => {
                const u = document.getElementById('u_box').value.toLowerCase().trim();
                const p = document.getElementById('p_box').value.trim();
                const q = window.api.query(window.api.collection(window.db, "users"), window.api.where("username", "==", u), window.api.where("pin", "==", p));
                const snap = await window.api.getDocs(q);
                if (!snap.empty) { 
                    const loggedInUser = { id: snap.docs[0].id, ...snap.docs[0].data() };
                    setUser(loggedInUser); 
                    setView('DASHBOARD'); 
                } else alert("Access Denied");
            };

            const finalizeSale = async () => {
                const total = cart.reduce((s,i)=>s+(i.price*i.qty),0);
                const totalCost = cart.reduce((s,i)=>s+(i.costPrice*i.qty),0);
                await window.api.addDoc(window.api.collection(window.db, "sales"), {
                    total, profit: total - totalCost, timestamp: new Date().toISOString(), soldBy: user.username, items: cart
                });
                for(const i of cart) await window.api.updateDoc(window.api.doc(window.db, "inventory", i.id), { stock: i.stock - i.qty });
                setCart([]); alert("Transaction Authorized");
            };

            // --- UI: LOGIN ---
            if (!user) {
                return (
                    <div className="h-screen flex items-center justify-center bg-black">
                        <div className="bg-slate-900 p-12 rounded-[4rem] shadow-2xl w-full max-w-sm text-center border border-slate-800">
                            <h1 className="text-5xl font-black text-emerald-500 mb-2 italic tracking-tighter">APEX</h1>
                            <input id="u_box" placeholder="Username" className="w-full p-4 mb-3 bg-slate-800 rounded-2xl outline-none border border-slate-700 text-center font-bold" />
                            <input id="p_box" type="password" placeholder="PIN" className="w-full p-4 mb-10 bg-slate-800 rounded-2xl outline-none border border-slate-700 text-center font-bold" />
                            <button onClick={handleLogin} className="w-full bg-emerald-600 text-white py-5 rounded-[2rem] font-black text-xl shadow-lg hover:bg-emerald-500 transition-all">AUTHORIZE</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden bg-slate-950">
                    {/* SIDEBAR */}
                    <aside className="w-72 bg-black border-r border-slate-800 p-8 flex flex-col shrink-0">
                        <div className="mb-10 flex items-center gap-3">
                            <div className="w-10 h-10 bg-emerald-600 rounded-2xl flex items-center justify-center font-black">A</div>
                            <h2 className="text-xl font-black tracking-tighter">APEX <span className="text-emerald-500 italic">Sovereign</span></h2>
                        </div>
                        <nav className="flex-1 space-y-1 overflow-y-auto no-scrollbar">
                            <NavItem id="DASHBOARD" label="Command Center" icon={lucide.LayoutDashboard} active={view} onClick={setView} />
                            <NavItem id="POS" label="Sales Terminal" icon={lucide.ShoppingCart} active={view} onClick={setView} />
                            <NavItem id="STOO" label="Inventory Vault" icon={lucide.Package} active={view} onClick={setView} />
                            <NavItem id="PATIENTS" label="Patient Registry" icon={lucide.Users} active={view} onClick={setView} />
                            <NavItem id="FINANCE" label="Financial Ledger" icon={lucide.BarChart3} active={view} onClick={setView} />
                            {hasAccess('MANAGER') && <NavItem id="USERS" label="Personnel" icon={lucide.ShieldCheck} active={view} onClick={setView} />}
                        </nav>
                        <button onClick={()=>window.location.reload()} className="text-rose-500 font-bold text-[10px] uppercase mt-10">Logout</button>
                    </aside>

                    {/* MAIN */}
                    <main className="flex-1 p-10 overflow-auto no-scrollbar relative">
                        {view === 'DASHBOARD' && <Dashboard data={data} />}
                        
                        {view === 'POS' && <POS inventory={data.inventory} cart={cart} search={search} setSearch={setSearch} addToCart={(p)=>{
                            const ex = cart.find(i=>i.id===p.id);
                            if(p.stock <= (ex?.qty||0)) return alert("Out of stock!");
                            setCart(prev => ex ? prev.map(i=>i.id===p.id?{...i, qty:i.qty+1}:i) : [...prev, {...p, qty:1}]);
                        }} updateQty={(id, v)=>setCart(cart.map(i=>i.id===id?{...i, qty:parseInt(v)||0}:i))} finalize={finalizeSale} />}
                        
                        {view === 'STOO' && <Inventory inventory={data.inventory} setEditItem={setEditItem} />}
                        
                        {view === 'PATIENTS' && <Patients patients={data.patients} />}
                        
                        {view === 'FINANCE' && <Finance sales={data.sales} expenses={data.expenses} />}

                        {view === 'USERS' && <Personnel users={data.users} />}

                        {/* MODAL: EDIT PRODUCT */}
                        {editItem && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90">
                                <div className="glass-panel w-full max-w-2xl p-10 rounded-[4rem] shadow-2xl overflow-y-auto max-h-[90vh] no-scrollbar">
                                    <h3 className="text-3xl font-black mb-8 text-emerald-500 uppercase tracking-tighter">Modify Product Data</h3>
                                    <form onSubmit={async (e)=>{
                                        e.preventDefault();
                                        const d = new FormData(e.target);
                                        await window.api.updateDoc(window.api.doc(window.db, "inventory", editItem.id), {
                                            brandName: d.get('brand').toUpperCase(),
                                            genericName: d.get('generic'),
                                            price: Number(d.get('price')),
                                            costPrice: Number(d.get('cost')),
                                            stock: Number(d.get('stock')),
                                            category: d.get('category'),
                                            batch: d.get('batch'),
                                            symptoms: d.get('symptoms')
                                        });
                                        setEditItem(null); alert("Cloud Updated");
                                    }} className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="space-y-4">
                                            <div><label className="text-[10px] text-slate-500 font-bold uppercase ml-2">Brand Name</label>
                                            <input name="brand" defaultValue={editItem.brandName} className="w-full p-4 bg-slate-800 rounded-3xl outline-none" /></div>
                                            <div><label className="text-[10px] text-slate-500 font-bold uppercase ml-2">Generic Name</label>
                                            <input name="generic" defaultValue={editItem.genericName} className="w-full p-4 bg-slate-800 rounded-3xl outline-none" /></div>
                                            <div><label className="text-[10px] text-slate-500 font-bold uppercase ml-2">Batch Number (Recall ID)</label>
                                            <input name="batch" defaultValue={editItem.batch} className="w-full p-4 bg-slate-800 rounded-3xl outline-none" /></div>
                                        </div>
                                        <div className="space-y-4">
                                            <div className="grid grid-cols-2 gap-4">
                                                <div><label className="text-[10px] text-slate-500 font-bold uppercase ml-2">Stock Level</label>
                                                <input name="stock" type="number" defaultValue={editItem.stock} className="w-full p-4 bg-slate-800 rounded-3xl outline-none font-black text-emerald-400" /></div>
                                                <div><label className="text-[10px] text-slate-500 font-bold uppercase ml-2">Category</label>
                                                <select name="category" defaultValue={editItem.category} className="w-full p-4 bg-slate-800 rounded-3xl outline-none">
                                                    <option>Medicine</option><option>Supplies</option><option>Cosmetic</option>
                                                </select></div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div><label className="text-[10px] text-slate-500 font-bold uppercase ml-2">Selling Price</label>
                                                <input name="price" type="number" defaultValue={editItem.price} className="w-full p-4 bg-slate-800 rounded-3xl outline-none font-black" /></div>
                                                <div><label className="text-[10px] text-slate-500 font-bold uppercase ml-2">Cost Price</label>
                                                <input name="cost" type="number" defaultValue={editItem.costPrice} className="w-full p-4 bg-slate-800 rounded-3xl outline-none opacity-50" /></div>
                                            </div>
                                            <div><label className="text-[10px] text-slate-500 font-bold uppercase ml-2">Symptoms (Clinical Search)</label>
                                            <input name="symptoms" defaultValue={editItem.symptoms} className="w-full p-4 bg-slate-800 rounded-3xl outline-none text-xs" placeholder="e.g. fever, cough" /></div>
                                        </div>
                                        
                                        <div className="md:col-span-2 flex gap-4 mt-4">
                                            <button type="submit" className="flex-1 bg-emerald-600 text-white py-5 rounded-[2.5rem] font-black shadow-xl">APPLY SOVEREIGN OVERRIDE</button>
                                            <button type="button" onClick={async()=>{ if(confirm("Purge Item?")) { await window.api.deleteDoc(window.api.doc(window.db, "inventory", editItem.id)); setEditItem(null); }}} className="bg-rose-950 text-rose-500 p-5 rounded-[2.5rem]"><lucide.Trash/></button>
                                            <button type="button" onClick={()=>setEditItem(null)} className="p-5 bg-slate-800 rounded-[2.5rem] font-bold">CLOSE</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        // --- MODULES ---

        const Dashboard = ({ data }) => (
            <div className="animate-in fade-in duration-700">
                <h2 className="text-4xl font-black mb-10 tracking-tighter italic decoration-emerald-500 underline underline-offset-8">Operations Command</h2>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <StatCard label="Total Cloud Sales" value={data.sales.reduce((a,b)=>a+b.total,0).toLocaleString()} sub="TZS" color="text-emerald-400" border="border-emerald-500" />
                    <StatCard label="Vault Net Wealth" value={data.inventory.reduce((a,b)=>a+(b.costPrice*b.stock),0).toLocaleString()} sub="Stock at Cost" color="text-blue-400" border="border-blue-500" />
                    <StatCard label="Shortages" value={data.inventory.filter(i=>i.stock < 10).length} sub="Items Low" color="text-rose-400" border="border-rose-500" />
                </div>
                <div className="mt-10 bg-slate-900 border border-slate-800 p-10 rounded-[3rem]">
                     <h4 className="font-black text-emerald-500 uppercase text-xs mb-4">Strategic Forecast</h4>
                     <p className="text-sm text-slate-400 italic leading-relaxed">System tracking clinical consumption rates. {data.inventory.filter(i=>i.stock < 5).length > 0 ? "⚠️ Immediate procurement recommended for high-turnover medicines." : "Stock levels are optimal for the current week."}</p>
                </div>
            </div>
        );

        const POS = ({ inventory, cart, search, setSearch, addToCart, updateQty, finalize }) => (
            <div className="flex gap-8 h-full animate-in slide-in-from-bottom duration-500">
                <div className="flex-1 space-y-6 overflow-y-auto no-scrollbar px-1">
                    <input placeholder="Search disease, symptoms or generic..." className="w-full p-6 bg-slate-900 border border-slate-800 rounded-[2rem] text-xl font-bold outline-none focus:ring-2 ring-emerald-500" onChange={(e)=>setSearch(e.target.value.toLowerCase())} />
                    <div className="grid grid-cols-2 gap-4">
                        {inventory.filter(p => p.brandName?.toLowerCase().includes(search) || p.symptoms?.toLowerCase().includes(search)).map(p => (
                            <div key={p.id} onClick={()=>addToCart(p)} className="bg-slate-900 border border-slate-800 p-6 rounded-[2.5rem] hover:border-emerald-500 cursor-pointer active:scale-95 transition-all shadow-xl">
                                <div className="flex justify-between mb-4"><span className="text-[9px] font-black uppercase text-slate-500">{p.category}</span><span className={`text-[10px] font-black tracking-tighter ${p.stock < 10 ? 'text-rose-500':'text-emerald-500'}`}>STK: {p.stock}</span></div>
                                <h4 className="font-black text-xl mb-1 tracking-tight">{p.brandName}</h4>
                                <p className="text-[10px] text-slate-500 font-bold uppercase mb-4">{p.strength} • {p.genericName}</p>
                                <p className="text-2xl font-black text-emerald-400">{Number(p.price).toLocaleString()} <span className="text-xs">TZS</span></p>
                            </div>
                        ))}
                    </div>
                </div>
                <div className="w-96 bg-white text-slate-900 p-8 rounded-[3.5rem] shadow-2xl h-fit border-t-8 border-emerald-600 sticky top-0 flex flex-col">
                    <h3 className="font-black text-2xl mb-8 tracking-tighter uppercase underline decoration-emerald-500 underline-offset-8">Active Bill</h3>
                    <div className="space-y-4 mb-8 overflow-auto max-h-64 no-scrollbar px-1">
                        {cart.map(i => (
                            <div key={i.id} className="flex justify-between items-center border-b border-slate-100 pb-4">
                                <div className="flex-1"><p className="text-sm font-bold uppercase">{i.brandName}</p><p className="text-[10px] opacity-40">{i.price} / unit</p></div>
                                <input type="number" value={i.qty} onChange={(e)=>updateQty(i.id, e.target.value)} className="w-16 p-2 bg-slate-50 rounded-xl text-center font-black text-emerald-600 outline-none" />
                            </div>
                        ))}
                    </div>
                    <div className="flex justify-between font-black text-4xl mb-10 tracking-tighter text-emerald-600"><span>Total</span><span>{cart.reduce((s,i)=>s+(i.price*i.qty),0).toLocaleString()}</span></div>
                    <button onClick={finalize} className="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black text-xl shadow-xl active:scale-95 transition-all">FINALIZE</button>
                </div>
            </div>
        );

        const Inventory = ({ inventory, setEditItem }) => (
            <div className="bg-slate-900 p-10 rounded-[3.5rem] border border-slate-800 animate-in fade-in duration-500 h-full overflow-y-auto no-scrollbar">
                <div className="flex justify-between items-center mb-10">
                    <h2 className="text-3xl font-black text-emerald-500 uppercase tracking-tighter">Inventory Vault</h2>
                    <button onClick={async ()=>{
                        const n = prompt("Brand:"); const g = prompt("Generic:"); const st = prompt("Strength:"); const c = prompt("Cost:"); const p = prompt("Price:"); const q = prompt("Qty:"); const cat = prompt("Category (Medicine/Supplies/Cosmetic):"); const e = prompt("Expiry (YYYY-MM-DD):");
                        if(n) await window.api.addDoc(window.api.collection(window.db, "inventory"), { brandName:n.toUpperCase(), genericName:g, strength:st, costPrice:Number(c), price:Number(p), stock:Number(q), category:cat, expiryDate:e, symptoms: "", batch: "BN-" + Date.now().toString().slice(-4) });
                    }} className="bg-emerald-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg text-[10px] tracking-widest uppercase">+ Add New Entry</button>
                </div>
                <table className="w-full text-left">
                    <thead><tr className="text-slate-500 text-[10px] font-bold uppercase border-b border-slate-800 pb-4"><th>Product Family</th><th>Category</th><th>Stock</th><th>Margin</th><th className="text-right">Price</th><th className="text-right">Manage</th></tr></thead>
                    <tbody className="font-bold">{inventory.map(p => (
                        <tr key={p.id} className="border-b border-slate-800/50 hover:bg-black/50 transition-all group">
                            <td className="py-6"><p className="font-black text-white">{p.brandName}</p><p className="text-[9px] text-slate-500 uppercase">{p.genericName} • {p.strength}</p></td>
                            <td><span className="text-[9px] bg-slate-800 px-2 py-1 rounded text-slate-400 uppercase font-black">{p.category}</span></td>
                            <td className={p.stock < 10 ? 'text-rose-500 underline' : 'text-slate-300'}>{p.stock}</td>
                            <td className="text-emerald-500 text-xs font-black">{(((p.price-p.costPrice)/p.price)*100).toFixed(0)}%</td>
                            <td className="text-right text-emerald-400 text-xl font-black">{Number(p.price).toLocaleString()}</td>
                            <td className="text-right"><button onClick={()=>setEditItem(p)} className="text-blue-500 text-[9px] font-black underline uppercase">Modify</button></td>
                        </tr>
                    ))}</tbody>
                </table>
            </div>
        );

        const Patients = ({ patients }) => (
            <div className="bg-slate-900 p-10 rounded-[3.5rem] border border-slate-800 animate-in fade-in duration-500">
                <div className="flex justify-between items-center mb-10">
                    <h2 className="text-3xl font-black text-blue-500 uppercase tracking-tighter italic">Patient Registry</h2>
                    <button onClick={async ()=>{
                        const n = prompt("Name:"), p = prompt("Phone:"), a = prompt("Address:"), c = prompt("Card ID:");
                        if(n) await window.api.addDoc(window.api.collection(window.db, "patients"), { name:n.toUpperCase(), phone:p, address:a, cardId:c, creditBalance: 0 });
                    }} className="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg uppercase text-[10px] tracking-widest">+ Register New File</button>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {patients.map(pt => (
                        <div key={pt.id} className="p-8 bg-black rounded-[3rem] border border-slate-800 flex justify-between items-center group hover:border-blue-500 transition-all shadow-xl">
                            <div>
                                <h4 className="font-black text-xl text-white group-hover:text-blue-400 transition-colors uppercase tracking-tighter">{pt.name}</h4>
                                <p className="text-xs text-slate-500 font-bold mt-1 uppercase tracking-widest">ID: {pt.cardId} • {pt.phone}</p>
                                <p className="text-[10px] text-slate-700 italic mt-2">{pt.address || "No address provided"}</p>
                            </div>
                            <div className="text-right">
                                <p className="text-[10px] font-bold text-slate-500 uppercase">Deni Balance</p>
                                <p className="text-rose-500 font-black text-xl">{pt.creditBalance.toLocaleString()} <span className="text-[8px]">TZS</span></p>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const Finance = ({ sales, expenses }) => (
            <div className="animate-in fade-in duration-500 space-y-10">
                <h2 className="text-3xl font-black tracking-tighter uppercase italic decoration-emerald-500 underline underline-offset-8">Financial Ledger</h2>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div className="bg-slate-900 p-10 rounded-[3.5rem] border border-slate-800 text-center"><p className="text-[10px] font-black opacity-30 uppercase mb-4 tracking-widest italic">Revenue</p><p className="text-4xl font-black text-emerald-400">{sales.reduce((a,b)=>a+b.total,0).toLocaleString()}</p></div>
                    <div className="bg-white text-slate-900 p-10 rounded-[3.5rem] text-center shadow-xl"><p className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest italic">Expenses</p><p className="text-4xl font-black text-rose-500">{expenses.reduce((a,b)=>a+b.amount,0).toLocaleString()}</p></div>
                    <div className="bg-emerald-600 p-10 rounded-[3.5rem] shadow-2xl text-center"><p className="text-[10px] font-black opacity-70 uppercase mb-4 tracking-widest italic text-white">Net Profit</p><p className="text-4xl font-black text-white">{(sales.reduce((a,b)=>a+b.total,0) - expenses.reduce((a,b)=>a+b.amount,0)).toLocaleString()}</p></div>
                </div>
                <div className="bg-slate-900 p-10 rounded-[3.5rem] border border-slate-800">
                    <div className="flex justify-between items-center mb-10"><h3 className="font-black text-xl tracking-tighter uppercase">Consumption Records</h3><button onClick={async ()=>{
                        const c = prompt("Category (Electricity/Meals/Rent/Data):"), a = prompt("Amount:"), d = prompt("Description:");
                        if(c) await window.api.addDoc(window.api.collection(window.db, "expenses"), { category:c, amount:Number(a), description:d, date: new Date().toISOString() });
                    }} className="bg-emerald-600 text-white px-6 py-2 rounded-xl font-bold text-[10px] tracking-widest uppercase">Add Expense</button></div>
                    <div className="space-y-3">
                        {expenses.map(ex => (
                            <div key={ex.id} className="flex justify-between p-4 bg-black rounded-2xl border border-slate-900"><p className="font-black text-[10px] uppercase text-slate-500">{ex.category} • {ex.description}</p><p className="font-black text-rose-500">-{ex.amount.toLocaleString()} TZS</p></div>
                        ))}
                    </div>
                </div>
            </div>
        );

        const Personnel = ({ users }) => (
            <div className="bg-slate-900 p-10 rounded-[3.5rem] border border-slate-800 animate-in slide-in-from-right duration-500">
                <h2 className="text-3xl font-black mb-10 tracking-tighter uppercase italic underline">Access Control</h2>
                <button onClick={async ()=>{
                    const u = prompt("Username:"), p = prompt("PIN:"), r = prompt("Role:");
                    if(u) await window.api.addDoc(window.api.collection(window.db, "users"), { username: u.toLowerCase(), pin: p, role: r, status: 'ACTIVE' });
                }} className="bg-emerald-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg mb-8 uppercase text-[10px] tracking-widest">+ Authorize New Staff</button>
                <div className="space-y-4">
                    {users.map(u => (
                        <div key={u.id} className="bg-black p-6 rounded-[2.5rem] border border-slate-800 flex justify-between items-center group hover:border-emerald-500 transition-all">
                            <div><p className="font-black text-xl text-white tracking-tighter uppercase italic">{u.username}</p><p className="text-[10px] text-slate-600 font-black uppercase tracking-widest">{u.role}</p></div>
                            <button className={`px-6 py-2 rounded-xl font-black text-[10px] tracking-widest transition-all ${u.status === 'ACTIVE' ? 'bg-emerald-900 text-emerald-400':'bg-rose-900 text-rose-400'}`}>{u.status}</button>
                        </div>
                    ))}
                </div>
            </div>
        );

        // UI HELPERS
        const NavBtn = ({ id, label, icon: Icon, active, onClick }) => (
            <button onClick={() => onClick(id)} className={`w-full flex items-center gap-4 p-4 rounded-3xl transition-all duration-300 group ${active === id ? 'active-tab translate-x-2 shadow-emerald-500/20' : 'text-slate-500 hover:bg-slate-900'}`}>
                <Icon size={22} className={active === id ? 'text-white' : 'group-hover:text-emerald-500'} />
                <span className="font-black text-[10px] uppercase tracking-widest">{label}</span>
            </button>
        );

        const StatCard = ({ label, value, sub, color, border }) => (
            <div className={`bg-slate-900 p-10 rounded-[3.5rem] border ${border} shadow-2xl hover:shadow-emerald-500/10 transition-all group relative overflow-hidden`}>
                <p className="text-slate-500 text-[10px] font-black uppercase tracking-[0.3em] mb-4 italic">{label}</p>
                <h3 className={`text-5xl font-black tracking-tighter ${color} relative z-10`}>{value} <span className="text-xs font-normal opacity-30 text-white uppercase">{sub}</span></h3>
            </div>
        );

        const rootTrigger = setInterval(() => {
            if (window.db) {
                const root = ReactDOM.createRoot(document.getElementById('apex-root'));
                root.render(<App />);
                clearInterval(rootTrigger);
            }
        }, 500);
    </script>
</body>
</html>
