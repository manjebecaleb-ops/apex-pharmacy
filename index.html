<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX | Enterprise Pharmacy ERP</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 font-sans overflow-hidden transition-colors duration-500" id="apex-body">
    <div id="apex-root"></div>

    <!-- 1. CLOUD ENGINE (FIREBASE) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, query, where, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
  apiKey: "AIzaSyAAazqZ1XnzpQ6A_cCHyQEsgXxq5jVVLXE",
  authDomain: "apex-pharmacy-a69b5.firebaseapp.com",
  projectId: "apex-pharmacy-a69b5",
  storageBucket: "apex-pharmacy-a69b5.firebasestorage.app",
  messagingSenderId: "28559683699",
  appId: "1:28559683699:web:1cc3f16a98a32463657a06",
  measurementId: "G-SVDCM1Y693"
};

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.api = { collection, onSnapshot, addDoc, updateDoc, doc, query, where, getDocs, deleteDoc };
    </script>

    <!-- 2. SYSTEM LOGIC -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [view, setView] = useState('DASHBOARD');
            const [user, setUser] = useState({username: 'admin', role: 'MANAGER'}); // Logged in
            const [inventory, setInventory] = useState([]);
            const [sales, setSales] = useState([]);
            const [cart, setCart] = useState([]);
            const [search, setSearch] = useState("");
            const [isDarkMode, setIsDarkMode] = useState(false);

            // REAL-TIME SYNC: Products & Sales
            useEffect(() => {
                if (!window.db) return;
                const unsubInv = window.api.onSnapshot(window.api.collection(window.db, "inventory"), (snap) => {
                    setInventory(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });
                const unsubSales = window.api.onSnapshot(window.api.collection(window.db, "sales"), (snap) => {
                    setSales(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });
                return () => { unsubInv(); unsubSales(); };
            }, []);

            // POS LOGIC
            const addToCart = (p) => {
                if (p.stock <= 0) return alert("Out of stock!");
                setCart(prev => {
                    const ex = prev.find(i => i.id === p.id);
                    if (ex) return prev.map(i => i.id === p.id ? {...i, qty: i.qty + 1} : i);
                    return [...prev, {...p, qty: 1}];
                });
            };

            const finalizeSale = async () => {
                const total = cart.reduce((s,i) => s + (i.price * i.qty), 0);
                await window.api.addDoc(window.api.collection(window.db, "sales"), {
                    total, timestamp: new Date().toISOString(), items: cart, soldBy: user.username
                });
                // Deduct stock in cloud
                for(const item of cart) {
                    await window.api.updateDoc(window.api.doc(window.db, "inventory", item.id), {
                        stock: item.stock - item.qty
                    });
                }
                setCart([]); alert("Transaction Authorized!");
            };

            const toggleTheme = () => {
                setIsDarkMode(!isDarkMode);
                document.getElementById('apex-body').classList.toggle('bg-slate-950');
                document.getElementById('apex-body').classList.toggle('text-white');
            };

            // --- COMPONENTS ---
            const SidebarItem = ({ id, label, icon: Icon }) => (
                <button onClick={() => setView(id)} className={`w-full flex items-center gap-3 p-4 rounded-2xl font-bold transition-all ${view === id ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-100'}`}>
                    <Icon size={20} /> <span>{label}</span>
                </button>
            );

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* SIDEBAR */}
                    <aside className="w-72 bg-white border-r p-8 flex flex-col shrink-0">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="w-10 h-10 bg-emerald-600 rounded-2xl flex items-center justify-center text-white font-black text-xl">A</div>
                            <h2 className="text-xl font-black tracking-tighter">APEX <span className="text-emerald-600 italic font-normal">Pro</span></h2>
                        </div>
                        <nav className="flex-1 space-y-1">
                            <SidebarItem id="DASHBOARD" label="Dashboard" icon={lucide.LayoutDashboard} />
                            <SidebarItem id="POS" label="Sales POS" icon={lucide.ShoppingCart} />
                            <SidebarItem id="STOO" label="Inventory" icon={lucide.Package} />
                            <SidebarItem id="STG" label="Clinical Guide" icon={lucide.Activity} />
                            <SidebarItem id="REPORTS" label="Reports" icon={lucide.PieChart} />
                        </nav>
                        <button onClick={toggleTheme} className="mb-4 text-xs font-bold text-slate-400 uppercase tracking-widest">{isDarkMode ? '☀️ Light Mode' : '🌙 Dark Mode'}</button>
                        <button onClick={() => window.location.reload()} className="text-rose-500 font-bold text-xs uppercase">Logout</button>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 p-10 overflow-auto no-scrollbar">
                        
                        {view === 'DASHBOARD' && (
                            <div className="animate-in fade-in duration-500">
                                <h2 className="text-3xl font-black mb-8 text-slate-800">Executive Summary</h2>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                                    <div className="bg-white p-8 rounded-3xl border-l-8 border-emerald-500 shadow-sm">
                                        <p className="text-slate-400 text-xs font-bold uppercase mb-1 tracking-widest">Today's Revenue</p>
                                        <h3 className="text-3xl font-black text-slate-800">{sales.reduce((a,b)=>a+b.total,0).toLocaleString()} <span className="text-sm font-normal opacity-50">TZS</span></h3>
                                    </div>
                                    <div className="bg-white p-8 rounded-3xl border-l-8 border-blue-500 shadow-sm">
                                        <p className="text-slate-400 text-xs font-bold uppercase mb-1 tracking-widest">Inventory Assets</p>
                                        <h3 className="text-3xl font-black text-slate-800">{inventory.length} Items</h3>
                                    </div>
                                    <div className="bg-white p-8 rounded-3xl border-l-8 border-rose-500 shadow-sm">
                                        <p className="text-slate-400 text-xs font-bold uppercase mb-1 tracking-widest">Expired Alerts</p>
                                        <h3 className="text-3xl font-black text-rose-600">{inventory.filter(i => new Date(i.expiry) < new Date()).length} Risks</h3>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'POS' && (
                            <div className="flex gap-8 animate-in slide-in-from-bottom duration-500">
                                <div className="flex-1 space-y-6">
                                    <div className="relative">
                                        <lucide.Search className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                        <input 
                                            type="text" 
                                            placeholder="Search generic, brand or symptom..." 
                                            className="w-full pl-12 pr-4 py-4 rounded-2xl border-none shadow-sm outline-emerald-500" 
                                            onChange={(e) => setSearch(e.target.value.toLowerCase())}
                                        />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        {inventory.filter(p => p.brandName.toLowerCase().includes(search)).map(p => (
                                            <div key={p.id} onClick={() => addToCart(p)} className="bg-white p-6 rounded-3xl border-2 hover:border-emerald-500 cursor-pointer shadow-sm active:scale-95 transition-all">
                                                <p className="font-black text-lg">{p.brandName}</p>
                                                <p className="text-xs text-slate-400 mb-4 uppercase font-bold">{p.strength}</p>
                                                <div className="flex justify-between items-center">
                                                    <span className="font-black text-emerald-600">{p.price.toLocaleString()} TZS</span>
                                                    <span className="text-[10px] bg-slate-100 p-1 rounded font-bold tracking-tighter">STK: {p.stock}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="w-96 bg-white p-8 rounded-[3rem] shadow-2xl h-fit border-t-8 border-emerald-600 sticky top-0">
                                    <h3 className="font-black text-xl mb-6">Patient Cart</h3>
                                    <div className="space-y-4 mb-8 max-h-[300px] overflow-y-auto no-scrollbar">
                                        {cart.map(item => (
                                            <div key={item.id} className="flex justify-between items-center border-b pb-2">
                                                <div className="flex items-center gap-3">
                                                    <span className="bg-emerald-100 text-emerald-700 w-6 h-6 flex items-center justify-center rounded-lg text-xs font-black">{item.qty}</span>
                                                    <span className="font-bold text-sm">{item.brandName}</span>
                                                </div>
                                                <span className="font-black">{(item.price * item.qty).toLocaleString()}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex justify-between font-black text-3xl mb-8">
                                        <span>Total:</span>
                                        <span className="text-emerald-600">{cart.reduce((s,i)=>s+(i.price*i.qty),0).toLocaleString()}</span>
                                    </div>
                                    <button onClick={finalizeSale} className="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black text-lg shadow-lg hover:bg-emerald-700 transition-all">COMPLETE SALE</button>
                                </div>
                            </div>
                        )}

                        {view === 'STOO' && (
                            <div className="bg-white p-10 rounded-[3rem] shadow-sm border animate-in fade-in duration-500">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-3xl font-black">Stock Management</h2>
                                    <button onClick={async () => {
                                        const name = prompt("Brand Name:");
                                        const price = prompt("Selling Price:");
                                        const stock = prompt("Qty:");
                                        if(name) await window.api.addDoc(window.api.collection(window.db, "inventory"), {
                                            brandName: name, price: Number(price), stock: Number(stock), strength: '500mg', expiry: '2026-01-01'
                                        });
                                    }} className="bg-emerald-600 text-white px-8 py-3 rounded-2xl font-black">+ Add Item</button>
                                </div>
                                <table className="w-full text-left">
                                    <thead className="text-slate-400 font-bold uppercase text-[10px] tracking-widest border-b">
                                        <tr><th className="pb-4">Product</th><th className="pb-4">Stock</th><th className="pb-4">Price</th><th className="pb-4 text-right">Action</th></tr>
                                    </thead>
                                    <tbody className="divide-y">
                                        {inventory.map(p => (
                                            <tr key={p.id} className="hover:bg-slate-50 transition-colors">
                                                <td className="py-4 font-black">{p.brandName}</td>
                                                <td>{p.stock}</td>
                                                <td className="font-bold text-emerald-600">{p.price.toLocaleString()}</td>
                                                <td className="text-right">
                                                    <button onClick={() => window.api.deleteDoc(window.api.doc(window.db, "inventory", p.id))} className="text-rose-500 font-bold text-xs uppercase underline">Delete</button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                    </main>
                </div>
            );
        };

        const checkAuth = setInterval(() => {
            if (window.db) {
                const root = ReactDOM.createRoot(document.getElementById('apex-root'));
                root.render(<App />);
                clearInterval(checkAuth);
            }
        }, 500);
    </script>
</body>
</html>
